  // dual wield replaces "main" as the combined state and the cycle becomes:
  // dual (both) -> main only -> sidearm only -> dual...
  // The knife is deliberately NOT part of this cycle — it's never something
  // you switch TO. It's only ever in hand automatically when you have no
  // guns left at all (see weaponRanOut/clearAllWeapons), and otherwise
  // quick-knife (see performQuickKnife) is how you knife something without
  // giving up whatever gun you're holding. This is what both the on-screen
  // "switch weapon" button and its keyboard equivalent call.
  function cycleWeapon(){
    const order = [];
    if(isDualEligible()){
      order.push('dual', 'main', 'sidearm');
    } else {
      if(mainWeapon.id) order.push('main');
      if(sidearmWeapon.id) order.push('sidearm');
    }
    if(order.length <= 1) return;
    const currentKey = player.equipped ? 'knife' : activeRangedSlot;
    const idx = order.indexOf(currentKey);
    const next = order[(idx+1) % order.length];
    selectSlot(next);
  }

  // Finds the nearest dropped weapon within pickup range of the player, or
  // null if none is close enough. Used both to drive the interact button
  // and to draw a "you can pick this up" highlight on the ground plate.
  function findNearestPickup(){
    let best = null, bestD = Infinity;
    for(const d of droppedWeapons){
      const dist = Math.hypot(player.x-d.x, player.y-d.y);
      if(dist < player.r + WEAPON_PICKUP_R && dist < bestD){
        best = d; bestD = dist;
      }
    }
    return best;
  }

  // Interact button/key: pick up whatever dropped weapon is closest, if any
  // is in range.
  function tryInteract(){
    const drop = findNearestPickup();
    if(!drop) return;
    const i = droppedWeapons.indexOf(drop);
    pickUpWeapon(drop);
    if(i>=0) droppedWeapons.splice(i,1);
  }

  // Applies damage to a crate; once it breaks it stays broken (no respawn —
  // the whole point is picking houses clean) and pops its weapon drop.
  function damageCrate(c, dmg){
    if(!c.alive) return;
    c.hp -= dmg;
    if(c.hp <= 0){
      c.alive = false;
      const ccx = c.x+c.w/2, ccy = c.y+c.h/2;
      spawnWeaponDrop(ccx, ccy);
      playWallHit(ccx, ccy);
      for(let i=0;i<6;i++) spawnImpact(ccx, ccy, 'wall'); // wood splinters
    }
  }

  const playerInv = Array(8).fill(null);
  playerInv[0] = knifeItem;

  // Updated every frame in update() by findNearestPickup() — whichever
  // dropped weapon (if any) is currently close enough to grab. Drawn with
  // a highlight in drawWeaponDrops() and consumed by tryInteract().
  let nearestPickup = null;

  // ---------------- Weapon HUD (top-left name + ammo) ----------------
  // The above-head ammo/readiness bar on the character still does its own
  // thing unchanged (see drawCharacter) — this is just a bigger, easier to
  // read readout of the same info: current weapon name, and either its
  // ammo count / reload state (ranged) or "MELEE" (knife or any melee item).
  // Computes what the HUD should show — no DOM writes, drawTopHud() below
  // reads this straight into letter-tiles on the canvas instead. Colors
  // are NES-palette only (see the NES object above) — no off-palette hex,
  // no alpha.
  let hudInfo = null;
  function updateWeaponHud(){
    let nameTxt, statusTxt, statusColor = NES.white;
    let amFrac, amColor;
    const nameColor = NES.white;
    if(player.equipped){
      const mw = player.equipped;
      nameTxt = mw.name.toUpperCase();
      const ready = mw.cd<=0;
      statusTxt = ready ? 'READY' : 'SWINGING';
      statusColor = ready ? NES.greenLt : NES.brownGold;
      amFrac = Math.max(0, Math.min(1, 1 - mw.cd/mw.cooldown)); // swing readiness fills the AM bar
      amColor = ready ? NES.greenLt : NES.brownGold;
    } else if(activeRangedSlot === 'dual'){
      // Both hands, combined — reload is shared, so show one bar; ammo is
      // per-hand, so show both counts side by side (main | sidearm).
      nameTxt = (mainWeapon.name===sidearmWeapon.name)
        ? ('DUAL ' + mainWeapon.name)
        : (mainWeapon.name + ' + ' + sidearmWeapon.name);
      if(mainWeapon.reloading){
        statusTxt = 'RELOADING' + (mainWeapon.reloadsLeft<=0 ? '!' : '');
        statusColor = NES.blueMid;
        amFrac = 1-(mainWeapon.reloadTimer/mainWeapon.reloadTime);
        amColor = NES.blueMid;
      } else {
        const lastChance = mainWeapon.reloadsLeft<=0 || sidearmWeapon.reloadsLeft<=0;
        statusTxt = mainWeapon.ammo+'/'+mainWeapon.magSize+' | '+sidearmWeapon.ammo+'/'+sidearmWeapon.magSize + (lastChance ? '!' : '');
        amFrac = (mainWeapon.ammo/mainWeapon.magSize + sidearmWeapon.ammo/sidearmWeapon.magSize) / 2;
        amColor = amFrac>0.25 ? NES.brownGold : NES.red;
        if(amFrac<=0.25 || lastChance) statusColor = NES.red;
      }
    } else if(weapon.magSize <= 0){
      nameTxt = 'UNARMED';
      statusTxt = 'NO WEAPON';
      amFrac = 0; amColor = NES.gray;
    } else {
      // Tag the name with which hand it's in whenever the other slot also
      // holds a gun, so it's clear at a glance which one you're about to
      // swap to with the switch-weapon button.
      const otherSlot = (activeRangedSlot==='main') ? sidearmWeapon : mainWeapon;
      const tag = otherSlot.id ? (activeRangedSlot==='main' ? ' [MAIN]' : ' [SIDE]') : '';
      nameTxt = weapon.name + tag;
      if(weapon.reloading){
        statusTxt = 'RELOADING' + (weapon.reloadsLeft<=0 ? '!' : '');
        statusColor = NES.blueMid;
        amFrac = 1-(weapon.reloadTimer/weapon.reloadTime);
        amColor = NES.blueMid;
      } else {
        // "!" marks a gun that's already burned its one reload — this
        // mag (or the one currently loading) is genuinely the last one
        // before it gets dropped, so it's worth a distinct warning cue
        // beyond just the normal low-ammo red.
        const lastChance = !weapon.spinUp && weapon.reloadsLeft<=0;
        statusTxt = weapon.ammo + '/' + weapon.magSize + (lastChance ? '!' : '');
        amFrac = weapon.ammo/weapon.magSize;
        amColor = amFrac>0.25 ? NES.brownGold : NES.red;
        if(amFrac<=0.25 || lastChance) statusColor = NES.red;
      }
    }
    const hpFrac = Math.max(0, player.hp/player.maxHp);
    hudInfo = {
      hpFrac, hpColor: hpFrac>0.4 ? NES.greenLt : NES.red,
      amFrac, amColor,
      nameTxt: nameTxt.toUpperCase(), nameColor,
      statusTxt: statusTxt.toUpperCase(), statusColor
    };
  }

  // All spawns and respawns (player and enemies alike) are picked from the
  // safe spot just outside a house door — house interiors are instanced now
  // (see enterHouse/exitHouse), so they're no longer part of the shared
  // overworld floor pool this used to draw from. When an "awayFrom" point
  // (or list of points) is given, kept at least SPAWN_SAFE_DIST px from all
  // of them, so nobody respawns into a firefight.
  const SPAWN_SAFE_DIST = TILE*18; // 18m — well past the enemy's ~8m engagement range
  function pickHouseSpawn(awayFrom, minDist){
    const avoid = awayFrom ? (Array.isArray(awayFrom) ? awayFrom : [awayFrom]) : [];
    let pool = houseStandTiles;
    if(avoid.length){
      const far = pool.filter(p=> avoid.every(q=>Math.hypot(p.x-q.x, p.y-q.y) >= minDist));
      if(far.length) pool = far;
      else{
        // nothing in any house is far enough from every avoid-point — fall
        // back to whichever house tile is farthest from its closest one
        let best = pool[0], bestD = -1;
        for(const p of pool){
          const d = Math.min(...avoid.map(q=>Math.hypot(p.x-q.x, p.y-q.y)));
          if(d>bestD){ bestD=d; best=p; }
        }
        return best;
      }
    }
    return pool[Math.floor(Math.random()*pool.length)];
  }

  // Instant respawn: full heal, full armor, dropped back outside a house at
  // least SPAWN_SAFE_DIST from every living enemy's current position. If you
  // died mid-interior, exitHouse() first so you don't respawn stuck inside a
  // stage that's about to reset out from under you.
  function respawnPlayer(){
    if(insideHouse) exitHouse();
    const pos = pickHouseSpawn(enemies.filter(e=>e.alive), SPAWN_SAFE_DIST);
    // Drop everything you were carrying right where you died, THEN
    // teleport to the new spawn point.
    clearAllWeapons(player.x, player.y);
    player.x = pos.x; player.y = pos.y;
    player.hp = player.maxHp;
    player.armor = player.maxArmor;
    scrollerSetup(); // instant teleport — snap the camera straight to the new sector, no pan
  }

  const enemies = enemySpawns.map(pos => spawnEnemy(pos));
  const ZOMBIE_COUNT = Math.max(1, Math.round(FOREST_TREE_COUNT/5));
  for(let i=0;i<ZOMBIE_COUNT;i++) enemies.push(spawnZombie());

  function spawnEnemy(at){
    const pos = at || pickHouseSpawn(player, SPAWN_SAFE_DIST);
    const wanderAngle = Math.random()*Math.PI*2;
    const wd = pickWeaponDef(); // rolled from the same loot table as crates — fires with its real stats, and drops it on death (see dropEnemyWeapon)
    return {
      x: pos.x, y: pos.y,
      r: CHAR_FOOT_R, hp: 40, maxHp: 40,
      speed: 36, // r and speed scaled down along with TILE, see note above
      speedMul: wd.speedMul || 1, // same carry-weight penalty the player pays — a minigun-toting enemy is just as slowed down as you'd be
      alive: true,
      wanderAngle, wanderTimer: 0,
      facing: wanderAngle, // which way they're currently looking — see ENEMY_VIEW_ARC_HALF below, can't detect the player behind them
      aware: false,        // once they've spotted the player through the facing cone, LOS alone keeps them locked on through chase/investigate/sweep — only cleared when sweep gives up, requiring the cone check again to re-spot
      alertState: 'idle',  // 'idle' (wander) -> 'chase' (has LOS) -> 'investigate' (lost LOS, pathing to last seen spot) -> 'sweep' (lingering/looking around) -> back to 'idle'; 'flee' (panicked, running from a hit) branches off separately
      archetype: pickArchetype(), // how this particular gunman reacts to getting hit — see pickArchetype above
      lastSeenX: 0, lastSeenY: 0,
      investigateTimer: 0, sweepTimer: 0, sweepDir: 1, sweepStepTimer: 0, sweepStepAngle: 0, reactionShootTimer: 0,
      fleeTimer: 0, fleeAngle: 0, flinchTimer: 0, chargeTimer: 0, chargeSpeedMul: 1, blindFireCd: 0,
      path: null, pathIndex: 0, pathTargetX: null, pathTargetY: null,
      shotCd: 0,
      ammo: wd.magSize, magSize: wd.magSize, reloading: false, reloadTimer: 0, // same magazine/reload limits the player lives with — see the reload branch below
      soundTimer: 0,    // footstep-sound cooldown, only ticks a pulse while hidden from the player
      weaponDef: wd,
      survivor: randomSurvivorPick(), // hostile "gunmen" reuse the same survivor roster as the player, just red instead of teal
      anim: { state:'idle', frame:0, timer:0 },
      moving: false,
      facingRight: true
    };
  }

  // ---- Entering/exiting a house ----
  // insideHouse is null outdoors, or the house object currently loaded onto
  // the shared interior stage (see the reserved-stage comment near MAP,
  // above). Only one house can be "open" at a time — stepping through a
  // door outdoors stamps that house's (lazily built, then cached) interior
  // onto the stage and teleports the player just inside it; stepping onto
  // the door again from inside reverses both.
  let insideHouse = null;
  function worldToTile(px,py){ return {col: Math.floor(px/TILE), row: Math.floor(py/TILE)}; }

  function enterHouse(house){
    if(insideHouse) return; // already inside somewhere — shouldn't happen, but don't stack transitions
    if(!house.interior) house.interior = buildHouseInterior(house);
    const interior = house.interior;
    for(let y=0; y<SECTOR_TILES_Y; y++){
      let row = interior.tiles[y];
      if(row.length < COLS) row += '#'.repeat(COLS-row.length);
      MAP[INTERIOR_ROW0+y] = row;
    }
    rebuildCollisionCaches();
    bakeBackground(); // repaint wood flooring over this house's actual room/corridor shape

    // Bring back whatever's still alive from a previous visit to this same
    // house — killed enemies and opened crates stay gone (state lives on
    // interior.enemies/crates, synced back in exitHouse below).
    for(const rec of interior.enemies){
      if(!rec.alive) continue;
      const e = spawnEnemy({x: rec.col*TILE+TILE/2, y: (INTERIOR_ROW0+rec.row)*TILE+TILE/2});
      e.record = rec;
      enemies.push(e);
    }
    for(const rec of interior.crates){
      if(!rec.alive) continue;
      const x = rec.col*TILE+TILE/2, y = (INTERIOR_ROW0+rec.row)*TILE+TILE/2;
      crates.push({x:x-TILE/2, y:y-TILE/2, w:TILE, h:TILE, hp:CRATE_MAX_HP, maxHp:CRATE_MAX_HP, alive:true, record:rec});
    }

    // Step in one tile from the door, facing away from it, so you land on
    // floor instead of astride the wall/door tile itself.
    let pCol = interior.doorLocalCol, pRow = interior.doorLocalRow;
    if(interior.doorSide==='north') pRow += 1;
    else if(interior.doorSide==='south') pRow -= 1;
    else if(interior.doorSide==='west') pCol += 1;
    else pCol -= 1;
    player.x = pCol*TILE+TILE/2;
    player.y = (INTERIOR_ROW0+pRow)*TILE+TILE/2;
    insideHouse = house;
    scrollerSetup(); // instant teleport — snap the camera straight to the interior's sector, no pan
  }

  function exitHouse(){
    if(!insideHouse) return;
    const house = insideHouse, interior = house.interior;
    // Sync each interior entity's alive state back onto the house before
    // pulling it out of the live arrays, so it's remembered next visit.
    for(let i=enemies.length-1; i>=0; i--){
      const e = enemies[i];
      if(e.record && interior.enemies.includes(e.record)){
        e.record.alive = e.alive;
        enemies.splice(i,1);
      }
    }
    for(let i=crates.length-1; i>=0; i--){
      const c = crates[i];
      if(c.record && interior.crates.includes(c.record)){
        c.record.alive = c.alive;
        crates.splice(i,1);
      }
    }
    for(let i=droppedWeapons.length-1; i>=0; i--){
      const d = droppedWeapons[i];
      const row = Math.floor(d.y/TILE);
      if(row >= INTERIOR_ROW0 && row < INTERIOR_ROW0+SECTOR_TILES_Y) droppedWeapons.splice(i,1);
    }
    for(let i=healthPickups.length-1; i>=0; i--){
      const h = healthPickups[i];
      const row = Math.floor(h.y/TILE);
      if(row >= INTERIOR_ROW0 && row < INTERIOR_ROW0+SECTOR_TILES_Y) healthPickups.splice(i,1);
    }
    player.x = house.standCol*TILE+TILE/2;
    player.y = house.standRow*TILE+TILE/2;
    insideHouse = null;
    scrollerSetup(); // instant teleport back outdoors, no pan
  }

  // Puts a killed enemy's weapon on the ground where they died, same pickup
  // mechanic as a crate drop — walk over it to grab it.
  function dropEnemyWeapon(e){
    droppedWeapons.push({x: e.x, y: e.y, def: e.weaponDef, ammo: e.reloading ? 0 : e.ammo});
  }

  // ---- Zombies: unarmed forest enemies. No gun, no drop — just a knife-arm
  // melee attack once they close the distance, same arc-sweep shape as the
  // player's own knife instead of a flat contact-damage tick. One per 5
  // trees in the forest biome, respawning 30s after death at a random spot
  // anywhere in that same biome (not tied to where they died).
  const ZOMBIE_MELEE = { range: 18, arc: 2.6, damage: 12, cooldown: 0.9, swingDuration: 0.18 }; // range scaled down along with TILE, see note above
  const ZOMBIE_RESPAWN_MS = 30000;
  const ZOMBIE_DETECT_RANGE = 500; // trees usually cut this shorter via LOS anyway

  // Enemy gunmen aren't laser-aimbots — each shot's AIM angle (not the bullet's
  // own inherent spread, which is separate and per-weapon) gets a random cone
  // of error added on top. Wider than the player would ever want, since
  // that's what actually reads as "a person shooting at you," not a hitscan.
  const ENEMY_AIM_ERROR = 0.28; // ~16 degrees of random aim error, radians

  // ---- Post-LOS behavior: losing sight of the player doesn't mean an
  // enemy forgets about them instantly. They path to wherever they last
  // saw the player (INVESTIGATE_TIME caps how long they'll try, in case
  // that spot is unreachable), optionally taking a shot or two at that
  // spot right as they lose you (REACTION_SHOOT_WINDOW — they're still
  // reacting to where you just were), then linger and look around
  // (SWEEP_TIME) before fully giving up and going back to idle wandering.
  const INVESTIGATE_TIME = 4;
  const SWEEP_TIME = 2.5;
  const REACTION_SHOOT_WINDOW = 1.2;
  const INVESTIGATE_ARRIVE_DIST = 12;
  const SWEEP_TURN_SPEED = 1.4; // rad/s, facing sweeps back and forth while lingering

  // ---- Getting hit: how a person actually reacts to taking a round (or a
  // knife) depends on who they are and how bad it is, not one flat script.
  // Each gunman rolls one of three archetypes at spawn (see pickArchetype):
  //   'rusher'   — adrenaline over caution: charges the source faster than
  //                normal and sprays fire on the way in.
  //   'tactical' — a half-beat flinch/duck first, then advances carefully,
  //                still shooting back the whole time.
  //   'coward'   — most likely to just run: bolts away from the hit and,
  //                if hurt badly enough or blindsided, may keep bolting.
  // Zombies skip all of this — no fear response, no ranged fire, they just
  // charge harder, like a wounded animal would.
  const FLEE_TIME = 4; // how long a panicked enemy runs before catching their breath
  const FLEE_HP_FRAC_THRESHOLD = 0.3; // below this much HP, panic becomes much more likely regardless of archetype
  const RUSHER_CHARGE_SPEED_MUL = 1.4; // adrenaline sprint speed while charging a fresh hit
  const RUSHER_CHARGE_TIME = 3; // how long that speed boost lasts before settling back to normal investigate pace
  const TACTICAL_FLINCH_TIME = 0.35; // brief duck/brace before a tactical shooter does anything else
  const BLIND_FIRE_COOLDOWN_RANGE = [0.5, 1.1]; // random cadence of suppressing fire toward an unseen shooter — bullets already punch through walls (wallRetention), so firing blind through one is consistent with how the rest of combat works
  const SWEEP_STEP_INTERVAL = [0.5, 0.9]; // how often a sweeping enemy picks a new nearby spot/angle to actually step toward and check, instead of standing rooted in place
  function pickArchetype(){
    const r = Math.random();
    if(r < 0.30) return 'rusher';
    if(r < 0.75) return 'tactical';
    return 'coward';
  }
  function pickForestSpawn(){
    if(FOREST_FLOOR.length) return FOREST_FLOOR[Math.floor(Math.random()*FOREST_FLOOR.length)];
    return pickHouseSpawn(); // fallback if a map ever rolls no forest at all
  }
  function spawnZombie(at){
    const pos = at || pickForestSpawn();
    const wanderAngle = Math.random()*Math.PI*2;
    return {
      x: pos.x, y: pos.y,
      r: CHAR_FOOT_R, hp: 30, maxHp: 30,
      speed: 30, // r and speed scaled down along with TILE, see note above
      speedMul: 1, // unarmed — no weapon-weight penalty
      alive: true,
      type: 'zombie',
      wanderAngle, wanderTimer: 0,
      facing: wanderAngle, // see ENEMY_VIEW_ARC_HALF below — can't detect the player directly behind them
      aware: false,
      alertState: 'idle',
      lastSeenX: 0, lastSeenY: 0,
      investigateTimer: 0, sweepTimer: 0, sweepDir: 1, sweepStepTimer: 0, sweepStepAngle: 0,
      chargeTimer: 0, chargeSpeedMul: 1, // wounded-animal adrenaline burst after taking a hit — see enemyGotShot
      path: null, pathIndex: 0, pathTargetX: null, pathTargetY: null,
      meleeCd: 0,
      soundTimer: 0,
      weaponDef: null, // no gun — never drops anything on death
      anim: { state:'idle', frame:0, timer:0 },
      moving: false,
      facingRight: true
    };
  }

  // Enemies get the same treatment as the player's own vision (see
  // playerCanSee/VIEW_ARC_HALF above) — a forward-facing cone, not
  // omnidirectional awareness, and this applies unconditionally, not just
  // when the player has the fog-of-war overlay switched on for their own
  // screen (that toggle only affects what gets rendered/dimmed for the
  // player; it was never meant to change what enemies are capable of
  // noticing). An unobstructed, in-range player standing directly behind an
  // enemy should NOT get spotted — only once the player is generally in
  // front of them, or they're already alerted and tracking (see `aware` on
  // each enemy, set below), does a clear line of sight count as "seen."
  const ENEMY_VIEW_ARC_HALF = Math.PI * (105/180); // 210° FOV, same as the player
  function inFacingCone(facing, toAngle){
    return Math.abs(angleDiff(toAngle, facing)) <= ENEMY_VIEW_ARC_HALF;
  }

  // This is a free-for-all, not a cops-and-robbers sim: every gunman (and
  // every zombie) treats the player AND every other living combatant as a
  // potential target, picking whichever one is nearest among everyone it can
  // currently see. Same LOS + facing-cone rules as spotting the player
  // always did — a not-yet-aware `e` still needs the candidate in front of
  // it, but once aware, plain LOS is enough (see inFacingCone callers below).
  // Returns {target, dist, angle} for the nearest valid candidate, or null.
  function findNearestHostile(e, range){
    let best = null, bestDist = range, bestAngle = 0;
    const consider = (cand)=>{
      if(cand !== player && !cand.alive) return;
      const d = Math.hypot(cand.x-e.x, cand.y-e.y);
      if(d >= bestDist) return;
      if(!canSee(e.x, e.y, cand.x, cand.y, range)) return;
      const angle = Math.atan2(cand.y-e.y, cand.x-e.x);
      if(!e.aware && !inFacingCone(e.facing, angle)) return;
      best = cand; bestDist = d; bestAngle = angle;
    };
    consider(player);
    for(const o of enemies){ if(o !== e) consider(o); }
    return best ? {target:best, dist:bestDist, angle:bestAngle} : null;
  }

  // Kill-and-respawn, branched by enemy type: gunmen drop their weapon and
  // come back in a house; zombies drop nothing and come back anywhere in
  // the forest. House-interior enemies (tagged with .record by enterHouse)
  // don't get a floating outdoor respawn at all — their death is already
  // remembered on house.interior via exitHouse, and buildHouseInterior only
  // ever runs once per house, so that's the only "respawn" they need.
  // idx is looked up fresh via indexOf at fire time rather than trusting the
  // index captured at kill time, since entering/exiting a house pushes/
  // splices this same shared array and can shift everything after it —
  // using the stale index once that's happened either respawns into the
  // wrong slot or, worse, leaves a hole that later code crashes reading.
  const healthPickups = []; // {x,y,r} — see onEnemyKilled (25% drop chance, gunmen only) and updateHealthPickups()
  const HEALTH_PICKUP_R = 14;
  const HEALTH_DROP_CHANCE = 0.25;

  function onEnemyKilled(e, idx){
    e.alive = false;
    if(e.type === 'zombie'){
      if(e.record) return; // house interior enemy — no outdoor respawn, and zombies don't drop anything anyway
      setTimeout(()=>{ const i = enemies.indexOf(e); if(i!==-1) enemies[i] = spawnZombie(); }, ZOMBIE_RESPAWN_MS);
    } else {
      dropEnemyWeapon(e); // drops regardless of killer (player, another enemy, whatever) and regardless of indoors/outdoors
      if(Math.random() < HEALTH_DROP_CHANCE){
        healthPickups.push({x: e.x, y: e.y, r: HEALTH_PICKUP_R});
      }
      if(e.record) return; // house interior enemy — its death is remembered on house.interior via exitHouse, no floating outdoor respawn
      setTimeout(()=>{ const i = enemies.indexOf(e); if(i!==-1) enemies[i] = spawnEnemy(); }, 3000);
    }
  }

  // Walking over a health pickup (player OR any living enemy — whoever gets
  // there first) tops that entity up to full HP and consumes the pickup.
  // Doesn't touch armor, just raw health.
  function updateHealthPickups(){
    for(let i=healthPickups.length-1; i>=0; i--){
      const h = healthPickups[i];
      let taken = false;
      if(Math.hypot(player.x-h.x, player.y-h.y) < player.r+h.r){
        player.hp = player.maxHp;
        taken = true;
      } else {
        for(const e of enemies){
          if(!e.alive) continue;
          if(Math.hypot(e.x-h.x, e.y-h.y) < e.r+h.r){
            e.hp = e.maxHp;
            taken = true;
            break;
          }
        }
      }
      if(taken) healthPickups.splice(i,1);
    }
  }

  const bullets = []; // {x,y,vx,vy,life,dmg,friendly}
  const tracerTrails = []; // {x1,y1,x2,y2,age,life,friendly} — fading afterimage of each bullet's path, drawn even after the bullet itself is gone so a shot reads as more than a single-frame flash
  const impacts = []; // {x,y,age,life,kind,angle} — brief spark/shard/dust burst where a bullet actually hits something
  const swingEffects = []; // {x,y,angle,arc,range,timer,maxTimer} — melee sweep visuals
  const soundPulses = []; // {x,y,age,duration,startR,maxR,maxDist} — a footstep sound event; see drawSoundPulses for how it actually reaches the player
  const hitNumbers = []; // {x,y,vy,age,life,text} — floating damage number where a hit landed

  // Sound travels at a real, finite speed (343 m/s), and how far it carries
  // before it's too quiet to hear at all depends on how loud it was. At
  // 1 tile = 1m: footsteps are quiet and short-range; a gunshot or a pane
  // of glass shattering are both sharp, loud cracks that carry well past
  // the edges of this map, so they're effectively always heard.
  const SOUND_SPEED = 343 * TILE; // px/s
  const SOUND_RANGE = {
    move:  8   * TILE, // footsteps — quiet, short-range
    shot:  100 * TILE, // gunfire — carries past this map's own ~88m diagonal
    break: 100 * TILE  // breaking glass — a sharp crack, just as loud as a gunshot
  };
  const SOUND_VISUAL = {
    move: {startR:4, maxR:62, duration:1.1}
  };

  // A gentle ring for footsteps heard through the fog. Gunfire and breaking
  // glass are loud enough that they don't need a visual "sound wave" cue —
  // only the visual pulse for footsteps remains; every kind still plays its
  // own audio below.
  function emitSound(x, y, kind){
    const maxDist = SOUND_RANGE[kind] || SOUND_RANGE.move;
    if(kind === 'move'){
      soundPulses.push({x,y,maxDist, age:0, ...SOUND_VISUAL.move});
    }
    // audible sound to go with the visual pulse — this call always means an
    // enemy source (the player's own shots/footsteps/breaks play directly
    // from where they happen, not through this shared event)
    if(kind === 'shot') playGunshot(x, y, false);
    else if(kind === 'break') playGlassBreak(x, y);
    else if(kind === 'move') playFootstep(x, y, maxDist, undefined, surfaceAt(x,y));
  }

  // ---------------- Audio: recorded sound effects ----------------
  // Gunshots and footsteps now play real .ogg files from audio/ instead of
  // being synthesized. Each sound gets a small pool of <audio> elements so
  // overlapping plays (e.g. two footsteps in quick succession, or a fast
  // weapon) don't cut each other off the way a single reused element would.
  const SHOT_FILES = ['a','b','c','d','e','f','g','h'].map(l=>`audio/shoot-${l}.ogg`);
  // shoot-c is used for every weapon, per current sound design — the array
  // above is kept around in case per-weapon variety gets added later.
  const GUNSHOT_FILE = 'audio/shoot-c.ogg';
  const FOOTSTEP_FILES = {
    grass: 'audio/move-b.ogg',
    sand:  'audio/move-a.ogg',
    wood:  'audio/move-d.ogg',
    stone: 'audio/move-c.ogg', // no stone floors yet, wired up for when they exist
  };
  const AUDIO_POOL_SIZE = 6;
  const audioPools = {}; // src -> {els:[HTMLAudioElement...], next:0}
  function getPooledAudio(src){
    let pool = audioPools[src];
    if(!pool){
      pool = {els: [], next: 0};
      for(let i=0;i<AUDIO_POOL_SIZE;i++){
        const el = new Audio(src);
        el.preload = 'auto';
        pool.els.push(el);
      }
      audioPools[src] = pool;
    }
    const el = pool.els[pool.next];
    pool.next = (pool.next+1) % pool.els.length;
    return el;
  }
  function playFile(src, vol, pan){
    if(audioMuted || sfxVolume<=0) return;
    const el = getPooledAudio(src);
    try{
      el.currentTime = 0;
      el.volume = Math.max(0, Math.min(1, vol*sfxVolume));
      // Stereo pan on plain <audio> elements needs a Web Audio pan node,
      // which requires the shared AudioContext to exist and each element to
      // be routed through it exactly once — cache that per-element the
      // first time we see it, then just move the pan value on repeat plays.
      if(actx && pan!==undefined){
        if(!el._panner){
          const src0 = actx.createMediaElementSource(el);
          el._panner = actx.createStereoPanner ? actx.createStereoPanner() : null;
          if(el._panner){ src0.connect(el._panner); el._panner.connect(actx.destination); }
          else src0.connect(actx.destination);
        }
        if(el._panner) el._panner.pan.value = Math.max(-1, Math.min(1, pan));
      }
      el.play().catch(()=>{});
    }catch(e){}
  }

  // ---------------- Audio: synthesized sound effects (legacy) ----------------
  // No external sound files — every effect below is generated on the fly
  // with the Web Audio API (oscillators + filtered noise) so the whole game
  // stays a single self-contained file. Sounds are positioned relative to
  // the player: distance controls volume falloff (reusing the same
  // SOUND_RANGE the visual sound-pulse system already uses, so "how far a
  // sound carries" stays consistent between what you see and what you
  // hear), and left/right offset from the player controls stereo pan.
  let actx = null, masterGain = null, noiseBuffer = null;
  const MUSIC_BASE_VOL = 0.4; // music.volume at 100% on the slider
  const SFX_BASE_GAIN = 0.6;  // masterGain at 100% on the slider (legacy synthesized sounds)
  const MUSIC_VOL_STORAGE_KEY = 'perimeter_musicVolume';
  const SFX_VOL_STORAGE_KEY = 'perimeter_sfxVolume';
  let musicVolume = 0.4; // 0-1, slider default 40
  let sfxVolume = 1;     // 0-1, slider default 100
  try{
    const savedMusic = localStorage.getItem(MUSIC_VOL_STORAGE_KEY);
    const savedSfx = localStorage.getItem(SFX_VOL_STORAGE_KEY);
    if(savedMusic !== null) musicVolume = Math.max(0, Math.min(1, parseFloat(savedMusic)));
    if(savedSfx !== null) sfxVolume = Math.max(0, Math.min(1, parseFloat(savedSfx)));
  }catch(e){ /* localStorage unavailable — keep defaults above */ }
  function setMusicVolume(v){
    musicVolume = Math.max(0, Math.min(1, v));
    music.volume = MUSIC_BASE_VOL * musicVolume;
    try{ localStorage.setItem(MUSIC_VOL_STORAGE_KEY, String(musicVolume)); }catch(e){}
  }
  function setSfxVolume(v){
    sfxVolume = Math.max(0, Math.min(1, v));
    if(masterGain) masterGain.gain.value = SFX_BASE_GAIN * sfxVolume;
    try{ localStorage.setItem(SFX_VOL_STORAGE_KEY, String(sfxVolume)); }catch(e){}
  }
  function initAudio(){
    if(actx) return;
    try{
      actx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = actx.createGain();
      masterGain.gain.value = SFX_BASE_GAIN * sfxVolume;
      masterGain.connect(actx.destination);
      // 1 second of white noise, reused (pitched/filtered differently) as the
      // raw material for gunshots, footsteps, glass, and impacts — cheaper
      // than generating a fresh noise buffer per sound.
      const len = actx.sampleRate;
      noiseBuffer = actx.createBuffer(1, len, actx.sampleRate);
      const d = noiseBuffer.getChannelData(0);
      for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
    }catch(e){ actx = null; }
  }
  function resumeAudio(){
    initAudio();
    if(actx && actx.state==='suspended') actx.resume().catch(()=>{});
    startMusic();
  }
  let audioMuted = false;

  // ---------------- Background music ----------------
  // A single looping track, played through a plain <audio> element rather
  // than the synthesized Web Audio effects above — MP3 playback needs a
  // real audio file, not an oscillator. Browsers block autoplay until the
  // user interacts with the page, so this only actually starts once
  // startMusic() is called — which happens from resumeAudio(), i.e. the
  // same first keypress/click/tap that already unlocks the sound effects.
  const music = new Audio('songs/OST1.mp3');
  music.loop = true;
  music.volume = MUSIC_BASE_VOL * musicVolume;
  let musicStarted = false;

  const musicVolumeSlider = document.getElementById('musicVolumeSlider');
  if(musicVolumeSlider){
    musicVolumeSlider.value = String(Math.round(musicVolume*100));
    musicVolumeSlider.addEventListener('input', ()=>{ setMusicVolume(musicVolumeSlider.value/100); });
  }
  const sfxVolumeSlider = document.getElementById('sfxVolumeSlider');
  if(sfxVolumeSlider){
    sfxVolumeSlider.value = String(Math.round(sfxVolume*100));
    sfxVolumeSlider.addEventListener('input', ()=>{ setSfxVolume(sfxVolumeSlider.value/100); });
  }
  function startMusic(){
    if(musicStarted || audioMuted) return;
    music.play().then(()=>{ musicStarted = true; }).catch(()=>{
      // still blocked (e.g. no user gesture yet) — next resumeAudio() call retries
    });
  }

  // Distance/pan falloff shared by every world-positioned sound: silent past
  // maxDist, full volume right on top of the player, panned by which side
  // of the player (in world space) the source sits on.
  function spatial(x, y, maxDist){
    const dx = x-player.x, dy = y-player.y;
    const dist = Math.hypot(dx,dy);
    const vol = Math.max(0, 1 - dist/maxDist);
    const pan = Math.max(-1, Math.min(1, dx/(maxDist*0.5)));
    return {vol, pan, dist};
  }
  function makeNoise(duration){
    const src = actx.createBufferSource();
    src.buffer = noiseBuffer;
    src.loopStart = Math.random()*(noiseBuffer.duration-duration-0.01);
    src.loopEnd = src.loopStart+duration;
    src.loop = true;
    return src;
  }
  function envGain(peak, attack, decay, startAt){
    const g = actx.createGain();
    g.gain.setValueAtTime(0.0001, startAt);
    g.gain.linearRampToValueAtTime(peak, startAt+attack);
    g.gain.exponentialRampToValueAtTime(0.0001, startAt+attack+decay);
    return g;
  }

  // Gunshot: a hard filtered-noise crack plus a low sine thump for body.
  // Friendly (player) shots get a touch more low-end punch since you're
  // right on top of the source; enemy shots read a bit thinner/further.
  function playGunshot(x, y, friendly){
    const {vol, pan} = friendly ? {vol:1, pan:0} : spatial(x, y, SOUND_RANGE.shot*0.35);
    if(vol<=0.01) return;
    playFile(GUNSHOT_FILE, vol, pan);
  }

  // Footstep: a very short, soft percussive tap. Tone depends on surface —
  // grass gets a duller thump with a bit of rustle blended in, wood gets a
  // tighter, higher, hollow knock. Pitch/tone wobbles a little per-step so
  // a run of footsteps doesn't sound like a machine.
  function playFootstep(x, y, maxDist, forcedVol, surface){
    const {vol, pan} = forcedVol!==undefined ? {vol:forcedVol, pan:0} : spatial(x, y, maxDist);
    if(vol<=0.02) return;
    const file = FOOTSTEP_FILES[surface] || FOOTSTEP_FILES.grass;
    playFile(file, vol*0.55, pan);
  }

  // Glass breaking: a bright noise burst plus a scatter of short, high,
  // randomly-pitched sine "shards" to sell the shatter/tinkle.
  function playGlassBreak(x, y){
    if(!actx || audioMuted) return;
    const {vol, pan} = spatial(x, y, SOUND_RANGE.break*0.35);
    if(vol<=0.01) return;
    const t = actx.currentTime;
    const panner = actx.createStereoPanner ? actx.createStereoPanner() : null;
    const out = panner || masterGain;
    if(panner){ panner.pan.value = pan; panner.connect(masterGain); }

    const noise = makeNoise(0.25);
    const bp = actx.createBiquadFilter();
    bp.type = 'highpass'; bp.frequency.value = 2200;
    const ng = envGain(vol*0.7, 0.001, 0.2, t);
    noise.connect(bp); bp.connect(ng); ng.connect(out);
    noise.start(t); noise.stop(t+0.26);

    const shards = 5;
    for(let i=0;i<shards;i++){
      const dt0 = Math.random()*0.12;
      const osc = actx.createOscillator();
      osc.type = 'triangle';
      const f = 2400 + Math.random()*3200;
      osc.frequency.setValueAtTime(f, t+dt0);
      osc.frequency.exponentialRampToValueAtTime(f*0.6, t+dt0+0.08);
      const sg = envGain(vol*0.22, 0.001, 0.09, t+dt0);
      osc.connect(sg); sg.connect(out);
      osc.start(t+dt0); osc.stop(t+dt0+0.1);
    }
  }

  // Bullet-on-wall impact: a duller, lower "thock" than a gunshot — thump
  // of the round punching wood plus a short dry crack, no bright snap tail.
  function playWallHit(x, y){
    if(!actx || audioMuted) return;
    const {vol, pan} = spatial(x, y, SOUND_RANGE.shot*0.3);
    if(vol<=0.02) return;
    const t = actx.currentTime;
    const panner = actx.createStereoPanner ? actx.createStereoPanner() : null;
    const out = panner || masterGain;
    if(panner){ panner.pan.value = pan; panner.connect(masterGain); }

    const noise = makeNoise(0.1);
    const bp = actx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 1.1;
    const ng = envGain(vol*0.6, 0.001, 0.07, t);
    noise.connect(bp); bp.connect(ng); ng.connect(out);
    noise.start(t); noise.stop(t+0.11);

    const osc = actx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(90, t);
    osc.frequency.exponentialRampToValueAtTime(38, t+0.1);
    const og = envGain(vol*0.55, 0.001, 0.12, t);
    osc.connect(og); og.connect(out);
    osc.start(t); osc.stop(t+0.14);
  }

  // Reload: a short sequence of mechanical clicks/clacks timed to roughly
  // span the actual reload duration — mag drop, mag seat, then a final
  // slide-rack snap right as the gun becomes ready to fire again. Always
  // plays right at the player (it's their own gun), no spatialization.
  function playReload(duration){
    if(!actx || audioMuted) return;
    const t = actx.currentTime;
    const out = masterGain;

    function click(at, freq, vol, dur){
      const noise = makeNoise(Math.min(dur, 0.05));
      const bp = actx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = 3;
      const g = envGain(vol, 0.001, dur, at);
      noise.connect(bp); bp.connect(g); g.connect(out);
      noise.start(at); noise.stop(at+dur+0.02);

      const osc = actx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = freq*0.5;
      const og = envGain(vol*0.5, 0.001, dur*0.6, at);
      osc.connect(og); og.connect(out);
      osc.start(at); osc.stop(at+dur*0.6+0.02);
    }

    click(t,                 1400, 0.3, 0.035);           // mag release / drop
    click(t+duration*0.45,   1100, 0.32, 0.04);            // fresh mag seated
    click(t+Math.max(duration-0.12,0.1), 2000, 0.38, 0.05); // slide racks, ready to fire
  }

  // ---------------- Input state ----------------
  const keys = {};
  const codes = {}; // physical key-code state (layout-independent), used for movement
  window.addEventListener('keydown', e=>{
    resumeAudio();
    keys[e.key.toLowerCase()] = true;
    codes[e.code] = true;
    // 'i' used to open the old crate-storage/backpack inventory — that UI
    // is gone now (crates are shot/knifed open instead), so it's free/unbound.
    // Physical top-row digit keys — e.code is layout-independent, so this
    // fires correctly even on AZERTY, where the physical '1'/'2'/'3' keys
    // type '&'/'é'/'"' rather than digits. Numpad digits work the same way
    // already (Numpad1/2/3 always report as digits) so both rows work.
    if(e.code==='Digit1'||e.code==='Numpad1') selectSlot('main');
    if(e.code==='Digit2'||e.code==='Numpad2') selectSlot('sidearm');
    if(e.code==='Digit3'||e.code==='Numpad3') performQuickKnife();  // quick knife — stabs where you're moving, doesn't touch what's in hand
    if(e.key==='e' || e.key==='E') tryInteract();       // pick up floor item
    // Quick knife on the physical top-left letter key — e.code is the
    // physical key location, independent of what character it types, so
    // this is 'Q' on a QWERTY keyboard and 'A' on an AZERTY keyboard
    // without needing to actually detect the layout. That physical key is
    // never part of WASD (QWERTY) or ZQSD (AZERTY) movement in either
    // layout — see the movement check below, which is keyed the same
    // layout-independent way — so it can't collide with moving left.
    if(e.code === 'KeyQ') performQuickKnife();
  });
  window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; codes[e.code] = false; });

  let mouse = {x: player.x+50, y: player.y, down:false, active:false};
  canvas.addEventListener('mousemove', e=>{
    const rect = canvas.getBoundingClientRect();
    const scaleX = W/rect.width, scaleY = H/rect.height;
    mouse.x = (e.clientX-rect.left)*scaleX;
    mouse.y = (e.clientY-rect.top)*scaleY;
    mouse.active = true;
    mouse.mdx = (mouse.mdx||0) + (e.movementX||0);
    mouse.mdy = (mouse.mdy||0) + (e.movementY||0);
  });
  canvas.addEventListener('mousedown', e=>{ mouse.down = true; mouse.active = true; requestGameFullscreen(); resumeAudio(); });
  window.addEventListener('mouseup', e=>{ mouse.down = false; });

  // Mouse wheel also cycles weapons (main <-> sidearm, or through dual if
  // eligible) — same effect as the Q-equivalent SWAP action. preventDefault
  // stops the page itself from scrolling while playing. Only two/three
  // slots exist in the cycle, so direction doesn't need to matter — any
  // wheel tick just advances to the next slot.
  let lastWheelCycle = 0;
  canvas.addEventListener('wheel', e=>{
    e.preventDefault();
    const now = performance.now();
    if(now - lastWheelCycle < 150) return; // debounce high-precision trackpads/wheels
    lastWheelCycle = now;
    resumeAudio();
    cycleWeapon();
  }, { passive:false });

  // ---------------- Touch joysticks ----------------
  const stickLeft = document.getElementById('stickLeft');
  const nubLeft = document.getElementById('nubLeft');
  const stickRight = document.getElementById('stickRight');
  const nubRight = document.getElementById('nubRight');

  const moveTouch = { id:null, cx:0, cy:0, dx:0, dy:0, active:false };
  const aimTouch  = { id:null, cx:0, cy:0, dx:0, dy:0, active:false };
  const STICK_MAX = 50;

  function getLocal(touch){
    // Measured against gameWrap, not gameContainer — in fullscreen,
    // gameWrap spans the full screen (including the black letterbox bars
    // around the NES-scaled play area), so the joysticks get the whole
    // screen to work with instead of just the tight play-area rectangle.
    const rect = gameWrap.getBoundingClientRect();
    return { x: touch.clientX-rect.left, y: touch.clientY-rect.top,
             scaleX: rect.width, scaleY: rect.height };
  }

  // Tapping the game screen requests fullscreen on just the play area (not
  // the whole page), so on Android the browser's address/nav bars go away
  // and the container expands edge-to-edge. Must be called synchronously
  // from within a real user-gesture handler, and only while not already
  // fullscreen (repeated calls are otherwise harmless no-ops, but skip them).
  function requestGameFullscreen(){
    const isFs = document.fullscreenElement || document.webkitFullscreenElement;
    if(isFs) return;
    const req = gameWrap.requestFullscreen || gameWrap.webkitRequestFullscreen
              || gameWrap.mozRequestFullScreen || gameWrap.msRequestFullscreen;
    if(req){
      const p = req.call(gameWrap);
      if(p && p.catch) p.catch(()=>{});
    }
  }

  // NES-style integer scaling: the canvas always draws at native 256x240,
  // so on a normal desktop-sized screen we don't want it stretched by some
  // random fractional amount (that's what smears pixel art into mush).
  // Whenever we're fullscreen, snap #gameContainer to the largest WHOLE
  // multiple of 256x240 that still fits the screen — x2, x3, x4, etc —
  // and letterbox the leftover space in black. Runs on entering/leaving
  // fullscreen and on resize/orientation-change while fullscreen is active.
  function applyFullscreenScale(){
    const isFs = document.fullscreenElement || document.webkitFullscreenElement;
    if(!isFs){
      // back to windowed: let the CSS (width:100%, aspect-ratio:256/240)
      // handle sizing again instead of our inline override.
      container.style.width = '';
      container.style.height = '';
      return;
    }
    // Filling the screen edge-to-edge takes priority over strict integer
    // scaling: locking to whole multiples (x2/x3/x4...) means whichever
    // multiple is one step too big for the screen gets skipped entirely,
    // leaving a visible gap at the smaller multiple even though something
    // in between would reach the edge. So instead we scale continuously —
    // the constraining axis (whichever of width/height is tighter) always
    // touches its edges exactly, sacrificing perfect pixel squares for a
    // screen that's actually filled, the way most games handle this.
    const rect = gameWrap.getBoundingClientRect();
    const scale = Math.min(rect.width/W, rect.height/H);
    container.style.width  = (W*scale)+'px';
    container.style.height = (H*scale)+'px';
  }
  document.addEventListener('fullscreenchange', applyFullscreenScale);
  document.addEventListener('webkitfullscreenchange', applyFullscreenScale);
  window.addEventListener('resize', applyFullscreenScale);
  if(window.visualViewport) window.visualViewport.addEventListener('resize', applyFullscreenScale);
  // Mobile browser chrome (address bar / nav bar) often finishes hiding a
  // few frames *after* fullscreenchange fires, so gameWrap's box grows a
  // moment later than this event — re-measure on the next few frames to
  // catch that late settle instead of getting stuck on an early, smaller size.
  ['fullscreenchange','webkitfullscreenchange'].forEach(evt=>{
    document.addEventListener(evt, ()=>{
      for(const delay of [50, 150, 300, 600]) setTimeout(applyFullscreenScale, delay);
    });
  });


  gameWrap.addEventListener('touchstart', e=>{
    requestGameFullscreen();
    resumeAudio();
    for(const t of e.changedTouches){
      const loc = getLocal(t);
      const half = loc.scaleX/2;
      if(loc.x < half && !moveTouch.active){
        moveTouch.active = true; moveTouch.id = t.identifier;
        moveTouch.cx = loc.x; moveTouch.cy = loc.y; moveTouch.dx=0; moveTouch.dy=0;
        stickLeft.style.display='block';
        stickLeft.style.left = (loc.x-50)+'px';
        stickLeft.style.top = (loc.y-50)+'px';
        nubLeft.style.left='28px'; nubLeft.style.top='28px';
      } else if(loc.x >= half && !aimTouch.active){
        aimTouch.active = true; aimTouch.id = t.identifier;
        aimTouch.cx = loc.x; aimTouch.cy = loc.y; aimTouch.dx=0; aimTouch.dy=0;
        stickRight.style.display='block';
        stickRight.style.left = (loc.x-50)+'px';
        stickRight.style.top = (loc.y-50)+'px';
        nubRight.style.left='28px'; nubRight.style.top='28px';
      }
    }
    e.preventDefault();
  }, {passive:false});

  gameWrap.addEventListener('touchmove', e=>{
    for(const t of e.changedTouches){
      const loc = getLocal(t);
      if(moveTouch.active && t.identifier===moveTouch.id){
        let dx = loc.x-moveTouch.cx, dy = loc.y-moveTouch.cy;
        const d = Math.hypot(dx,dy);
        if(d>STICK_MAX){ dx = dx/d*STICK_MAX; dy = dy/d*STICK_MAX; }
        moveTouch.dx = dx/STICK_MAX; moveTouch.dy = dy/STICK_MAX;
        nubLeft.style.left = (28+dx)+'px'; nubLeft.style.top = (28+dy)+'px';
      }
      if(aimTouch.active && t.identifier===aimTouch.id){
        let dx = loc.x-aimTouch.cx, dy = loc.y-aimTouch.cy;
        const d = Math.hypot(dx,dy);
        if(d>STICK_MAX){ dx = dx/d*STICK_MAX; dy = dy/d*STICK_MAX; }
        aimTouch.dx = dx/STICK_MAX; aimTouch.dy = dy/STICK_MAX;
        nubRight.style.left = (28+dx)+'px'; nubRight.style.top = (28+dy)+'px';
      }
    }
    e.preventDefault();
  }, {passive:false});

  function endTouch(e){
    for(const t of e.changedTouches){
      if(moveTouch.active && t.identifier===moveTouch.id){
        moveTouch.active=false; moveTouch.dx=0; moveTouch.dy=0;
        stickLeft.style.display='none';
      }
      if(aimTouch.active && t.identifier===aimTouch.id){
        aimTouch.active=false; aimTouch.dx=0; aimTouch.dy=0;
        stickRight.style.display='none';
      }
    }
  }
  gameWrap.addEventListener('touchend', endTouch);
  gameWrap.addEventListener('touchcancel', endTouch);

  // ---------------- Action buttons: interact + switch weapon ----------------
  // Both fixed to the right side of the screen (see CSS), work identically
  // for mouse and touch. stopPropagation on the touch handlers keeps the
  // gameWrap-level touchstart listener above from also treating the same
  // touch as an aim-stick press (they'd otherwise both fire since the
  // buttons are children of gameWrap).
  const interactBtn = document.getElementById('interactBtn');
  const switchWeaponBtn = document.getElementById('switchWeaponBtn');
  const quickKnifeBtn = document.getElementById('quickKnifeBtn');

  function bindActionButton(el, fn){
    el.addEventListener('touchstart', e=>{
      e.preventDefault();
      e.stopPropagation();
      resumeAudio();
      fn();
    }, {passive:false});
    // Mouse/desktop support — guard against the synthetic click a touch
    // would also fire isn't needed since preventDefault on touchstart
    // suppresses it, but real mouse users still need this.
    el.addEventListener('mousedown', e=>{
      e.preventDefault();
      e.stopPropagation();
      resumeAudio();
      fn();
    });
  }
  bindActionButton(interactBtn, tryInteract);
  bindActionButton(switchWeaponBtn, cycleWeapon);
  bindActionButton(quickKnifeBtn, performQuickKnife);

  // ---------------- Helpers ----------------
  // True if the straight segment from (x0,y0) to (x1,y1) is NOT blocked by any wall.
  // Uses the slab method for segment-vs-AABB intersection, treated per wall rect.
  function segClearOfWalls(x0,y0,x1,y1){
    const dx = x1-x0, dy = y1-y0;
    for(const o of sightSolids){
      let tmin = 0, tmax = 1;
      if(Math.abs(dx) < 1e-9){
        if(x0 < o.x || x0 > o.x+o.w) continue;
      } else {
        let t1 = (o.x-x0)/dx, t2 = (o.x+o.w-x0)/dx;
        if(t1>t2){ const tmp=t1; t1=t2; t2=tmp; }
        tmin = Math.max(tmin,t1); tmax = Math.min(tmax,t2);
        if(tmin>tmax) continue;
      }
      if(Math.abs(dy) < 1e-9){
        if(y0 < o.y || y0 > o.y+o.h) continue;
      } else {
        let t1 = (o.y-y0)/dy, t2 = (o.y+o.h-y0)/dy;
        if(t1>t2){ const tmp=t1; t1=t2; t2=tmp; }
        tmin = Math.max(tmin,t1); tmax = Math.min(tmax,t2);
        if(tmin>tmax) continue;
      }
      if(tmax < 0 || tmin > 1) continue;
      return false; // this wall blocks the segment
    }
    return true;
  }

  // Can the player (or anyone) at (x0,y0) see (x1,y1)? Within range AND unobstructed.
  function canSee(x0,y0,x1,y1,maxDist){
    if(Math.hypot(x1-x0, y1-y0) > maxDist) return false;
    return segClearOfWalls(x0,y0,x1,y1);
  }

  // Player vision is a cone facing where they're looking — you can't see
  // what's behind you until you turn toward it. IRL horizontal FOV (both
  // eyes, including peripheral) is roughly 200-210°, leaving a ~150-160°
  // blind spot directly behind you — that's what this models. A small
  // radius right around the player is always visible (you can feel what's
  // immediately underfoot).
  const VIEW_ARC_HALF = Math.PI * (105/180); // 105° each side = 210° total FOV
  const NEAR_RADIUS = 30;
  function playerCanSee(x1,y1,maxDist){
    if(!fogOfWarEnabled) return true;
    const dist = Math.hypot(x1-player.x, y1-player.y);
    if(dist > maxDist) return false;
    if(dist > NEAR_RADIUS){
      const a = Math.atan2(y1-player.y, x1-player.x);
      const diff = Math.atan2(Math.sin(a-player.angle), Math.cos(a-player.angle));
      if(Math.abs(diff) > VIEW_ARC_HALF) return false;
    }
    return segClearOfWalls(player.x, player.y, x1, y1);
  }

  // Recompute which tiles the player can currently see, and permanently mark
  // them explored (dim "remembered" fog once out of sight again).
  // Cheap grid-walk line-of-sight for the visibility sweep: steps tile-by-tile
  // from the player to the target using Bresenham, checking only the MAP
  // cells actually on that line. This is what computeVisibility() uses below
  // instead of segClearOfWalls (which tests the ray against every wallRect —
  // fine for the occasional bullet/enemy check, but far too slow to run for
  // every tile on the map every single frame now that VIEW_RADIUS covers the
  // whole level).
  function tileLOSClear(c0,r0,c1,r1){
    let x=c0, y=r0;
    const dx=Math.abs(c1-c0), dy=-Math.abs(r1-r0);
    const sx = c0<c1?1:-1, sy = r0<r1?1:-1;
    let err = dx+dy;
    while(true){
      if(!(x===c0 && y===r0) && (MAP[y][x]==='#' || MAP[y][x]==='T')) return false;
      if(x===c1 && y===r1) break;
      const e2 = 2*err;
      if(e2>=dy){ err+=dy; x+=sx; }
      if(e2<=dx){ err+=dx; y+=sy; }
    }
    return true;
  }

  // Skip the whole sweep on frames where the player hasn't moved or turned
  // enough to change what's visible — standing still (or paused on a menu)
  // should cost nothing.
  let lastVisX=null, lastVisY=null, lastVisAngle=null;
  function computeVisibility(){
    if(lastVisX!==null){
      const moved = Math.hypot(player.x-lastVisX, player.y-lastVisY) > 1;
      const turned = Math.abs(Math.atan2(Math.sin(player.angle-lastVisAngle), Math.cos(player.angle-lastVisAngle))) > 0.01;
      if(!moved && !turned) return;
    }
    lastVisX=player.x; lastVisY=player.y; lastVisAngle=player.angle;

    visibleGrid.fill(0);
    const radiusTiles = Math.ceil(VIEW_RADIUS/TILE)+1;
    const pcRow = Math.floor(player.y/TILE), pcCol = Math.floor(player.x/TILE);
    const rowStart = Math.max(0,pcRow-radiusTiles), rowEnd = Math.min(ROWS-1,pcRow+radiusTiles);
    const colStart = Math.max(0,pcCol-radiusTiles), colEnd = Math.min(COLS-1,pcCol+radiusTiles);

    for(let row=rowStart; row<=rowEnd; row++){
      for(let col=colStart; col<=colEnd; col++){
        if(MAP[row][col] === '#' || MAP[row][col] === 'T') continue; // wall/tree tiles handled below
        const tcx = col*TILE+TILE/2, tcy = row*TILE+TILE/2;
        const dist = Math.hypot(tcx-player.x, tcy-player.y);
        if(dist > VIEW_RADIUS) continue;
        if(dist > NEAR_RADIUS){
          const a = Math.atan2(tcy-player.y, tcx-player.x);
          const diff = Math.atan2(Math.sin(a-player.angle), Math.cos(a-player.angle));
          if(Math.abs(diff) > VIEW_ARC_HALF) continue;
        }
        if(!tileLOSClear(pcCol, pcRow, col, row)) continue;
        const idx = row*COLS+col;
        visibleGrid[idx] = 1;
        exploredGrid[idx] = 1;
      }
    }
    // reveal the near face of any wall/tree next to a visible tile, so they
    // don't vanish the instant you stand right in front of them
    for(let row=rowStart; row<=rowEnd; row++){
      for(let col=colStart; col<=colEnd; col++){
        if(MAP[row][col] !== '#' && MAP[row][col] !== 'T') continue;
        const idx = row*COLS+col;
        let lit = false;
        for(let dr=-1; dr<=1 && !lit; dr++){
          for(let dc=-1; dc<=1 && !lit; dc++){
            const nr=row+dr, nc=col+dc;
            if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
            if(visibleGrid[nr*COLS+nc]) lit = true;
          }
        }
        if(lit){ visibleGrid[idx]=1; exploredGrid[idx]=1; }
      }
    }
  }

  function circleRectCollide(cx, cy, cr, rx, ry, rw, rh){
    const nx = Math.max(rx, Math.min(cx, rx+rw));
    const ny = Math.max(ry, Math.min(cy, ry+rh));
    const dx = cx-nx, dy = cy-ny;
    return (dx*dx+dy*dy) < cr*cr;
  }
  // Pushes two overlapping circular entities apart along the line between
  // their centers, splitting the correction evenly. If they're dead-on
  // stacked (distance ~0, e.g. two things spawned on the same tile) picks a
  // random push direction instead of dividing by zero, so they don't stay
  // glued together forever.
  function pushEntitiesApart(a, b){
    let dx = b.x-a.x, dy = b.y-a.y;
    let dist = Math.hypot(dx,dy);
    const minDist = a.r+b.r;
    if(dist >= minDist) return;
    if(dist < 0.001){
      const ang = Math.random()*Math.PI*2;
      dx = Math.cos(ang); dy = Math.sin(ang);
      dist = 1;
    }
    const ux = dx/dist, uy = dy/dist;
    const overlap = (minDist-dist)/2;
    a.x -= ux*overlap; a.y -= uy*overlap;
    b.x += ux*overlap; b.y += uy*overlap;
  }

  // Nobody should be able to walk through — let alone actively merge into —
  // the player or another enemy. Checks the player against every living
  // enemy, and every living enemy against every other living enemy, then
  // re-clamps everyone against walls/world bounds in case a push shoved
  // someone straight into one.
  function resolveEntityCollisions(){
    for(let i=0;i<enemies.length;i++){
      const e1 = enemies[i];
      if(!e1.alive) continue;
      pushEntitiesApart(player, e1);
      for(let j=i+1;j<enemies.length;j++){
        const e2 = enemies[j];
        if(!e2.alive) continue;
        pushEntitiesApart(e1, e2);
      }
    }
    resolveObstacles(player);
    for(const e of enemies){ if(e.alive) resolveObstacles(e); }
  }

  function resolveObstacles(entity){
    for(const o of movementSolids){
      if(circleRectCollide(entity.x, entity.y, entity.r, o.x, o.y, o.w, o.h)){
        // push out along shortest axis
        const cx = Math.max(o.x, Math.min(entity.x, o.x+o.w));
        const cy = Math.max(o.y, Math.min(entity.y, o.y+o.h));
        let dx = entity.x-cx, dy = entity.y-cy;
        let d = Math.hypot(dx,dy) || 0.001;
        dx/=d; dy/=d;
        const overlap = entity.r-d;
        if(overlap>0){ entity.x += dx*overlap; entity.y += dy*overlap; }
      }
    }
    for(const o of windowRects){
      if(o.broken) continue; // shattered — no vaulting animation, it's just a walkable gap now
      if(circleRectCollide(entity.x, entity.y, entity.r, o.x, o.y, o.w, o.h)){
        const cx = Math.max(o.x, Math.min(entity.x, o.x+o.w));
        const cy = Math.max(o.y, Math.min(entity.y, o.y+o.h));
        let dx = entity.x-cx, dy = entity.y-cy;
        let d = Math.hypot(dx,dy) || 0.001;
        dx/=d; dy/=d;
        const overlap = entity.r-d;
        if(overlap>0){ entity.x += dx*overlap; entity.y += dy*overlap; }
      }
    }
    for(const o of crates){
      if(!o.alive) continue; // broken crates leave bare floor — nothing left to block movement
      if(circleRectCollide(entity.x, entity.y, entity.r, o.x, o.y, o.w, o.h)){
        const cx = Math.max(o.x, Math.min(entity.x, o.x+o.w));
        const cy = Math.max(o.y, Math.min(entity.y, o.y+o.h));
        let dx = entity.x-cx, dy = entity.y-cy;
        let d = Math.hypot(dx,dy) || 0.001;
        dx/=d; dy/=d;
        const overlap = entity.r-d;
        if(overlap>0){ entity.x += dx*overlap; entity.y += dy*overlap; }
      }
    }
    entity.x = Math.max(entity.r, Math.min(WORLD_W-entity.r, entity.x));
    entity.y = Math.max(entity.r, Math.min(WORLD_H-entity.r, entity.y));
  }

  // Multiple hits landing on the same enemy in the same frame (a shotgun's
  // 8-9 pellets, most obviously) used to each spawn their own tiny number —
  // a wall of "5 5 5 5 5" that's unreadable at a glance. Instead, damage is
  // accumulated per-enemy here and flushed into ONE combined number
  // (Apex-Legends-style) right at the start of the next update() tick —
  // i.e. covering everything that happened since the previous flush,
  // whether from the bullet loop, a melee swing, or anything else.
  const hitAccum = new Map(); // enemy object -> {amount, x, y, r}
  function accumulateHitNumber(e, amount){
    let p = hitAccum.get(e);
    if(!p){ p = {amount:0, x:e.x, y:e.y, r:e.r}; hitAccum.set(e, p); }
    p.amount += amount;
    p.x = e.x; p.y = e.y; p.r = e.r; // keep the freshest position in case the enemy moved between hits
  }
  function flushHitAccum(){
    for(const p of hitAccum.values()){
      spawnHitNumber(p.x, p.y - p.r, p.amount);
    }
    hitAccum.clear();
  }

  // A floating damage number that pops up where a hit landed and drifts
  // upward while fading — classic action-RPG "hit number" feedback.
  // Amount is rounded to a whole number and spelled out digit-by-digit
  // using the ui/#.png glyphs (see TEXTURES.ui.numbers). Called from
  // flushHitAccum() above, not directly from hit-detection code — see
  // accumulateHitNumber().
  function spawnHitNumber(x, y, amount){
    const rounded = Math.max(0, Math.round(amount));
    hitNumbers.push({
      x: x + (Math.random()*8-4), // slight horizontal jitter so stacked hits don't perfectly overlap
      y: y - TILE*0.3,
      vy: -TILE*1.1,
      age: 0,
      life: 0.7,
      text: String(rounded)
    });
  }

  function spawnImpact(x, y, kind){
    const n = kind==='glass' ? 7 : 5;
    for(let i=0;i<n;i++){
      impacts.push({
        x, y,
        angle: Math.random()*Math.PI*2,
        len: (kind==='glass' ? 10 : 7) + Math.random()*10,
        age: 0,
        life: 0.16 + Math.random()*0.1,
        kind
      });
    }
  }

  function fireBullet(fromX, fromY, angle, friendly, spreadOverride, dmgOverride, spdOverride, lifeOverride, wallRetentionOverride, owner){
    const spread = spreadOverride!==undefined ? spreadOverride : weapon.spread;
    const a = angle + (Math.random()-0.5)*spread;
    const spd = spdOverride!==undefined ? spdOverride : weapon.bulletSpeed;
    bullets.push({
      x: fromX, y: fromY,
      originX: fromX, originY: fromY, // fixed muzzle position — unlike x/y this never moves, so it's still usable as "where that shot came from" after the bullet's traveled or is long gone
      vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: lifeOverride!==undefined ? lifeOverride : weapon.life,
      baseDmg: dmgOverride!==undefined ? dmgOverride : weapon.damage, // damage at muzzle velocity — actual damage dealt scales with however much velocity is left when it hits
      wallRetention: wallRetentionOverride!==undefined ? wallRetentionOverride : weapon.wallRetention, // per-caliber wall penetration — see WALL_PENETRATION_BY_AMMO
      muzzleSpeed: spd,
      friendly,
      owner: owner || (friendly ? player : null), // whoever fired this — never hits its own shooter, see the impact-resolution loop below
      wasInsideWall: false
    });
    // A gunshot is loud regardless of who fired it — any already-aggroed
    // enemy within earshot (investigating or sweeping, not actively
    // chasing with eyes on you) redirects toward where the sound came
    // from instead of wherever they were previously headed. Enemies who
    // haven't noticed the player at all yet stay oblivious — this only
    // redirects an already-alerted search, it doesn't start one.
    alertToSound(fromX, fromY);
  }

  // See fireBullet above for when this fires. Redirects any already-alerted
  // (investigating/sweeping) enemy within earshot straight away, same as
  // before — but a gunshot is loud enough that it can also snap a fully
  // oblivious ('idle') enemy into searching from scratch, just at a shorter
  // range than an already-listening enemy would pick it up from (and
  // muffled further if a wall sits between the shot and the listener).
  // 'chase' (already has real LOS) and 'flee' (busy running) ignore this,
  // same as they ignore footsteps.
  const SHOT_HEAR_RANGE_IDLE = 24 * TILE;
  function alertToSound(x, y){
    for(const e of enemies){
      if(!e.alive || !e.alertState || e.alertState === 'chase' || e.alertState === 'flee') continue;
      if(e.alertState === 'idle'){
        const clear = canSee(e.x, e.y, x, y, SHOT_HEAR_RANGE_IDLE);
        const range = clear ? SHOT_HEAR_RANGE_IDLE : SHOT_HEAR_RANGE_IDLE*0.4;
        if(Math.hypot(e.x-x, e.y-y) > range) continue;
        e.aware = true;
      } else {
        if(Math.hypot(e.x-x, e.y-y) > SOUND_RANGE.shot) continue;
      }
      e.lastSeenX = x; e.lastSeenY = y;
      e.alertState = 'investigate';
      e.investigateTimer = INVESTIGATE_TIME;
    }
  }

  // Footsteps are quiet — nowhere near as loud/far-carrying as a gunshot —
  // but a real person does keep half an ear out for them. Two tiers:
  //   - Already alert (investigating/sweeping): actively listening, so they
  //     pick footsteps up from a fair distance and redirect toward them,
  //     same as a gunshot would (a 'chase' enemy already has real LOS and
  //     ignores this — they don't need a sound cue — and a 'flee'ing enemy
  //     is busy running away, not listening for where to go next).
  //   - Completely oblivious (idle): footsteps alone CAN start a fresh
  //     search, but only at fairly close range, and muffled down further
  //     if there's a wall between the enemy and the source.
  const FOOTSTEP_HEAR_RANGE_ALERT = 14 * TILE;
  const FOOTSTEP_HEAR_RANGE_IDLE = 6 * TILE;
  function alertToFootstep(x, y, source){
    for(const e of enemies){
      if(!e.alive || !e.alertState || e === source) continue;
      const dist = Math.hypot(e.x-x, e.y-y);
      if(e.alertState === 'investigate' || e.alertState === 'sweep'){
        if(dist > FOOTSTEP_HEAR_RANGE_ALERT) continue;
        e.lastSeenX = x; e.lastSeenY = y;
        e.alertState = 'investigate';
        e.investigateTimer = INVESTIGATE_TIME;
      } else if(e.alertState === 'idle'){
        const clear = canSee(e.x, e.y, x, y, FOOTSTEP_HEAR_RANGE_IDLE);
        const range = clear ? FOOTSTEP_HEAR_RANGE_IDLE : FOOTSTEP_HEAR_RANGE_IDLE*0.35;
        if(dist > range) continue;
        e.aware = true;
        e.lastSeenX = x; e.lastSeenY = y;
        e.alertState = 'investigate';
        e.investigateTimer = INVESTIGATE_TIME;
      }
      // 'chase' (already sees you) and 'flee' (running scared) ignore footstep cues
    }
  }

  // Fires one shot from enemy `e` toward `targetAngle`, same aim-error/wall-
  // penetration/reload rules as the AI loop's own fire logic — factored out
  // so both the normal chase fire loop AND the instant "shot back through
  // the wall" reaction (see enemyGotShot below) share one implementation.
  function enemyFireShotAt(e, targetAngle){
    const wd = e.weaponDef;
    e.shotCd = Math.max(0.15, wd.cooldown);
    e.ammo -= 1;
    const pelletCount = wd.pellets || 1;
    const wdWallRetention = WALL_PENETRATION_BY_AMMO[wd.ammoType] !== undefined
      ? WALL_PENETRATION_BY_AMMO[wd.ammoType]
      : WALL_PENETRATION_RETENTION_PER_M;
    const fireAngle = targetAngle + (Math.random()-0.5)*ENEMY_AIM_ERROR;
    for(let p=0; p<pelletCount; p++){
      fireBullet(e.x, e.y, fireAngle, false, wd.spread, wd.damage, wd.bulletSpeed, wd.life, wdWallRetention, e);
    }
    emitSound(e.x, e.y, 'shot'); // gunfire is loud — always reveals exact position
    // Magazine empty — same reload downtime the player eats, no free
    // pass. A high-capacity/belt-fed roll (magSize in the hundreds)
    // just means this essentially never comes up.
    if(e.ammo<=0){
      e.reloading = true;
      e.reloadTimer = wd.reloadTime || 1.5;
    }
  }

  // Getting shot is its own, louder wake-up call than merely hearing
  // gunfire — a bullet that actually lands (even one that punched through
  // a wall to do it) tells an enemy almost exactly where the player is.
  // Unlike a normal LOS loss, this skips straight past "investigate" being
  // gated on line of sight: they instantly know roughly where you are.
  // What they DO about that varies by archetype (see pickArchetype) and how
  // hurt/blindsided they are — see the reaction table in the comments below.
  function enemyGotShot(e, bullet){
    enemyGotHit(e, bullet.originX, bullet.originY, bullet);
  }
  // sourceX/sourceY is wherever the hit came from (a bullet's muzzle
  // position, or the player's own position for a melee hit) — `bullet` is
  // optional and only used for the reflexive shot-back angle, so melee hits
  // can share this same reaction logic without a fake bullet object.
  function enemyGotHit(e, sourceX, sourceY, bullet){
    e.aware = true;
    e.lastSeenX = sourceX; e.lastSeenY = sourceY;

    // Zombies: no fear, no gun, no decision to make — getting hurt just
    // makes them charge harder, like a wounded animal would.
    if(!e.weaponDef){
      e.alertState = 'investigate';
      e.investigateTimer = INVESTIGATE_TIME;
      e.chargeTimer = RUSHER_CHARGE_TIME;
      e.chargeSpeedMul = RUSHER_CHARGE_SPEED_MUL;
      return;
    }

    const hpFrac = e.hp / e.maxHp;
    const hadLOSAtHit = canSee(e.x, e.y, sourceX, sourceY, 320);

    // Pain and fear can override aggression outright. Cowards bolt easily;
    // even a rusher can break if they're hurt badly enough. Getting hit by
    // someone you never even saw coming nudges everyone a bit further
    // toward flight — that's the scarier version of "getting shot."
    const panicChance =
      (e.archetype === 'coward' ? 0.7 : e.archetype === 'tactical' ? 0.35 : 0.12)
      + (hpFrac < FLEE_HP_FRAC_THRESHOLD ? 0.4 : 0)
      + (!hadLOSAtHit ? 0.15 : 0);
    if(Math.random() < panicChance){
      e.alertState = 'flee';
      e.fleeTimer = FLEE_TIME;
      e.fleeAngle = Math.atan2(e.y-sourceY, e.x-sourceX); // straight away from wherever the hit came from
      alertToSound(e.x, e.y); // their panic drags any nearby searching enemy toward this spot too, same as a shout would
      return;
    }

    e.alertState = 'investigate';
    e.investigateTimer = INVESTIGATE_TIME;
    e.reactionShootTimer = REACTION_SHOOT_WINDOW;
    e.blindFireCd = 0.2 + Math.random()*0.3;

    if(e.archetype === 'rusher'){
      // Adrenaline over caution: charges straight at the source faster
      // than a normal walk instead of pathing over there carefully.
      e.chargeTimer = RUSHER_CHARGE_TIME;
      e.chargeSpeedMul = RUSHER_CHARGE_SPEED_MUL;
    } else if(e.archetype === 'tactical'){
      // A trained reaction: duck/brace for a half-beat before doing
      // anything else, rather than instantly snapping into motion.
      e.flinchTimer = TACTICAL_FLINCH_TIME;
    }

    // Reflexive shot straight back at wherever the hit came from — real
    // even when they never actually saw the shooter, just the impact
    // direction. Bullets already punch through walls in this game (see
    // wallRetention), so firing blind through one is consistent with how
    // the rest of combat already works.
    if(!e.reloading && e.ammo>0){
      const backAngle = Math.atan2(sourceY-e.y, sourceX-e.x);
      enemyFireShotAt(e, backAngle);
    }
  }


  function angleDiff(a, b){
    return Math.atan2(Math.sin(a-b), Math.cos(a-b));
  }

  // A melee swing is a wide arc sweep centered on the player's facing angle —
  // it hits anything inside the arc+range in one motion, unlike a directional
  // stab. `angleOverride` lets the quick-knife stab sweep toward the
  // direction you're currently moving instead of player.angle (which
  // regular equipped-melee swings still use by default).
  function performSwing(mw, angleOverride){
    const angle = angleOverride!==undefined ? angleOverride : player.angle;
    swingEffects.push({
      x: player.x, y: player.y, angle: angle,
      arc: mw.arc, range: mw.range,
      timer: mw.swingDuration, maxTimer: mw.swingDuration
    });

    for(const o of windowRects){
      if(o.broken) continue;
      const wx = o.x+o.w/2, wy = o.y+o.h/2;
      const dist = Math.hypot(wx-player.x, wy-player.y);
      if(dist < mw.range + TILE/2){
        const a = Math.atan2(wy-player.y, wx-player.x);
        if(Math.abs(angleDiff(a, angle)) <= mw.arc/2){
          o.broken = true;
          emitSound(wx, wy, 'break');
        }
      }
    }

    for(let ei=0; ei<enemies.length; ei++){
      const e = enemies[ei];
      if(!e.alive) continue;
      const dist = Math.hypot(e.x-player.x, e.y-player.y);
      if(dist < mw.range + e.r){
        const a = Math.atan2(e.y-player.y, e.x-player.x);
        if(Math.abs(angleDiff(a, angle)) <= mw.arc/2){
          e.hp -= mw.damage;
          accumulateHitNumber(e, mw.damage);
          // small knockback along the swing direction
          e.x += Math.cos(angle)*10;
          e.y += Math.sin(angle)*10;
          if(e.hp<=0){
            onEnemyKilled(e, ei);
          } else {
            enemyGotHit(e, player.x, player.y); // getting stabbed provokes the same flee/rush/tactical reaction a gunshot would, just sourced from melee range instead of a bullet
          }
        }
      }
    }

    // knife/melee can crack a crate open too, same arc-sweep test as
    // enemies — approximated as a circle using the crate's longer side
    // since it's a rectangle, not round
    for(const c of crates){
      if(!c.alive) continue;
      const ccx = c.x+c.w/2, ccy = c.y+c.h/2;
      const cr = Math.max(c.w, c.h)/2;
      const dist = Math.hypot(ccx-player.x, ccy-player.y);
      if(dist < mw.range + cr){
        const a = Math.atan2(ccy-player.y, ccx-player.x);
        if(Math.abs(angleDiff(a, angle)) <= mw.arc/2){
          damageCrate(c, mw.damage);
        }
      }
    }
  }

  // Quick knife: available at all times regardless of what's actually in
  // hand (gun, dual-wield, whatever) — it does NOT touch player.equipped or
  // either ranged slot, it's just a knife stab thrown in on top. Shares the
  // knife's own cd/cooldown, so it can't be spammed faster than actually
  // wielding the knife could. Stabs toward wherever you're currently
  // moving, falling back to your aim/facing angle if you're standing still.
  function performQuickKnife(){
    if(knifeItem.cd > 0) return;
    knifeItem.cd = knifeItem.cooldown;
    const angle = (lastMoveDirX || lastMoveDirY) ? Math.atan2(lastMoveDirY, lastMoveDirX) : player.angle;
    performSwing(knifeItem, angle);
  }

  // ---------------- FPS view mode ----------------
  // Top-down or Daggerfall-style true-3D. The 3D renderer itself lives in
  // the optional nesshooter-3d.js addon (window.NesShooter3D); if that
  // script isn't loaded, the FPS toggle is disabled and the game just runs
  // top-down.
  let viewMode = 0; // 0=top-down, 1=daggerfall(textured real-3d)
  let fpsMode = false;
  const fpsToggleBtn = document.getElementById('fpsToggleBtn');
  const fpsToggleLabel = document.getElementById('fpsToggleLabel');
  const VIEW_NAMES = ['Top-Down','First-Person (Daggerfall)'];
  const addon3D = window.NesShooter3D ? window.NesShooter3D.init({
    ctx, canvas, player, MAP, ROWS, COLS, TILE, W, H,
    aimTouch, mouse, keys, moveTouch,
    resolveObstacles, isIndoors, drawTopHud
  }) : null;
  if(!addon3D){
    fpsToggleBtn.disabled = true;
    fpsToggleBtn.title = 'nesshooter-3d.js addon not loaded';
  }
  fpsToggleBtn.addEventListener('click', ()=>{
    if(!addon3D) return;
    viewMode = (viewMode+1)%2;
    fpsMode = viewMode !== 0;
    if(fpsMode) canvas.requestPointerLock && canvas.requestPointerLock();
    else document.exitPointerLock && document.exitPointerLock();
    fpsToggleBtn.setAttribute('aria-pressed', String(fpsMode));
    fpsToggleBtn.classList.toggle('off', !fpsMode);
    fpsToggleLabel.textContent = 'View: '+VIEW_NAMES[viewMode];
  });

  // ---------------- Main loop ----------------
  let last = performance.now();
  function loop(now){
    const dtReal = Math.min(0.05, (now-last)/1000);
    last = now;

    const stepUpdate = (stepDt) => {
      if(fpsMode && addon3D) addon3D.update(stepDt);
      else update(stepDt);
    };

    if(ntscAuthenticTiming){
      // Fixed-timestep accumulator: the simulation advances in exact
      // 1/60.0988s slices regardless of how often rAF actually fires, so
      // it matches real NTSC hardware timing on any display. Clamp the
      // accumulator so a stalled/backgrounded tab doesn't dump a huge
      // catch-up burst of updates the instant it resumes.
      ntscAccumulator = Math.min(ntscAccumulator + dtReal, NTSC_FRAME_TIME * 4);
      while(ntscAccumulator >= NTSC_FRAME_TIME){
        stepUpdate(NTSC_FRAME_TIME);
        ntscAccumulator -= NTSC_FRAME_TIME;
      }
    } else {
      stepUpdate(dtReal);
    }

    if(fpsMode && addon3D) addon3D.render();
    else render();

    if(nesPaletteEnabled) applyNesPalette();
    const crtActive = crtEnabled && crtReady;
    if(crtActive) drawCRTFrame();
    // Flat fallback only — when CRT is active it already bakes the LED
    // split into the shader above, combined with the curvature.
    if(ledPixelsEnabled && !crtActive) drawLedPixels();
    requestAnimationFrame(loop);
  }

  function update(dt){
    // Combine and pop any damage-number hits accumulated since the last
    // tick into single merged numbers — see accumulateHitNumber/
    // flushHitAccum above for why this isn't just spawned immediately.
    flushHitAccum();

    // ---- screen-scroll transition freeze ----
    // While the camera is mid-pan between sectors, the whole simulation
    // freezes — player input, enemy AI, bullets, everything — and only the
    // pan itself advances, exactly like a Zelda/Mega Man screen transition
    // (NESScroll freezes Game_Player + Game_Event entirely while locked).
    if(screenScroller.locked){
      scrollerUpdateTransition();
      return;
    }

    // ---- movement input ----
    let mx=0, my=0;
    // Physical WASD positions — code is layout-independent, so this is
    // W/A/S/D on a QWERTY board and Z/Q/S/D on an AZERTY board (same keys,
    // physically), without needing to detect which layout the player has.
    if(codes['KeyW']||keys['arrowup']) my-=1;
    if(codes['KeyS']||keys['arrowdown']) my+=1;
    if(codes['KeyA']||keys['arrowleft']) mx-=1;
    if(codes['KeyD']||keys['arrowright']) mx+=1;
    if(moveTouch.active){
      const mmag = Math.hypot(moveTouch.dx, moveTouch.dy);
      const MOVE_DEADZONE = 0.15;
      if(mmag > MOVE_DEADZONE){
        // Full power regardless of how far past the deadzone you push —
        // only the direction matters, going gentle on the stick shouldn't
        // mean walking slower.
        mx = moveTouch.dx / mmag;
        my = moveTouch.dy / mmag;
      }
    }

    const mlen = Math.hypot(mx,my);
    const moveAngle = mlen>0 ? Math.atan2(my,mx) : null;

    // isAiming: gun/character is pointed at aimAngle (drives facing + the
    // movement speed penalty). fireHeld: trigger is actually being pulled.
    // Deflecting the right stick always fires/swings, same as pulling the
    // mouse trigger.
    let fireHeld = false, aimAngle = null, isAiming = false;
    if(aimTouch.active && Math.hypot(aimTouch.dx,aimTouch.dy) > 0.25){
      aimAngle = Math.atan2(aimTouch.dy, aimTouch.dx);
      isAiming = true;
      fireHeld = true;
    } else if(mouse.active){
      const worldMouseX = mouse.x + camera.x - W/2;
      const worldMouseY = mouse.y + camera.y - H/2;
      aimAngle = Math.atan2(worldMouseY-player.y, worldMouseX-player.x);
      fireHeld = mouse.down;
      isAiming = mouse.down;
    }

    // Facing (gun + line-of-sight cone): follows the direction you're walking
    // by default. Actively aiming (shooting) overrides that and snaps to
    // your aim instead.
    // Standing still and not aiming just keeps your last facing.
    if(isAiming && aimAngle!==null){
      player.angle = aimAngle;
    } else if(moveAngle!==null){
      player.angle = moveAngle;
    }
    // Sprite only has left/right art, no rotation — pick a side from
    // whichever angle we just settled on, keeping the last side while
    // aiming/moving is exactly vertical (cos ~ 0) instead of flickering.
    if(Math.abs(Math.cos(player.angle)) > 0.01){
      player.facingRight = Math.cos(player.angle) >= 0;
    }

    // Movement speed: full speed unless you're aiming (shooting, or
    // free-looking), in which case it depends on how your movement lines up
    // with where you're facing.
