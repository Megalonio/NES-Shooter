    let speedMul = 1;
    if(isAiming && moveAngle!==null){
      const diff = Math.abs(angleDiff(moveAngle, player.angle));
      if(diff <= Math.PI/4)      speedMul = 0.90; // forward
      else if(diff >= Math.PI*3/4) speedMul = 0.50; // backward
      else                        speedMul = 0.75; // strafing sideways
    }
    if(isOnSand(player.x, player.y)) speedMul *= 0.75; // soft sand — 25% slower
    if(!player.equipped) speedMul *= weapon.speedMul; // heavy ranged weapons (minigun) carry their own flat penalty, on top of aim-strafe

    if(mlen>0){
      const nx = mx / (mlen>1?mlen:1);
      const ny = my / (mlen>1?mlen:1);
      lastMoveDirX = nx; lastMoveDirY = ny;
      player.x += nx*player.speed*speedMul*dt*Math.min(mlen,1);
      player.y += ny*player.speed*speedMul*dt*Math.min(mlen,1);

      // footsteps — cadence scales with actual movement speed so sprinting
      // taps out faster steps than a slowed aim-strafe
      player.footstepTimer -= dt;
      if(player.footstepTimer<=0){
        playFootstep(player.x, player.y, 1, 0.5, surfaceAt(player.x, player.y));
        alertToFootstep(player.x, player.y);
        player.footstepTimer = 0.32 / Math.max(0.35, speedMul*Math.min(mlen,1));
      }
    } else {
      player.footstepTimer = 0;
    }

    player.moving = mlen>0;
    advanceAnim(player.anim, player.moving, dt);

    resolveObstacles(player);

    // ---- house door trigger ----
    // Outdoors, stepping onto a house's door tile enters it. Indoors,
    // stepping onto that same tile (now sitting on the stage instead) exits
    // back out. See enterHouse/exitHouse above.
    {
      const t = worldToTile(player.x, player.y);
      if(!insideHouse){
        const h = HOUSE_DOOR_LOOKUP.get(t.row+','+t.col);
        if(h) enterHouse(h);
      } else if(t.row-INTERIOR_ROW0 === insideHouse.interior.doorLocalRow && t.col === insideHouse.interior.doorLocalCol){
        exitHouse();
      }
    }

    if(fogOfWarEnabled) computeVisibility();

    // ---- weapon: melee swing if a weapon is equipped, else sidearm ----
    // Quick knife has its own life independent of whatever's actually in
    // hand — tick its cooldown here unconditionally (unless the knife IS
    // what's equipped, in which case the branch below already ticks this
    // same object via `mw`, so don't double-decrement it).
    if(player.equipped !== knifeItem) knifeItem.cd -= dt;
    if(player.equipped){
      const mw = player.equipped;
      mw.cd -= dt;
      if(fireHeld && mw.cd<=0){
        mw.cd = mw.cooldown;
        performSwing(mw);
      }
    } else if(activeRangedSlot === 'dual'){
      // Dual wield: both hands tick their own cooldown and fire independently
      // off their own stats, but they share one reload — neither reloads
      // alone, both go down together once BOTH mags are empty. Bullets spawn
      // offset left/right of the player's facing instead of dead-center, to
      // sell "two separate guns" rather than one double-barreled shot.
      mainWeapon.cd -= dt;
      sidearmWeapon.cd -= dt;

      if(mainWeapon.reloading){
        // Both hands were put into lockstep reload together (see below) —
        // only need to track one timer since they always match.
        mainWeapon.reloadTimer -= dt;
        sidearmWeapon.reloadTimer -= dt;
        if(mainWeapon.reloadTimer<=0){
          mainWeapon.reloading = false;
          sidearmWeapon.reloading = false;
          mainWeapon.ammo = mainWeapon.magSize;
          sidearmWeapon.ammo = sidearmWeapon.magSize;
        }
      } else {
        if(fireHeld){
          const perpAngle = player.angle + Math.PI/2;
          const handOffset = 6; // px each hand sits from the centerline, scaled with the rest of the shrunk-down world
          const hands = [ {w: mainWeapon, side: -1}, {w: sidearmWeapon, side: 1} ];
          for(const h of hands){
            const hw = h.w;
            if(hw.cd<=0 && hw.ammo>0){
              hw.cd = hw.cooldown;
              hw.ammo -= 1;
              const fx = player.x + Math.cos(player.angle)*player.r + Math.cos(perpAngle)*handOffset*h.side;
              const fy = player.y + Math.sin(player.angle)*player.r + Math.sin(perpAngle)*handOffset*h.side;
              const pelletCount = hw.pellets || 1;
              for(let p=0; p<pelletCount; p++){
                fireBullet(fx, fy, player.angle, true, hw.spread, hw.damage, hw.bulletSpeed, hw.life, hw.wallRetention);
              }
              playGunshot(player.x, player.y, true);
            }
          }
        }
        // Reload together only once BOTH mags are dry — never one at a time.
        if(mainWeapon.ammo<=0 && sidearmWeapon.ammo<=0){
          if(mainWeapon.reloadsLeft>0 && sidearmWeapon.reloadsLeft>0){
            mainWeapon.reloadsLeft -= 1;
            sidearmWeapon.reloadsLeft -= 1;
            const rt = Math.max(mainWeapon.reloadTime, sidearmWeapon.reloadTime);
            mainWeapon.reloading = true; sidearmWeapon.reloading = true;
            mainWeapon.reloadTimer = rt; sidearmWeapon.reloadTimer = rt;
            playReload(rt);
          } else {
            // At least one side already burned its one reload — both are
            // dead weight now, same "stays in slot, drop to knife" rule as
            // a single gun running fully dry.
            player.equipped = knifeItem;
          }
        }
      }
    } else {
      weapon.cd -= dt;

      // Spin-up (minigun): barrels spool while the trigger's held and
      // there's ammo to feed, and coast back down the moment you let go —
      // whether or not you're still holding a mag. Runs every frame,
      // independent of the fire/reload branches below.
      if(weapon.spinUp){
        if(fireHeld && weapon.ammo>0){
          weapon.spin = Math.min(1, weapon.spin + dt/weapon.spinUpTime);
        } else {
          weapon.spin = Math.max(0, weapon.spin - dt/weapon.spinDownTime);
        }
      }

      if(weapon.reloading){
        weapon.reloadTimer -= dt;
        if(weapon.reloadTimer<=0){
          weapon.reloading = false;
          weapon.ammo = weapon.magSize;
        }
      } else if(fireHeld && weapon.cd<=0 && weapon.ammo>0){
        // Effective cooldown ramps from spinMinMul*cooldown (cold barrels)
        // down to the base cooldown (fully spun) as spin approaches 1 —
        // for non-spin-up weapons spinMinMul defaults to 1 so this is a no-op.
        const coldCooldown = weapon.cooldown * weapon.spinMinMul;
        weapon.cd = coldCooldown + (weapon.cooldown - coldCooldown) * weapon.spin;
        weapon.ammo -= 1;
        const pelletCount = weapon.pellets || 1;
        for(let p=0; p<pelletCount; p++){
          fireBullet(
            player.x + Math.cos(player.angle)*player.r,
            player.y + Math.sin(player.angle)*player.r,
            player.angle, true
          );
        }
        playGunshot(player.x, player.y, true);
        // magazine empty
        if(weapon.ammo<=0){
          if(weapon.spinUp || weapon.reloadsLeft<=0){
            // Belt-fed (no reload ever existed) or the one allotted reload
            // is already spent — either way this gun is done for now. It
            // stays in its slot empty; hand automatically swaps to the
            // other ranged slot (if it has ammo) or the knife.
            weaponRanOut();
          } else {
            // Burn the one reload this pickup came with — next time it
            // runs dry there won't be another.
            weapon.reloadsLeft -= 1;
            weapon.reloading = true;
            weapon.reloadTimer = weapon.reloadTime;
            playReload(weapon.reloadTime);
          }
        }
      }
    }

    // ---- melee swing visual sweeps ----
    for(let i=swingEffects.length-1;i>=0;i--){
      swingEffects[i].timer -= dt;
      if(swingEffects[i].timer<=0) swingEffects.splice(i,1);
    }

    // ---- sound pulses (footsteps only — see emitSound) ----
    for(let i=soundPulses.length-1;i>=0;i--){
      const p = soundPulses[i];
      p.age += dt;
      // worst case: the wavefront takes maxDist/SOUND_SPEED to reach the
      // farthest point it could still be heard from, then lingers visually
      // for p.duration once it arrives — only discard after that's elapsed
      const worstCaseArrival = p.maxDist/SOUND_SPEED;
      if(p.age > worstCaseArrival + p.duration) soundPulses.splice(i,1);
    }

    // ---- bullets ----
    // At a realistic muzzle velocity a bullet can move 100-250+ px in a
    // single frame — more than a wall's 40px thickness or a character's
    // ~15px radius, which would let it tunnel straight through without ever
    // registering a hit if we only checked its position once per frame. So
    // each bullet's frame movement is broken into small sub-steps (fine
    // enough to not skip past anything solid), and every sub-step re-checks
    // walls/windows/characters at that finer resolution — same collision
    // rules as before, just sampled densely enough to actually catch them.
    //
    // Within that: air drag trims velocity a tiny amount continuously, wood
    // walls take a lot more per meter actually punched through (so a wall
    // right behind another costs roughly double), and damage on impact
    // scales with retained kinetic energy (~speed²) — a shot that's drilled
    // through a wall still hits, just softer. Once it's lost too much of
    // that energy it doesn't linger like a slow-motion coast — it's removed
    // outright the instant its speed falls under MIN_LETHAL_SPEED_FRAC, mid
    // sub-step, right where it ran out of steam.
    const BULLET_SUBSTEP_PX = 10;
    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      b.life -= dt;
      let dead = b.life<=0;
      const frameStartX = b.x, frameStartY = b.y; // for a single once-per-frame trail segment below, not per substep

      const frameDist = Math.hypot(b.vx,b.vy)*dt;
      const steps = Math.max(1, Math.ceil(frameDist / BULLET_SUBSTEP_PX));
      const subDt = dt/steps;

      for(let s=0; s<steps && !dead; s++){
        const subDist = Math.hypot(b.vx,b.vy)*subDt;
        b.x += b.vx*subDt; b.y += b.vy*subDt;

        if(b.x<0||b.x>WORLD_W||b.y<0||b.y>WORLD_H){ dead = true; break; }

        let retain = Math.pow(BULLET_AIR_DRAG_RETENTION_PER_M, subDist/TILE);
        let insideWall = bulletBlockedAt(b.x, b.y);
        if(insideWall && !b.wasInsideWall){
          // the instant the round first bites into a solid wall — this is
          // the "shooting a wall" moment, distinct from just flying near one
          spawnImpact(b.x, b.y, 'wall');
          playWallHit(b.x, b.y);
        }
        b.wasInsideWall = insideWall;
        if(insideWall) retain *= Math.pow(b.wallRetention, subDist/TILE);
        b.vx *= retain; b.vy *= retain;

        const speedFrac = Math.hypot(b.vx,b.vy) / b.muzzleSpeed; // fraction of muzzle velocity still carried
        if(speedFrac < MIN_LETHAL_SPEED_FRAC){
          if(insideWall) spawnImpact(b.x, b.y, 'wall'); // round ran out of energy and embedded in the wall
          dead = true; break;
        }

        const win = windowAt(b.x, b.y);
        if(win && !win.broken){
          win.broken = true;
          b.vx *= GLASS_RETENTION; b.vy *= GLASS_RETENTION; // glass bleeds off a little energy too, just far less than wood
          emitSound(win.x+win.w/2, win.y+win.h/2, 'break');
          spawnImpact(b.x, b.y, 'glass');
          // glass doesn't stop the bullet — it keeps going, just a bit slower
        }

        const liveDmg = b.baseDmg * speedFrac * speedFrac; // kinetic energy ~ v², so damage falls off with the square of retained speed
        // Every bullet (player's or an enemy's) can land on the player or on
        // any enemy — the only one it can never hit is whoever fired it
        // (b.owner). This is what actually lets enemies down each other:
        // an enemy's own shots resolve through this exact same path a
        // player's shots do, just aimed at a different living target.
        if(b.owner !== player && Math.hypot(b.x-player.x, b.y-player.y) < player.r){
          let dmg = liveDmg;
          if(player.armor > 0){
            const absorbed = Math.min(player.armor, dmg);
            player.armor -= absorbed;
            dmg -= absorbed;
          }
          player.hp = Math.max(0, player.hp - dmg);
          dead = true;
          spawnImpact(b.x, b.y, 'flesh');
          if(player.hp<=0) respawnPlayer();
        }
        if(!dead){
          for(let ei=0; ei<enemies.length; ei++){
            const e = enemies[ei];
            if(!e.alive || e === b.owner) continue;
            if(Math.hypot(b.x-e.x, b.y-e.y) < e.r){
              e.hp -= liveDmg;
              accumulateHitNumber(e, liveDmg);
              dead = true;
              spawnImpact(b.x, b.y, 'flesh');
              if(e.hp<=0){
                onEnemyKilled(e, ei);
              } else {
                enemyGotHit(e, b.originX, b.originY, b);
              }
              break;
            }
          }
        }
        // player rounds can also crack a crate open — simple AABB point test
        // since crates are rectangular, not round
        if(!dead && b.friendly){
          for(const c of crates){
            if(!c.alive) continue;
            if(b.x>c.x && b.x<c.x+c.w && b.y>c.y && b.y<c.y+c.h){
              damageCrate(c, liveDmg);
              dead = true;
              spawnImpact(b.x, b.y, 'wall');
              break;
            }
          }
        }
      }

      // Afterimage for the whole distance this bullet covered THIS FRAME —
      // one segment per bullet per frame (not per substep, and not per
      // pellet beyond the one each pellet already is) — so a shotgun's 8-9
      // simultaneous pellets cost 8-9 segments like any other 8-9 bullets
      // would, instead of 8-9× the substep count on top of that. Fading
      // over a short life is what keeps a shot reading as more than a
      // single-frame flash even at a muzzle velocity this high.
      // speedFrac (captured at end-of-frame, after any wall penetration
      // this frame) is stashed on the segment too, so the tracer itself can
      // draw thinner once the round's lost speed — a visible "that shot
      // just got weaker" cue to go with the reduced damage, distinct from
      // just the fade-out every segment already gets.
      if(b.x!==frameStartX || b.y!==frameStartY){
        const endSpeedFrac = Math.min(1, Math.hypot(b.vx,b.vy) / b.muzzleSpeed);
        tracerTrails.push({x1:frameStartX, y1:frameStartY, x2:b.x, y2:b.y, age:0, life:0.12, friendly:b.friendly, speedFrac:endSpeedFrac});
      }

      if(dead) bullets.splice(i,1);
    }

    // ---- tracer afterimages & impact sparks ----
    for(let i=tracerTrails.length-1;i>=0;i--){
      tracerTrails[i].age += dt;
      if(tracerTrails[i].age > tracerTrails[i].life) tracerTrails.splice(i,1);
    }
    for(let i=impacts.length-1;i>=0;i--){
      impacts[i].age += dt;
      if(impacts[i].age > impacts[i].life) impacts.splice(i,1);
    }
    for(let i=hitNumbers.length-1;i>=0;i--){
      const n = hitNumbers[i];
      n.age += dt;
      n.y += n.vy*dt;
      n.vy *= 0.90; // quick decelerating rise, same feel as most action-RPG hit numbers
      if(n.age > n.life) hitNumbers.splice(i,1);
    }

    // ---- enemy AI ----
    for(const e of enemies){
      if(!e.alive) continue;
      const enemyVisible = playerCanSee(e.x, e.y, VIEW_RADIUS);
      if(e.type === 'zombie'){
        // Unarmed: just closes the distance once it sees you, then swings a
        // knife-arc melee attack in range instead of a flat contact tick —
        // no gun, so line-of-sight is the only gate (no shooting range cap).
        // Detecting the player at ALL still requires them to be in the
        // facing cone though (see ENEMY_VIEW_ARC_HALF) — once already
        // aware, plain LOS is enough to keep tracking even if the player
        // circles behind them afterward.
        const found = findNearestHostile(e, ZOMBIE_DETECT_RANGE);
        const hasLOS = !!found;
        if(hasLOS){
          const target = found.target;
          const distToTarget = found.dist;
          e.aware = true;
          if(e.alertState !== 'chase'){ e.alertState = 'chase'; }
          e.lastSeenX = target.x; e.lastSeenY = target.y;
          const a = found.angle;
          e.facing = a;
          const contactDist = e.r + target.r + 4;
          e.moving = distToTarget > contactDist;
          if(Math.abs(Math.cos(a)) > 0.01) e.facingRight = Math.cos(a) >= 0;
          if(e.moving){
            e.x += Math.cos(a)*e.speed*dt;
            e.y += Math.sin(a)*e.speed*dt;
          }
          e.meleeCd -= dt;
          if(distToTarget < ZOMBIE_MELEE.range + e.r && e.meleeCd<=0){
            e.meleeCd = ZOMBIE_MELEE.cooldown;
            swingEffects.push({
              x: e.x, y: e.y, angle: a,
              arc: ZOMBIE_MELEE.arc, range: ZOMBIE_MELEE.range,
              timer: ZOMBIE_MELEE.swingDuration, maxTimer: ZOMBIE_MELEE.swingDuration
            });
            let dmg = ZOMBIE_MELEE.damage;
            if(target.armor > 0){
              const absorbed = Math.min(target.armor, dmg);
              target.armor -= absorbed;
              dmg -= absorbed;
            }
            target.hp = Math.max(0, target.hp - dmg);
            if(target === player){
              if(player.hp<=0) respawnPlayer();
            } else if(target.hp<=0){
              onEnemyKilled(target, enemies.indexOf(target));
            }
          }
        } else if(e.alertState === 'chase'){
          // Just lost sight of the player — instead of forgetting them
          // instantly, go find out where they went.
          e.alertState = 'investigate';
          e.investigateTimer = INVESTIGATE_TIME;
        } else if(e.alertState === 'investigate'){
          e.investigateTimer -= dt;
          const speedMul = e.chargeTimer > 0 ? e.chargeSpeedMul : 1;
          if(e.chargeTimer > 0) e.chargeTimer -= dt;
          const arrived = advanceInvestigatePath(e, dt, e.speed*speedMul);
          if(arrived || e.investigateTimer <= 0){
            // Arrived at (or gave up reaching) the last known spot — linger
            // and look around a bit before fully giving up the chase.
            e.alertState = 'sweep';
            e.sweepTimer = SWEEP_TIME;
            e.sweepDir = Math.random()<0.5 ? -1 : 1;
            e.sweepStepTimer = 0;
            e.moving = false;
            e.path = null;
          }
        } else if(e.alertState === 'sweep'){
          e.sweepTimer -= dt;
          e.sweepStepTimer -= dt;
          if(e.sweepStepTimer <= 0){
            // Pick a new nearby spot/angle to shuffle toward and check —
            // a real search involves stepping around a room, not standing
            // dead still on one tile while just turning your head.
            e.sweepStepAngle = e.facing + (Math.random()-0.5)*2.4;
            e.sweepStepTimer = SWEEP_STEP_INTERVAL[0] + Math.random()*(SWEEP_STEP_INTERVAL[1]-SWEEP_STEP_INTERVAL[0]);
          }
          e.facing += e.sweepDir*SWEEP_TURN_SPEED*dt;
          e.moving = true;
          e.x += Math.cos(e.sweepStepAngle)*e.speed*0.35*dt;
          e.y += Math.sin(e.sweepStepAngle)*e.speed*0.35*dt;
          if(e.sweepTimer <= 0){
            e.alertState = 'idle';
            e.aware = false;
          }
        } else {
          e.wanderTimer -= dt;
          if(e.wanderTimer<=0){
            e.wanderAngle = Math.random()*Math.PI*2;
            e.wanderTimer = 1.5+Math.random()*1.5;
          }
          e.moving = true;
          e.facing = e.wanderAngle;
          if(Math.abs(Math.cos(e.wanderAngle)) > 0.01) e.facingRight = Math.cos(e.wanderAngle) >= 0;
          e.x += Math.cos(e.wanderAngle)*e.speed*0.4*dt;
          e.y += Math.sin(e.wanderAngle)*e.speed*0.4*dt;
        }
      } else {
        // Enemies should only engage if they actually have a clear line of
        // sight to the player — otherwise they'd chase/shoot straight through
        // walls just because the player happens to be within radius. They
        // also have to actually be on the CURRENT screen — this is a
        // flip-screen camera, so an enemy sitting in a neighboring sector can
        // be well within 320px of the player in world-space (sectors are
        // screen-sized, not huge) despite being nowhere the player can see
        // or shoot back at. Without this they snipe you from off-screen.
        // And, same as zombies above, first detection also requires the
        // player to be somewhere in front of them — no eyes in the back of
        // the head — though once already aware they keep tracking on LOS
        // alone even if you circle around behind them afterward.
        const found = isOnScreen(e.x, e.y, e.r) ? findNearestHostile(e, 320) : null;
        const enemyHasLOS = !!found;
        const wd = e.weaponDef;
        // Reload can finish in any state (chase, investigate, sweep) — a
        // gunman shouldn't freeze mid-reload just because they lost you.
        if(e.reloading){
          e.reloadTimer -= dt;
          if(e.reloadTimer<=0){ e.reloading = false; e.ammo = e.magSize; }
        }
        if(e.alertState === 'flee'){
          // Panicked: running straight away from wherever the hit came
          // from, not toward the player at all — occasionally snapping off
          // a wild, unaimed shot back over their shoulder rather than
          // stopping to actually fight.
          e.fleeTimer -= dt;
          e.facing = e.fleeAngle;
          if(Math.abs(Math.cos(e.fleeAngle)) > 0.01) e.facingRight = Math.cos(e.fleeAngle) >= 0;
          e.moving = true;
          e.x += Math.cos(e.fleeAngle)*e.speed*e.speedMul*1.15*dt; // fear buys a little extra hustle over a normal walk
          e.y += Math.sin(e.fleeAngle)*e.speed*e.speedMul*1.15*dt;
          if(!e.reloading){
            e.shotCd -= dt;
            if(e.shotCd<=0 && e.ammo>0 && Math.random()<0.25){
              const wildAngle = e.fleeAngle + Math.PI + (Math.random()-0.5)*0.9;
              enemyFireShotAt(e, wildAngle);
              e.shotCd = (wd ? wd.cooldown : 0.5) * 2.5; // sloppy, infrequent panic-fire, not a real firefight
            }
          }
          if(e.fleeTimer <= 0){
            // Caught their breath — glance around before either spotting
            // the player again (enemyHasLOS will catch that next frame) or
            // settling back into idle wandering.
            e.alertState = 'sweep';
            e.sweepTimer = SWEEP_TIME;
            e.sweepDir = Math.random()<0.5 ? -1 : 1;
            e.sweepStepTimer = 0;
            e.moving = false;
          }
        } else if(enemyHasLOS){
          e.aware = true;
          e.alertState = 'chase';
          e.lastSeenX = found.target.x; e.lastSeenY = found.target.y;
          const a = found.angle;
          e.facing = a;
          e.moving = true;
          if(Math.abs(Math.cos(a)) > 0.01) e.facingRight = Math.cos(a) >= 0;
          e.x += Math.cos(a)*e.speed*e.speedMul*dt;
          e.y += Math.sin(a)*e.speed*e.speedMul*dt;
          if(!e.reloading){
            e.shotCd -= dt;
            if(found.dist < 300 && e.shotCd<=0 && e.ammo>0){
              // Floor the cooldown — an enemy rolling the minigun's raw 3000rpm
              // cooldown would fire dozens of times a second; clamped so "that
              // guy has a minigun" reads as dangerous, not instant death.
              // Aim, don't laser-target: `a` (used for movement/facing above)
              // stays exact, but the actual shot gets its own random cone of
              // error on top of the weapon's own spread.
              enemyFireShotAt(e, a);
            }
          }
        } else if(e.alertState === 'chase'){
          // Just lost sight of the player — path to where they were last
          // seen instead of forgetting about them outright, keeping a
          // brief reaction window to still snap off a shot or two at that
          // spot, like they're still reacting to where the player just was.
          e.alertState = 'investigate';
          e.investigateTimer = INVESTIGATE_TIME;
          e.reactionShootTimer = REACTION_SHOOT_WINDOW;
        } else if(e.alertState === 'investigate'){
          const distToLast = Math.hypot(e.lastSeenX-e.x, e.lastSeenY-e.y);
          const aToLast = Math.atan2(e.lastSeenY-e.y, e.lastSeenX-e.x);
          e.investigateTimer -= dt;
          if(e.flinchTimer > 0){
            // The half-beat a trained shooter spends ducking/bracing right
            // after taking a hit they didn't see coming, before actually
            // reacting to it — not just teleporting straight into motion.
            e.flinchTimer -= dt;
            e.moving = false;
          } else {
            if(e.reactionShootTimer > 0){
              e.reactionShootTimer -= dt;
              if(!e.reloading){
                e.shotCd -= dt;
                if(distToLast < 300 && e.shotCd<=0 && e.ammo>0 && canSee(e.x, e.y, e.lastSeenX, e.lastSeenY, 320)){
                  enemyFireShotAt(e, aToLast);
                }
              }
            }
            // Blind suppressing fire: someone who just got hit through cover
            // or from an angle they never saw keeps tossing rounds roughly
            // toward the source even with no real sightline — bullets already
            // punch through walls (wallRetention), so this is a real
            // "spraying through the door" moment, not a cheat.
            if(!e.reloading && e.ammo>0){
              e.blindFireCd -= dt;
              if(e.blindFireCd <= 0 && distToLast < 260){
                enemyFireShotAt(e, aToLast + (Math.random()-0.5)*0.5);
                e.blindFireCd = BLIND_FIRE_COOLDOWN_RANGE[0] + Math.random()*(BLIND_FIRE_COOLDOWN_RANGE[1]-BLIND_FIRE_COOLDOWN_RANGE[0]);
              }
            }
            const chargeMul = e.chargeTimer > 0 ? e.chargeSpeedMul : 1;
            if(e.chargeTimer > 0) e.chargeTimer -= dt;
            const arrived = advanceInvestigatePath(e, dt, e.speed*e.speedMul*chargeMul);
            if(arrived || e.investigateTimer <= 0){
              // Arrived at (or gave up reaching) the last known spot — linger
              // and look around a bit before fully giving up the chase.
              e.alertState = 'sweep';
              e.sweepTimer = SWEEP_TIME;
              e.sweepDir = Math.random()<0.5 ? -1 : 1;
              e.sweepStepTimer = 0;
              e.moving = false;
              e.path = null;
            }
          }
        } else if(e.alertState === 'sweep'){
          e.sweepTimer -= dt;
          e.sweepStepTimer -= dt;
          if(e.sweepStepTimer <= 0){
            // Pick a new nearby spot/angle to shuffle toward and check —
            // a real search means stepping around a room and checking
            // corners, not standing dead still just turning your head.
            e.sweepStepAngle = e.facing + (Math.random()-0.5)*2.4;
            e.sweepStepTimer = SWEEP_STEP_INTERVAL[0] + Math.random()*(SWEEP_STEP_INTERVAL[1]-SWEEP_STEP_INTERVAL[0]);
          }
          e.facing += e.sweepDir*SWEEP_TURN_SPEED*dt;
          e.moving = true;
          e.x += Math.cos(e.sweepStepAngle)*e.speed*e.speedMul*0.35*dt;
          e.y += Math.sin(e.sweepStepAngle)*e.speed*e.speedMul*0.35*dt;
          if(e.sweepTimer <= 0){
            e.alertState = 'idle';
            e.aware = false;
          }
        } else {
          e.wanderTimer -= dt;
          if(e.wanderTimer<=0){
            e.wanderAngle = Math.random()*Math.PI*2;
            e.wanderTimer = 1.5+Math.random()*1.5;
          }
          e.moving = true;
          e.facing = e.wanderAngle;
          if(Math.abs(Math.cos(e.wanderAngle)) > 0.01) e.facingRight = Math.cos(e.wanderAngle) >= 0;
          e.x += Math.cos(e.wanderAngle)*e.speed*e.speedMul*0.4*dt;
          e.y += Math.sin(e.wanderAngle)*e.speed*e.speedMul*0.4*dt;
        }
        advanceAnim(e.anim, e.moving, dt);
      }
      // footsteps: only heard (rendered) while the enemy is out of sight —
      // if you can already see them, there's nothing to hint at
      e.soundTimer -= dt;
      if(!enemyVisible && e.soundTimer<=0){
        emitSound(e.x, e.y, 'move');
        e.soundTimer = 0.55 + Math.random()*0.25;
      }
      // Real footsteps happen whether or not the player happens to be
      // looking — this is what lets a wandering/searching enemy get
      // aggroed onto ANOTHER enemy's footsteps, same as it would the
      // player's (see alertToFootstep's own call from the player's move
      // loop). Excludes itself so an enemy never hears its own footsteps.
      if(e.moving) alertToFootstep(e.x, e.y, e);
      if(e.type==='zombie') advanceAnim(e.anim, e.moving, dt);
      resolveObstacles(e);
    }

    resolveEntityCollisions();

    // ---- weapon pickups: walking over a dropped weapon grabs it
    // automatically IF it can actually fit into an empty slot without
    // bumping anything already in hand (see hasFreeSlotFor) — no interact
    // press needed for that case, it just gets picked up. If both slots are
    // already full, walking over a weapon that shares ammo type with
    // something you're already carrying tops that gun off with a free mag
    // (+1 reload in the bank) instead of doing nothing. Manual interact
    // (F / PICK UP) is still how you swap out a weapon when neither of
    // those applies (both slots full, no ammo match — a deliberate choice).
    nearestPickup = findNearestPickup();
    if(nearestPickup){
      const drop = nearestPickup;
      if(hasFreeSlotFor(drop.def)){
        pickUpWeapon(drop);
        const i = droppedWeapons.indexOf(drop);
        if(i>=0) droppedWeapons.splice(i,1);
        nearestPickup = null;
      } else {
        const ammoType = drop.def.ammoType;
        let matched = false;
        if(ammoType){
          for(const w of [mainWeapon, sidearmWeapon]){
            if(w.id && w.ammoType === ammoType){
              w.reloadsLeft += 1;
              matched = true;
            }
          }
        }
        if(matched){
          const i = droppedWeapons.indexOf(drop);
          if(i>=0) droppedWeapons.splice(i,1);
          nearestPickup = null;
        }
      }
    }

    updateHealthPickups();

    updateWeaponHud();
    updateCamera();
  }

  // ---------------- Render ----------------
  function drawTiles(t){
    // Only draw what's actually on screen. The world is COLS×ROWS tiles
    // (152×88 here — thousands of wall/tree/window/water tiles total), but
    // the viewport only ever shows a W×H-px window of it. Without this,
    // every tile in the ENTIRE map gets drawn every frame regardless of
    // whether the camera is anywhere near it — that's the main remaining
    // cause of lag, independent of textures. margin is a bit of slack past
    // the edges so nothing pops in/out right at the screen border.
    const margin = TILE * 2;
    const viewLeft   = camera.x - W/2 - margin;
    const viewRight  = camera.x + W/2 + margin;
    const viewTop    = camera.y - H/2 - margin;
    const viewBottom = camera.y + H/2 + margin;
    function onScreen(o){
      return o.x + o.w >= viewLeft && o.x <= viewRight && o.y + o.h >= viewTop && o.y <= viewBottom;
    }

    // base ground — grass outdoors, wood flooring indoors (pre-baked, see bgCanvas above)
    // blit only the visible slice of the world-sized canvas, not the whole thing
    {
      const sx = Math.max(0, viewLeft), sy = Math.max(0, viewTop);
      const sw = Math.min(WORLD_W, viewRight) - sx, sh = Math.min(WORLD_H, viewBottom) - sy;
      if(sw > 0 && sh > 0) ctx.drawImage(bgCanvas, sx, sy, sw, sh, sx, sy, sw, sh);
    }

    // water tiles (animated shimmer, blocks movement, not bullets)
    const waterTex = getTex('tiles.water');
    for(const o of waterRects){
      if(!onScreen(o)) continue;
      if(waterTex){
        ctx.drawImage(waterTex, o.x, o.y, o.w, o.h);
      } else {
        ctx.fillStyle = '#2c5164';
        ctx.fillRect(o.x,o.y,o.w,o.h);
      }
      // shimmer + border stay on top regardless, so animated water still reads as water on a custom texture
      ctx.strokeStyle = 'rgba(140,200,220,0.25)';
      ctx.lineWidth = 1;
      const off = (t*0.001)%1;
      ctx.beginPath();
      ctx.moveTo(o.x, o.y+o.h*(0.35+0.15*Math.sin(off*Math.PI*2 + o.x)));
      ctx.lineTo(o.x+o.w, o.y+o.h*(0.35+0.15*Math.sin(off*Math.PI*2 + o.x)));
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(o.x, o.y+o.h*(0.7+0.12*Math.cos(off*Math.PI*2 + o.y)));
      ctx.lineTo(o.x+o.w, o.y+o.h*(0.7+0.12*Math.cos(off*Math.PI*2 + o.y)));
      ctx.stroke();
    }

    // wall tiles (blocks movement AND bullets) — 3-piece system: straight
    // horizontal, straight vertical, and one corner piece rotated in code
    // to cover every corner, dead end, T-junction, and 4-way cross.
    const wallHTex = getTileImg('tiles.wallH', TILE, TILE);
    const wallVTex = getTileImg('tiles.wallV', TILE, TILE);
    const wallCornerTex = getTileImg('tiles.wallCorner', TILE, TILE);
    for(const o of wallRects){
      if(!onScreen(o)) continue;
      const cx = o.x + o.w/2, cy = o.y + o.h/2;
      if(o.piece === 'h' && wallHTex){
        ctx.drawImage(wallHTex, o.x, o.y, o.w, o.h);
      } else if(o.piece === 'v' && wallVTex){
        ctx.drawImage(wallVTex, o.x, o.y, o.w, o.h);
      } else if(o.piece === 'corner' && wallCornerTex){
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(o.rot * Math.PI / 180);
        ctx.drawImage(wallCornerTex, -o.w/2, -o.h/2, o.w, o.h);
        ctx.restore();
      } else {
        ctx.fillStyle = '#4a4536';
        ctx.fillRect(o.x,o.y,o.w,o.h);
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        if(o.piece === 'v') ctx.fillRect(o.x,o.y,4,o.h);
        else ctx.fillRect(o.x,o.y,o.w,4);
      }
    }

    // wall face — decorative 3-tile-tall strip hanging below every wall
    // tile that faces open space below it (horizontal runs AND the corner
    // pieces that end one) — see the wallFaceRects pass above, which is
    // also where this got made solid to movement. Role (indoor vs outdoor)
    // is stubbed to always 'indoor' for now — see wallFaceRole().
    function wallFaceRole(col, row){
      return 'indoor'; // TODO: outdoor once a perimeter-vs-partition check + outdoor art both exist
    }
    const wallFaceIndoorTex = getTileImg('tiles.wallFaceIndoor', TILE, TILE);
    for(const fo of wallFaceRects){
      if(!onScreen(fo)) continue;
      const role = wallFaceRole((fo.x/TILE)|0, (fo.y/TILE)|0);
      const faceTex = role === 'indoor' ? wallFaceIndoorTex : wallFaceIndoorTex; // outdoor not wired up yet — always indoor
      if(faceTex){
        ctx.drawImage(faceTex, fo.x, fo.y, TILE, TILE);
      } else {
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(fo.x, fo.y, TILE, TILE);
      }
    }

    // tree tiles (blocks movement, bullets AND sight) — just the trunk, one
    // full square tile, same shape language as a wall tile so it reads
    // consistently on a square grid; wood-toned with grain lines instead of
    // walls' flat masonry so it's still readable as "tree" at a glance
    const treeTex = getTileImg('tiles.tree', TILE, TILE);
    for(const o of treeRects){
      if(!onScreen(o)) continue;
      if(treeTex){
        ctx.drawImage(treeTex, o.x, o.y, o.w, o.h);
      } else {
        ctx.fillStyle = '#5c4326';
        ctx.fillRect(o.x,o.y,o.w,o.h);
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fillRect(o.x,o.y,o.w,4);
        ctx.strokeStyle = 'rgba(0,0,0,0.28)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(o.x+o.w*0.32, o.y+4); ctx.lineTo(o.x+o.w*0.32, o.y+o.h-4);
        ctx.moveTo(o.x+o.w*0.68, o.y+4); ctx.lineTo(o.x+o.w*0.68, o.y+o.h-4);
        ctx.stroke();
      }
    }

    // window tiles — see-through and bullet-through always; solid to movement
    // only while intact. Broken ones are always the empty frame, texture or not.
    const windowTex = getTileImg('tiles.window', TILE-6, TILE-6);
    for(const o of windowRects){
      if(!onScreen(o)) continue;
      if(!o.broken){
        if(windowTex){
          ctx.drawImage(windowTex, o.x+3, o.y+3, o.w-6, o.h-6);
        } else {
          ctx.fillStyle = 'rgba(140,200,220,0.22)';
          ctx.fillRect(o.x+3,o.y+3,o.w-6,o.h-6);
          ctx.strokeStyle = 'rgba(220,240,250,0.5)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(o.x+o.w/2,o.y+2); ctx.lineTo(o.x+o.w/2,o.y+o.h-2);
          ctx.moveTo(o.x+2,o.y+o.h/2); ctx.lineTo(o.x+o.w-2,o.y+o.h/2);
          ctx.stroke();
        }
      }
    }

    // door tiles — the entrance/exit trigger for a house (see enterHouse/
    // exitHouse). Always walkable, never blocks sight or bullets, same as a
    // window — but drawn as a solid door slab sitting in the wall opening
    // rather than reading as just a gap, so it's obviously a door from a
    // distance. Square, not round, to match every other tile here.
    for(const o of doorRects){
      if(!onScreen(o)) continue;
      ctx.fillStyle = NES.red;
      ctx.fillRect(o.x+2, o.y+2, o.w-4, o.h-4);
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(o.x+2, o.y+2, o.w-4, 3);
      ctx.fillStyle = NES.brownDark;
      ctx.fillRect(o.x, o.y, o.w, 2);
      ctx.fillRect(o.x, o.y+o.h-2, o.w, 2);
      ctx.fillRect(o.x, o.y, 2, o.h);
      ctx.fillRect(o.x+o.w-2, o.y, 2, o.h);
    }
  }

  function drawCrates(){
    const crateTex = getTileImg('crate', TILE, TILE);
    for(const c of crates){
      if(!c.alive) continue;
      // darkens slightly as it takes damage — a rough "about to break" cue
      const dmgFrac = 1 - Math.max(0, c.hp/c.maxHp);
      if(crateTex){
        ctx.drawImage(crateTex, c.x, c.y, c.w, c.h);
        if(dmgFrac > 0){
          ctx.fillStyle = `rgba(0,0,0,${(dmgFrac*0.45).toFixed(2)})`;
          ctx.fillRect(c.x, c.y, c.w, c.h);
        }
        if(dmgFrac > 0.3){
          ctx.strokeStyle = 'rgba(20,14,6,0.6)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(c.x+c.w*0.3, c.y);
          ctx.lineTo(c.x+c.w*0.45, c.y+c.h);
          ctx.stroke();
        }
      } else {
        const shade = Math.round(20 * dmgFrac);
        ctx.fillStyle = `rgb(${138-shade*3},${109-shade*2},${59-shade})`;
        ctx.fillRect(c.x, c.y, c.w, c.h);
        ctx.strokeStyle = '#4a3a1f';
        ctx.lineWidth = 2;
        ctx.strokeRect(c.x, c.y, c.w, c.h);
        ctx.beginPath();
        ctx.moveTo(c.x, c.y+c.h/2);
        ctx.lineTo(c.x+c.w, c.y+c.h/2);
        ctx.stroke();
        if(dmgFrac > 0.3){
          // a crack or two once it's taken a beating
          ctx.strokeStyle = 'rgba(20,14,6,0.6)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(c.x+c.w*0.3, c.y);
          ctx.lineTo(c.x+c.w*0.45, c.y+c.h);
          ctx.stroke();
        }
      }
    }
  }

  function drawHealthPickups(){
    for(const h of healthPickups){
      ctx.save();
      ctx.beginPath();
      ctx.arc(h.x, h.y, h.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(20,26,20,0.85)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(120,220,140,0.9)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // simple red cross — no dedicated art asset for this yet
      ctx.fillStyle = '#e64545';
      const armW = h.r*0.9, armT = h.r*0.32;
      ctx.fillRect(h.x-armW/2, h.y-armT/2, armW, armT);
      ctx.fillRect(h.x-armT/2, h.y-armW/2, armT, armW);
      ctx.restore();
    }
  }

  function drawWeaponDrops(){
    for(const d of droppedWeapons){
      const rar = RARITY_DEFS[d.def.rarity];
      const inRange = (d === nearestPickup);
      ctx.save();
      ctx.strokeStyle = inRange ? 'rgba(79,209,197,0.9)' : 'rgba(201,162,39,0.3)';
      if(!inRange) ctx.setLineDash([3,4]);
      ctx.lineWidth = inRange ? 1.5 : 1;
      ctx.beginPath();
      ctx.arc(d.x, d.y, WEAPON_PICKUP_R, 0, Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
      if(inRange){
        ctx.font = 'bold 9px "Courier New", monospace';
        ctx.fillStyle = '#4fd1c5';
        ctx.textAlign = 'center';
        ctx.fillText('INTERACT', d.x, d.y + WEAPON_PICKUP_R + 11);
      }

      const weaponTex = getWeaponSpriteTex(d.def.id);
      if(weaponTex){
        // sprite tiles are a fixed 24x24 square — draw at a fixed 32px box
        // to match the old icon's on-screen size.
        const dw = 32, dh = 32;
        ctx.drawImage(weaponTex, d.x-dw/2, d.y-dh/2, dw, dh);
      } else {
        ctx.fillStyle = d.def.color;
        ctx.fillRect(d.x-14, d.y-5, 28, 10);
        ctx.strokeStyle = '#0e0f0c';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(d.x-14, d.y-5, 28, 10);
      }

      // Name + weapon-type + rarity label, on a dark backing plate so it
      // stays readable over grass/wood/water instead of just floating text.
      // The plate border and rarity line are tinted by RARITY_DEFS color so
      // you can eyeball a crate's drop value from a glance across the map.
      ctx.textAlign = 'center';
      const nameFont = 'bold 12px "Courier New", monospace';
      const catFont = '9px "Courier New", monospace';
      ctx.font = nameFont;
      const nameW = ctx.measureText(d.def.name).width;
      ctx.font = catFont;
      const catW = ctx.measureText(d.def.category).width;
      const rarW = ctx.measureText(rar.label).width;
      const plateW = Math.max(nameW, catW, rarW) + 12;

      ctx.fillStyle = 'rgba(8,9,6,0.78)';
      ctx.fillRect(d.x-plateW/2, d.y-44, plateW, 36);
      ctx.strokeStyle = rar.color;
      ctx.lineWidth = 1.3;
      ctx.strokeRect(d.x-plateW/2, d.y-44, plateW, 36);

      ctx.font = nameFont;
      ctx.fillStyle = '#e9e4d4';
      ctx.fillText(d.def.name, d.x, d.y-32);

      ctx.font = catFont;
      ctx.fillStyle = '#c9a227';
      ctx.fillText(d.def.category, d.x, d.y-21);

      ctx.font = 'bold 9px "Courier New", monospace';
      ctx.fillStyle = rar.color;
      ctx.fillText(rar.label, d.x, d.y-10);
      ctx.restore();
    }
  }

  function drawCharacter(x,y,r,angle,fill,outline,tex,animFrame,facingRight){
    // aim line — cosmetic only, independent of sprite orientation below
    if(angle!==undefined){
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(angle)*r, y + Math.sin(angle)*r);
      ctx.lineTo(x + Math.cos(angle)*(r+22), y + Math.sin(angle)*(r+22));
      ctx.stroke();
    }
    // animFrame (idle/walk sprite) takes priority over the static `tex`
    // placeholder. Source art only ever faces left or right — there's no
    // rotation, just a horizontal flip depending on facingRight. Drawn at
    // its actual native (post-trim) pixel size, anchored so the bottom
    // edge — the character's feet, once the transparent padding below them
    // has been trimmed off by trimFrameSet() — lands exactly on (x,y).
    // `r` is purely the collision footprint radius now, not a visual
    // scale, so it plays no part in sizing the sprite.
    const img = animFrame || tex;
    if(img){
      ctx.save();
      ctx.translate(x,y);
      if(facingRight===false) ctx.scale(-1,1);
      ctx.drawImage(img, -img.width/2, -img.height);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = outline;
      ctx.stroke();
    }
  }

  function drawBullets(){
    // Fading afterimage of the distance each bullet covered this frame —
    // one plain line per bullet, per frame. The freshest segment (age≈0) is
    // already at full opacity and ends exactly at the bullet's current
    // position, so this alone is enough — no separate "live round" draw on
    // top of it.
    for(const t of tracerTrails){
      const mx = (t.x1+t.x2)/2, my = (t.y1+t.y2)/2;
      if(!playerCanSee(mx, my, VIEW_RADIUS)) continue;
      const frac = 1 - t.age/t.life; // 1 = just fired, fading to 0
      ctx.strokeStyle = t.friendly ? `rgba(255,224,102,${frac})` : `rgba(255,138,101,${frac})`;
      // Full-speed rounds draw at the normal 2px tracer width; a round
      // that's punched through a wall and lost most of its velocity draws
      // visibly thinner (down to ~0.6px) — a quick read on "that shot's
      // weakened" that lines up with the reduced damage it's now dealing.
      const sf = t.speedFrac !== undefined ? t.speedFrac : 1;
      ctx.lineWidth = 0.6 + 1.4*sf;
      ctx.beginPath();
      ctx.moveTo(t.x1, t.y1); ctx.lineTo(t.x2, t.y2);
      ctx.stroke();
    }

    // Impact sparks/shards where a round actually struck something — this
    // is the visual payoff for "shooting a wall" rather than the bullet
    // just quietly disappearing.
    for(const p of impacts){
      if(!playerCanSee(p.x, p.y, VIEW_RADIUS)) continue;
      const frac = 1 - p.age/p.life;
      const grow = p.age/p.life;
      let color;
      if(p.kind==='glass') color = `rgba(220,240,255,${0.85*frac})`;
      else if(p.kind==='flesh') color = `rgba(200,50,40,${0.8*frac})`;
      else color = `rgba(255,190,110,${0.85*frac})`;
      ctx.strokeStyle = color;
      ctx.lineWidth = p.kind==='glass' ? 1.4 : 2;
      ctx.beginPath();
      const len = p.len * (0.4+grow*0.9);
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + Math.cos(p.angle)*len, p.y + Math.sin(p.angle)*len);
      ctx.stroke();
    }
  }

  function drawSwingEffects(){
    for(const s of swingEffects){
      const progress = 1 - (s.timer/s.maxTimer); // 0 -> 1 across the swing
      const fade = s.timer/s.maxTimer;
      const startA = s.angle - s.arc/2;
      const endA = s.angle + s.arc/2;
      // sweep the wedge from start to current progress point across the arc
      const sweepEnd = startA + s.arc*Math.max(progress, 0.12);

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.arc(s.x, s.y, s.range, startA, sweepEnd);
      ctx.closePath();
      ctx.fillStyle = `rgba(233,228,212,${0.22*fade})`;
      ctx.fill();

      ctx.strokeStyle = `rgba(255,255,255,${0.55*fade})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.range, startA, sweepEnd);
      ctx.stroke();
      ctx.restore();
    }
  }

  // Floating damage numbers: each digit is drawn from its own ui/#.png
  // glyph at its native pixel size (these are 16x16 source images), laid
  // out side by side and centered above the hit point. The source glyphs
  // have some transparent padding baked in, so drawing them fully
  // edge-to-edge (advancing by the full 16px each time) leaves distracting
  // gaps between digits — DIGIT_KERN pulls each next glyph in closer to
  // compensate, without touching the glyphs' own drawn size. Falls back to
  // nothing (silently skipped) for any digit whose image hasn't loaded
  // yet, same "degrade gracefully" pattern as every other texture slot in
  // this file.
  const DIGIT_KERN = 0.6; // fraction of glyph width advanced per digit — tune to taste
  function drawHitNumbers(){
    for(const n of hitNumbers){
      const frac = 1 - n.age/n.life;
      const alpha = Math.min(1, frac*1.4); // holds near-full opacity, then fades fast at the very end
      const scale = 0.8 + Math.min(1, n.age/0.12)*0.2; // tiny pop-in grow over the first ~0.12s

      // measure total advance width first so the whole string can be
      // centered — native glyph size, no resizing beyond the small pop-in
      // scale above, just tighter spacing between glyphs (see DIGIT_KERN)
      const glyphs = [];
      let totalW = 0;
      for(const ch of n.text){
        const img = getTex('ui.number'+ch);
        if(!img){ glyphs.push(null); continue; }
        const w = img.width*scale, h = img.height*scale;
        glyphs.push({img, w, h});
        totalW += w*DIGIT_KERN;
      }
      totalW += (glyphs.length && glyphs[glyphs.length-1]) ? glyphs[glyphs.length-1].w*(1-DIGIT_KERN) : 0; // last glyph's full width, not just its advance — guarded since a not-yet-loaded texture leaves a null entry
      let dx = n.x - totalW/2;
      ctx.save();
      ctx.globalAlpha = alpha;
      for(const g of glyphs){
        if(g) ctx.drawImage(g.img, dx, n.y - g.h/2, g.w, g.h);
        dx += g ? g.w*DIGIT_KERN : 8; // missing glyph — leave a placeholder gap instead of crushing the rest together
      }
      ctx.restore();
    }
  }


  // Little floating icon over an enemy's head while they're alerted —
  // covers all three "knows about you" states (chase/investigate/sweep),
  // not just active chase, so it reads as "still on to you" right up until
  // they actually give up and go back to idle wandering. Bobs gently so it
  // doesn't sit dead-still, and fades out gracefully if the art hasn't
  // loaded yet (same degrade-gracefully pattern as every other texture).
  const AGGRO_BOB_SPEED = 4, AGGRO_BOB_AMOUNT = 2;
  function drawAggroIcon(e){
    const img = getTex('ui.aggro');
    if(!img) return;
    const w = img.width, h = img.height;
    const bob = Math.sin(performance.now()/1000*AGGRO_BOB_SPEED + e.x) * AGGRO_BOB_AMOUNT;
    ctx.drawImage(img, e.x - w/2, e.y - e.r - h - 6 + bob, w, h);
  }

  function drawFog(){
    if(!fogOfWarEnabled) return;
    // Only sweep the tiles actually on screen — same idea as drawTiles()'s
    // viewport culling. Without this, drawFog walked the ENTIRE map grid
    // (ROWS*COLS tiles) every frame regardless of where the camera was,
    // which is wasted work once the map is more than one screen wide/tall.
    const margin = TILE;
    const colStart = Math.max(0, Math.floor((camera.x - W/2 - margin)/TILE));
    const colEnd   = Math.min(COLS-1, Math.ceil((camera.x + W/2 + margin)/TILE));
    const rowStart = Math.max(0, Math.floor((camera.y - H/2 - margin)/TILE));
    const rowEnd   = Math.min(ROWS-1, Math.ceil((camera.y + H/2 + margin)/TILE));
    for(let row=rowStart; row<=rowEnd; row++){
      for(let col=colStart; col<=colEnd; col++){
        const idx = row*COLS+col;
        if(visibleGrid[idx]) continue; // fully lit — no fog drawn
        const px = col*TILE, py = row*TILE;
        ctx.fillStyle = exploredGrid[idx]
          ? 'rgba(6,7,5,0.40)'   // remembered but not currently visible — readable, just dimmed
          : 'rgba(6,7,5,0.97)';  // never seen — near-black
        ctx.fillRect(px, py, TILE, TILE);
      }
    }
  }

  // Expanding soft ring hinting at footsteps happening somewhere in the fog.
  function drawSoundPulses(){
    for(const p of soundPulses){
      const dist = Math.hypot(p.x-player.x, p.y-player.y);
      if(dist > p.maxDist) continue; // beyond realistic earshot — a sound happened, but you could never have heard it, so nothing renders, ever

      const travelTime = dist / SOUND_SPEED; // real physical delay before the wavefront reaches the player
      const sinceArrival = p.age - travelTime;
      if(sinceArrival < 0) continue; // still travelling toward the player — silence, for now
      if(sinceArrival > p.duration) continue; // already faded from hearing

      const t = sinceArrival / p.duration;
      const r = p.startR + (p.maxR-p.startR)*t;
      const fade = 1-t;

      ctx.strokeStyle = `rgba(190,255,215,${0.35*fade})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI*2);
      ctx.stroke();
    }
  }

  // Does a world-space circle (entity center + radius) overlap a
  // full-width horizontal band, given in screen-space y coordinates
  // (0 = top of the screen, H = bottom)? Used to check whether the player
  // or an on-screen enemy is currently standing under the HUD panel.
  function bandOverlap(entX, entY, entR, screenTop, screenBottom){
    const sy = entY - (camera.y - H/2);
    return sy + entR > screenTop && sy - entR < screenBottom;
  }

  // Is anyone (the player, or any enemy actually being rendered this frame)
  // standing inside the given screen-space band?
  function anyoneInBand(screenTop, screenBottom){
    if(bandOverlap(player.x, player.y, player.r, screenTop, screenBottom)) return true;
    for(const e of enemies){
      if(!e.alive) continue;
      if(!isOnScreen(e.x, e.y, e.r)) continue;
      if(!playerCanSee(e.x, e.y, VIEW_RADIUS)) continue;
      if(bandOverlap(e.x, e.y, e.r, screenTop, screenBottom)) return true;
    }
    return false;
  }

  // Picks where the HUD panel should sit this frame: top of the screen by
  // default, dropping to the bottom if the player or a visible enemy is
  // standing under it up there, or hidden entirely if both bands are
  // occupied. Returns the panel's screen-space y, or null to hide it.
  function pickHudY(){
    if(!anyoneInBand(0, HUD_PANEL_H)) return 0;
    const bottomY = H - HUD_PANEL_H;
    if(!anyoneInBand(bottomY, H)) return bottomY;
    return null;
  }

  // ---------------- Top HUD (2x2: HP/AM bars left, weapon/status right) ----------------
  // Same NES-Core look as NESHUD.js's party-HP bar: a full-width, bordered
  // 9-slice panel pinned to the top (or, if something's standing under it,
  // the bottom) of the screen (drawn AFTER the camera transform is
  // restored, so it stays put regardless of where the player is in the
  // world). This used to be split between a floating stack above the
  // player's head (HP/armor/ammo/melee bars) and this panel — classic NES
  // games keep that all in one fixed HUD instead of floating it over the
  // sprite, so it's all consolidated here now, packed into a 2x2 grid so it
  // still fits the original 4-tile-tall strip: HP bar top-left, AM (ammo or
  // melee-readiness) bar bottom-left, weapon name top-right, status
  // (ammo count/reload/ready) bottom-right.
  function drawHudBar(x,y,w,h,frac,color){
    ctx.fillStyle = '#0e0f0c';
    ctx.fillRect(x-1, y-1, w+2, h+2);
    ctx.fillStyle = '#1a1c16';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w*Math.max(0,frac), h);
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
  }
  function drawTopHud(){
    if(!hudInfo) return;
    if(screenScroller.locked) return; // hidden during a screen-transition pan, same as NESHUD
    const panelY = pickHudY();
    if(panelY === null) return; // no clear spot for it this frame — hide rather than obscure the action
    ctx.drawImage(hudPanelCanvas, 0, panelY);

    const row1 = panelY+8, row2 = panelY+16;
    const barX = 32, barW = 64, barH = 6;

    // left column: HP bar (top), AM bar (bottom)
    drawTileText('HP', 8, row1, NES.white);
    drawHudBar(barX, row1+1, barW, barH, hudInfo.hpFrac, hudInfo.hpColor);
    drawTileText('AM', 8, row2, NES.white);
    drawHudBar(barX, row2+1, barW, barH, hudInfo.amFrac, hudInfo.amColor);

    // right column: weapon name (top), status (bottom)
    drawTileText(hudInfo.nameTxt, 136, row1, hudInfo.nameColor);
    drawTileText(hudInfo.statusTxt, 136, row2, hudInfo.statusColor);
  }

  // LED subpixel simulation: takes the finished frame and, for every source
  // pixel, writes three columns into the 3x-wide subpixel buffer — one lit
  // purely in that pixel's red channel, one purely green, one purely blue —
  // each scaled to that channel's actual intensity so a bright pixel's
  // stripes glow strongly and a dim one's barely light up at all, same as
  // real LED/LCD subpixels do. Reads straight off the base game canvas
  // (not the CRT-processed layer), and — being the topmost layer — simply
  // covers CRT mode's output if that's also on, rather than combining with
  // it. Reused, persistent ImageData object (sized once at setup) so this
  // is just typed-array writes every frame, no per-pixel draw calls and no
  // per-frame allocation.
  const ledImageData = subpixelCtx.createImageData(CANVAS_W * 3, CANVAS_H);
  const ledOut = ledImageData.data;
  function drawLedPixels(){
    const src = ctx.getImageData(0, 0, W, H).data;
    const outW = W * 3;
    for(let y = 0; y < H; y++){
      const srcRow = y * W * 4;
      const outRow = y * outW * 4;
      for(let x = 0; x < W; x++){
        const si = srcRow + x * 4;
        const r = src[si], g = src[si + 1], b = src[si + 2], a = src[si + 3];
        const oi = outRow + x * 12; // 3 sub-pixels * 4 channels each
        ledOut[oi]     = r; ledOut[oi + 1] = 0; ledOut[oi + 2] = 0; ledOut[oi + 3] = a; // red stripe
        ledOut[oi + 4] = 0; ledOut[oi + 5] = g; ledOut[oi + 6] = 0; ledOut[oi + 7] = a; // green stripe
        ledOut[oi + 8] = 0; ledOut[oi + 9] = 0; ledOut[oi + 10] = b; ledOut[oi + 11] = a; // blue stripe
      }
    }
    subpixelCtx.putImageData(ledImageData, 0, 0);
  }

  function render(){
    // The flip-screen camera can park a sector partly past the world's
    // edge (WORLD_W/WORLD_H aren't exact multiples of the screen size), so
    // unlike the old clamped smooth-follow camera, drawTiles/drawFog won't
    // always paint every screen pixel. Clear to black first so any strip
    // beyond the map reads as solid black (same as unexplored fog) instead
    // of showing last frame's leftover pixels.
    ctx.fillStyle = NES.black;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.translate(Math.round(W/2 - camera.x), Math.round(H/2 - camera.y));

    drawTiles(last);
    drawCrates();
    drawWeaponDrops();
    drawHealthPickups();
    drawBullets();
    drawSwingEffects();
    for(const e of enemies){
      if(e.alive && isOnScreen(e.x, e.y, e.r) && playerCanSee(e.x, e.y, VIEW_RADIUS)){
        if(e.type === 'zombie'){
          drawCharacter(e.x, e.y, e.r, undefined, '#6b8f47', '#26331a', getTex('zombie'), getAnimFrame('orc', null, e.anim), e.facingRight);
        } else {
          drawCharacter(e.x, e.y, e.r, undefined, '#e2533c', '#3a1a14', getTex('zombie'), getAnimFrame('survivor', e.survivor, e.anim), e.facingRight);
        }
        // Alerted (chase/investigate/sweep) — shown until they fully give
        // up and drop back to idle wandering, not just while actively
        // chasing, so it also covers the "looking for you" in-between.
        if(e.alertState && e.alertState !== 'idle') drawAggroIcon(e);
      }
    }
    drawFog();
    drawSoundPulses();
    drawHitNumbers();

    drawCharacter(player.x, player.y, player.r, player.angle, '#4fd1c5', '#123330', getTex('player'), getAnimFrame('survivor', player.survivor, player.anim), player.facingRight);

    ctx.restore();

    drawEdgeBlockGlow(last);
    drawTopHud();

    if(interlaceEnabled) composeInterlacedFrame();
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
