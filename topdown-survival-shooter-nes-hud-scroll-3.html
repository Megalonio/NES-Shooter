      const d = noiseBuffer.getChannelData(0);
      for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
    }catch(e){ actx = null; }
  }
  function resumeAudio(){
    initAudio();
    if(actx && actx.state==='suspended') actx.resume().catch(()=>{});
  }
  let audioMuted = false;

  // Distance/pan falloff shared by every world-positioned sound: silent past
  // maxDist, full volume right on top of the player, panned by which side
  // of the player (in world space) the source sits on.
  function spatial(x, y, maxDist){
    const dx = x-player.x, dy = y-player.y;
    const dist = Math.hypot(dx,dy);
    const vol = Math.max(0, 1 - dist/maxDist);
    const pan = Math.max(-1, Math.min(1, dx/(maxDist*0.5)));
    return {vol, pan, dist};
  }
  function makeNoise(duration){
    const src = actx.createBufferSource();
    src.buffer = noiseBuffer;
    src.loopStart = Math.random()*(noiseBuffer.duration-duration-0.01);
    src.loopEnd = src.loopStart+duration;
    src.loop = true;
    return src;
  }
  function envGain(peak, attack, decay, startAt){
    const g = actx.createGain();
    g.gain.setValueAtTime(0.0001, startAt);
    g.gain.linearRampToValueAtTime(peak, startAt+attack);
    g.gain.exponentialRampToValueAtTime(0.0001, startAt+attack+decay);
    return g;
  }

  // Gunshot: a hard filtered-noise crack plus a low sine thump for body.
  // Friendly (player) shots get a touch more low-end punch since you're
  // right on top of the source; enemy shots read a bit thinner/further.
  function playGunshot(x, y, friendly){
    if(!actx || audioMuted) return;
    const {vol, pan} = friendly ? {vol:1, pan:0} : spatial(x, y, SOUND_RANGE.shot*0.35);
    if(vol<=0.01) return;
    const t = actx.currentTime;
    const panner = actx.createStereoPanner ? actx.createStereoPanner() : null;
    const out = panner || masterGain;
    if(panner){ panner.pan.value = pan; panner.connect(masterGain); }

    // crack — bandpassed noise burst
    const noise = makeNoise(0.18);
    const bp = actx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = friendly ? 1800 : 1400;
    bp.Q.value = 0.7;
    const ng = envGain(vol*0.9, 0.001, 0.09, t);
    noise.connect(bp); bp.connect(ng); ng.connect(out);
    noise.start(t); noise.stop(t+0.2);

    // thump — low sine body
    const osc = actx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, t);
    osc.frequency.exponentialRampToValueAtTime(45, t+0.12);
    const og = envGain(vol*0.8, 0.001, 0.14, t);
    osc.connect(og); og.connect(out);
    osc.start(t); osc.stop(t+0.16);

    // tiny high tail for "snap"
    const noise2 = makeNoise(0.05);
    const hp = actx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 4000;
    const ng2 = envGain(vol*0.4, 0.001, 0.04, t);
    noise2.connect(hp); hp.connect(ng2); ng2.connect(out);
    noise2.start(t); noise2.stop(t+0.06);
  }

  // Footstep: a very short, soft percussive tap. Tone depends on surface —
  // grass gets a duller thump with a bit of rustle blended in, wood gets a
  // tighter, higher, hollow knock. Pitch/tone wobbles a little per-step so
  // a run of footsteps doesn't sound like a machine.
  function playFootstep(x, y, maxDist, forcedVol, indoors){
    if(!actx || audioMuted) return;
    const {vol, pan} = forcedVol!==undefined ? {vol:forcedVol, pan:0} : spatial(x, y, maxDist);
    if(vol<=0.02) return;
    const t = actx.currentTime;
    const panner = actx.createStereoPanner ? actx.createStereoPanner() : null;
    const out = panner || masterGain;
    if(panner){ panner.pan.value = pan; panner.connect(masterGain); }

    if(indoors){
      // wood floor — tighter, higher, hollow knock
      const noise = makeNoise(0.07);
      const bp = actx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 650 + Math.random()*250;
      bp.Q.value = 2.2;
      const g = envGain(vol*0.32, 0.001, 0.045, t);
      noise.connect(bp); bp.connect(g); g.connect(out);
      noise.start(t); noise.stop(t+0.08);

      const osc = actx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(180+Math.random()*40, t);
      osc.frequency.exponentialRampToValueAtTime(90, t+0.05);
      const og = envGain(vol*0.22, 0.001, 0.05, t);
      osc.connect(og); og.connect(out);
      osc.start(t); osc.stop(t+0.06);
    } else {
      // grass — duller low thump plus a soft rustle of blades
      const thump = makeNoise(0.1);
      const lp = actx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 220 + Math.random()*100;
      const tg = envGain(vol*0.34, 0.003, 0.075, t);
      thump.connect(lp); lp.connect(tg); tg.connect(out);
      thump.start(t); thump.stop(t+0.11);

      const rustle = makeNoise(0.09);
      const bp2 = actx.createBiquadFilter();
      bp2.type = 'bandpass';
      bp2.frequency.value = 1100 + Math.random()*700;
      bp2.Q.value = 0.9;
      const rg = envGain(vol*0.14, 0.004, 0.07, t+0.01);
      rustle.connect(bp2); bp2.connect(rg); rg.connect(out);
      rustle.start(t+0.01); rustle.stop(t+0.1);
    }
  }

  // Glass breaking: a bright noise burst plus a scatter of short, high,
  // randomly-pitched sine "shards" to sell the shatter/tinkle.
  function playGlassBreak(x, y){
    if(!actx || audioMuted) return;
    const {vol, pan} = spatial(x, y, SOUND_RANGE.break*0.35);
    if(vol<=0.01) return;
    const t = actx.currentTime;
    const panner = actx.createStereoPanner ? actx.createStereoPanner() : null;
    const out = panner || masterGain;
    if(panner){ panner.pan.value = pan; panner.connect(masterGain); }

    const noise = makeNoise(0.25);
    const bp = actx.createBiquadFilter();
    bp.type = 'highpass'; bp.frequency.value = 2200;
    const ng = envGain(vol*0.7, 0.001, 0.2, t);
    noise.connect(bp); bp.connect(ng); ng.connect(out);
    noise.start(t); noise.stop(t+0.26);

    const shards = 5;
    for(let i=0;i<shards;i++){
      const dt0 = Math.random()*0.12;
      const osc = actx.createOscillator();
      osc.type = 'triangle';
      const f = 2400 + Math.random()*3200;
      osc.frequency.setValueAtTime(f, t+dt0);
      osc.frequency.exponentialRampToValueAtTime(f*0.6, t+dt0+0.08);
      const sg = envGain(vol*0.22, 0.001, 0.09, t+dt0);
      osc.connect(sg); sg.connect(out);
      osc.start(t+dt0); osc.stop(t+dt0+0.1);
    }
  }

  // Bullet-on-wall impact: a duller, lower "thock" than a gunshot — thump
  // of the round punching wood plus a short dry crack, no bright snap tail.
  function playWallHit(x, y){
    if(!actx || audioMuted) return;
    const {vol, pan} = spatial(x, y, SOUND_RANGE.shot*0.3);
    if(vol<=0.02) return;
    const t = actx.currentTime;
    const panner = actx.createStereoPanner ? actx.createStereoPanner() : null;
    const out = panner || masterGain;
    if(panner){ panner.pan.value = pan; panner.connect(masterGain); }

    const noise = makeNoise(0.1);
    const bp = actx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 1.1;
    const ng = envGain(vol*0.6, 0.001, 0.07, t);
    noise.connect(bp); bp.connect(ng); ng.connect(out);
    noise.start(t); noise.stop(t+0.11);

    const osc = actx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(90, t);
    osc.frequency.exponentialRampToValueAtTime(38, t+0.1);
    const og = envGain(vol*0.55, 0.001, 0.12, t);
    osc.connect(og); og.connect(out);
    osc.start(t); osc.stop(t+0.14);
  }

  // Reload: a short sequence of mechanical clicks/clacks timed to roughly
  // span the actual reload duration — mag drop, mag seat, then a final
  // slide-rack snap right as the gun becomes ready to fire again. Always
  // plays right at the player (it's their own gun), no spatialization.
  function playReload(duration){
    if(!actx || audioMuted) return;
    const t = actx.currentTime;
    const out = masterGain;

    function click(at, freq, vol, dur){
      const noise = makeNoise(Math.min(dur, 0.05));
      const bp = actx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = 3;
      const g = envGain(vol, 0.001, dur, at);
      noise.connect(bp); bp.connect(g); g.connect(out);
      noise.start(at); noise.stop(at+dur+0.02);

      const osc = actx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = freq*0.5;
      const og = envGain(vol*0.5, 0.001, dur*0.6, at);
      osc.connect(og); og.connect(out);
      osc.start(at); osc.stop(at+dur*0.6+0.02);
    }

    click(t,                 1400, 0.3, 0.035);           // mag release / drop
    click(t+duration*0.45,   1100, 0.32, 0.04);            // fresh mag seated
    click(t+Math.max(duration-0.12,0.1), 2000, 0.38, 0.05); // slide racks, ready to fire
  }

  // ---------------- Input state ----------------
  const keys = {};
  window.addEventListener('keydown', e=>{
    resumeAudio();
    keys[e.key.toLowerCase()] = true;
    // 'e'/'i' used to open the old crate-storage/backpack inventory — that
    // UI is gone now (crates are shot/knifed open instead), so those keys
    // are free/unbound.
    if(e.key==='1') equip(null);
    if(e.key>='2' && e.key<='9') equip(playerInv[Number(e.key)-2] || null);
  });
  window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

  let mouse = {x: player.x+50, y: player.y, down:false, active:false};
  canvas.addEventListener('mousemove', e=>{
    const rect = canvas.getBoundingClientRect();
    const scaleX = W/rect.width, scaleY = H/rect.height;
    mouse.x = (e.clientX-rect.left)*scaleX;
    mouse.y = (e.clientY-rect.top)*scaleY;
    mouse.active = true;
  });
  canvas.addEventListener('mousedown', e=>{ mouse.down = true; mouse.active = true; requestGameFullscreen(); resumeAudio(); });
  window.addEventListener('mouseup', e=>{ mouse.down = false; });

  // ---------------- Touch joysticks ----------------
  const stickLeft = document.getElementById('stickLeft');
  const nubLeft = document.getElementById('nubLeft');
  const stickRight = document.getElementById('stickRight');
  const nubRight = document.getElementById('nubRight');

  const moveTouch = { id:null, cx:0, cy:0, dx:0, dy:0, active:false };
  const aimTouch  = { id:null, cx:0, cy:0, dx:0, dy:0, active:false, tapStart:0, maxDeflect:0 };
  const STICK_MAX = 50;

  // Right stick has two modes: 'shoot' (default) fires/swings while deflected,
  // 'look' lets you free-look and move without firing — same speed penalty as
  // shooting, just no trigger pull. A quick tap on the right stick (touch down
  // + up with barely any drag) toggles between the two.
  let aimMode = 'shoot';
  function toggleAimMode(){
    aimMode = (aimMode === 'shoot') ? 'look' : 'shoot';
    stickRight.classList.toggle('lookMode', aimMode==='look');
  }

  function getLocal(touch){
    // Measured against gameWrap, not gameContainer — in fullscreen,
    // gameWrap spans the full screen (including the black letterbox bars
    // around the NES-scaled play area), so the joysticks get the whole
    // screen to work with instead of just the tight play-area rectangle.
    const rect = gameWrap.getBoundingClientRect();
    return { x: touch.clientX-rect.left, y: touch.clientY-rect.top,
             scaleX: rect.width, scaleY: rect.height };
  }

  // Tapping the game screen requests fullscreen on just the play area (not
  // the whole page), so on Android the browser's address/nav bars go away
  // and the container expands edge-to-edge. Must be called synchronously
  // from within a real user-gesture handler, and only while not already
  // fullscreen (repeated calls are otherwise harmless no-ops, but skip them).
  function requestGameFullscreen(){
    const isFs = document.fullscreenElement || document.webkitFullscreenElement;
    if(isFs) return;
    const req = gameWrap.requestFullscreen || gameWrap.webkitRequestFullscreen
              || gameWrap.mozRequestFullScreen || gameWrap.msRequestFullscreen;
    if(req){
      const p = req.call(gameWrap);
      if(p && p.catch) p.catch(()=>{});
    }
  }

  // NES-style integer scaling: the canvas always draws at native 256x240,
  // so on a normal desktop-sized screen we don't want it stretched by some
  // random fractional amount (that's what smears pixel art into mush).
  // Whenever we're fullscreen, snap #gameContainer to the largest WHOLE
  // multiple of 256x240 that still fits the screen — x2, x3, x4, etc —
  // and letterbox the leftover space in black. Runs on entering/leaving
  // fullscreen and on resize/orientation-change while fullscreen is active.
  function applyFullscreenScale(){
    const isFs = document.fullscreenElement || document.webkitFullscreenElement;
    if(!isFs){
      // back to windowed: let the CSS (width:100%, aspect-ratio:256/240)
      // handle sizing again instead of our inline override.
      container.style.width = '';
      container.style.height = '';
      return;
    }
    // Filling the screen edge-to-edge takes priority over strict integer
    // scaling: locking to whole multiples (x2/x3/x4...) means whichever
    // multiple is one step too big for the screen gets skipped entirely,
    // leaving a visible gap at the smaller multiple even though something
    // in between would reach the edge. So instead we scale continuously —
    // the constraining axis (whichever of width/height is tighter) always
    // touches its edges exactly, sacrificing perfect pixel squares for a
    // screen that's actually filled, the way most games handle this.
    const rect = gameWrap.getBoundingClientRect();
    const scale = Math.min(rect.width/256, rect.height/240);
    container.style.width  = (256*scale)+'px';
    container.style.height = (240*scale)+'px';
  }
  document.addEventListener('fullscreenchange', applyFullscreenScale);
  document.addEventListener('webkitfullscreenchange', applyFullscreenScale);
  window.addEventListener('resize', applyFullscreenScale);
  if(window.visualViewport) window.visualViewport.addEventListener('resize', applyFullscreenScale);
  // Mobile browser chrome (address bar / nav bar) often finishes hiding a
  // few frames *after* fullscreenchange fires, so gameWrap's box grows a
  // moment later than this event — re-measure on the next few frames to
  // catch that late settle instead of getting stuck on an early, smaller size.
  ['fullscreenchange','webkitfullscreenchange'].forEach(evt=>{
    document.addEventListener(evt, ()=>{
      for(const delay of [50, 150, 300, 600]) setTimeout(applyFullscreenScale, delay);
    });
  });


  gameWrap.addEventListener('touchstart', e=>{
    requestGameFullscreen();
    resumeAudio();
    for(const t of e.changedTouches){
      const loc = getLocal(t);
      const half = loc.scaleX/2;
      if(loc.x < half && !moveTouch.active){
        moveTouch.active = true; moveTouch.id = t.identifier;
        moveTouch.cx = loc.x; moveTouch.cy = loc.y; moveTouch.dx=0; moveTouch.dy=0;
        stickLeft.style.display='block';
        stickLeft.style.left = (loc.x-50)+'px';
        stickLeft.style.top = (loc.y-50)+'px';
        nubLeft.style.left='28px'; nubLeft.style.top='28px';
      } else if(loc.x >= half && !aimTouch.active){
        aimTouch.active = true; aimTouch.id = t.identifier;
        aimTouch.cx = loc.x; aimTouch.cy = loc.y; aimTouch.dx=0; aimTouch.dy=0;
        aimTouch.tapStart = performance.now(); aimTouch.maxDeflect = 0;
        stickRight.style.display='block';
        stickRight.style.left = (loc.x-50)+'px';
        stickRight.style.top = (loc.y-50)+'px';
        nubRight.style.left='28px'; nubRight.style.top='28px';
      }
    }
    e.preventDefault();
  }, {passive:false});

  gameWrap.addEventListener('touchmove', e=>{
    for(const t of e.changedTouches){
      const loc = getLocal(t);
      if(moveTouch.active && t.identifier===moveTouch.id){
        let dx = loc.x-moveTouch.cx, dy = loc.y-moveTouch.cy;
        const d = Math.hypot(dx,dy);
        if(d>STICK_MAX){ dx = dx/d*STICK_MAX; dy = dy/d*STICK_MAX; }
        moveTouch.dx = dx/STICK_MAX; moveTouch.dy = dy/STICK_MAX;
        nubLeft.style.left = (28+dx)+'px'; nubLeft.style.top = (28+dy)+'px';
      }
      if(aimTouch.active && t.identifier===aimTouch.id){
        let dx = loc.x-aimTouch.cx, dy = loc.y-aimTouch.cy;
        const d = Math.hypot(dx,dy);
        if(d>STICK_MAX){ dx = dx/d*STICK_MAX; dy = dy/d*STICK_MAX; }
        aimTouch.dx = dx/STICK_MAX; aimTouch.dy = dy/STICK_MAX;
        aimTouch.maxDeflect = Math.max(aimTouch.maxDeflect, Math.hypot(aimTouch.dx,aimTouch.dy));
        nubRight.style.left = (28+dx)+'px'; nubRight.style.top = (28+dy)+'px';
      }
    }
    e.preventDefault();
  }, {passive:false});

  function endTouch(e){
    for(const t of e.changedTouches){
      if(moveTouch.active && t.identifier===moveTouch.id){
        moveTouch.active=false; moveTouch.dx=0; moveTouch.dy=0;
        stickLeft.style.display='none';
      }
      if(aimTouch.active && t.identifier===aimTouch.id){
        const wasTap = (performance.now()-aimTouch.tapStart) < 350 && aimTouch.maxDeflect < 0.2;
        aimTouch.active=false; aimTouch.dx=0; aimTouch.dy=0;
        stickRight.style.display='none';
        if(wasTap) toggleAimMode();
      }
    }
  }
  gameWrap.addEventListener('touchend', endTouch);
  gameWrap.addEventListener('touchcancel', endTouch);

  // ---------------- Weapon equip ----------------
  // Equip/unequip a melee weapon. Passing null (or any non-melee item) puts
  // the ranged weapon back in hand (if one's been picked up — see `weapon`,
  // which starts empty). Tapping the already-equipped weapon unequips it.
  // Driven by the number-key hotkeys (1 = ranged, 2 = knife) below.
  function equip(item){
    if(item && item.type !== 'melee') return;
    player.equipped = (item && player.equipped === item) ? null : (item || null);
  }

  // ---------------- Helpers ----------------
  // True if the straight segment from (x0,y0) to (x1,y1) is NOT blocked by any wall.
  // Uses the slab method for segment-vs-AABB intersection, treated per wall rect.
  function segClearOfWalls(x0,y0,x1,y1){
    const dx = x1-x0, dy = y1-y0;
    for(const o of sightSolids){
      let tmin = 0, tmax = 1;
      if(Math.abs(dx) < 1e-9){
        if(x0 < o.x || x0 > o.x+o.w) continue;
      } else {
        let t1 = (o.x-x0)/dx, t2 = (o.x+o.w-x0)/dx;
        if(t1>t2){ const tmp=t1; t1=t2; t2=tmp; }
        tmin = Math.max(tmin,t1); tmax = Math.min(tmax,t2);
        if(tmin>tmax) continue;
      }
      if(Math.abs(dy) < 1e-9){
        if(y0 < o.y || y0 > o.y+o.h) continue;
      } else {
        let t1 = (o.y-y0)/dy, t2 = (o.y+o.h-y0)/dy;
        if(t1>t2){ const tmp=t1; t1=t2; t2=tmp; }
        tmin = Math.max(tmin,t1); tmax = Math.min(tmax,t2);
        if(tmin>tmax) continue;
      }
      if(tmax < 0 || tmin > 1) continue;
      return false; // this wall blocks the segment
    }
    return true;
  }

  // Can the player (or anyone) at (x0,y0) see (x1,y1)? Within range AND unobstructed.
  function canSee(x0,y0,x1,y1,maxDist){
    if(Math.hypot(x1-x0, y1-y0) > maxDist) return false;
    return segClearOfWalls(x0,y0,x1,y1);
  }

  // Player vision is a cone facing where they're looking — you can't see
  // what's behind you until you turn toward it. IRL horizontal FOV (both
  // eyes, including peripheral) is roughly 200-210°, leaving a ~150-160°
  // blind spot directly behind you — that's what this models. A small
  // radius right around the player is always visible (you can feel what's
  // immediately underfoot).
  const VIEW_ARC_HALF = Math.PI * (105/180); // 105° each side = 210° total FOV
  const NEAR_RADIUS = 30;
  function playerCanSee(x1,y1,maxDist){
    if(!fogOfWarEnabled) return true;
    const dist = Math.hypot(x1-player.x, y1-player.y);
    if(dist > maxDist) return false;
    if(dist > NEAR_RADIUS){
      const a = Math.atan2(y1-player.y, x1-player.x);
      const diff = Math.atan2(Math.sin(a-player.angle), Math.cos(a-player.angle));
      if(Math.abs(diff) > VIEW_ARC_HALF) return false;
    }
    return segClearOfWalls(player.x, player.y, x1, y1);
  }

  // Recompute which tiles the player can currently see, and permanently mark
  // them explored (dim "remembered" fog once out of sight again).
  // Cheap grid-walk line-of-sight for the visibility sweep: steps tile-by-tile
  // from the player to the target using Bresenham, checking only the MAP
  // cells actually on that line. This is what computeVisibility() uses below
  // instead of segClearOfWalls (which tests the ray against every wallRect —
  // fine for the occasional bullet/enemy check, but far too slow to run for
  // every tile on the map every single frame now that VIEW_RADIUS covers the
  // whole level).
  function tileLOSClear(c0,r0,c1,r1){
    let x=c0, y=r0;
    const dx=Math.abs(c1-c0), dy=-Math.abs(r1-r0);
    const sx = c0<c1?1:-1, sy = r0<r1?1:-1;
    let err = dx+dy;
    while(true){
      if(!(x===c0 && y===r0) && (MAP[y][x]==='#' || MAP[y][x]==='T')) return false;
      if(x===c1 && y===r1) break;
      const e2 = 2*err;
      if(e2>=dy){ err+=dy; x+=sx; }
      if(e2<=dx){ err+=dx; y+=sy; }
    }
    return true;
  }

  // Skip the whole sweep on frames where the player hasn't moved or turned
  // enough to change what's visible — standing still (or paused on a menu)
  // should cost nothing.
  let lastVisX=null, lastVisY=null, lastVisAngle=null;
  function computeVisibility(){
    if(lastVisX!==null){
      const moved = Math.hypot(player.x-lastVisX, player.y-lastVisY) > 1;
      const turned = Math.abs(Math.atan2(Math.sin(player.angle-lastVisAngle), Math.cos(player.angle-lastVisAngle))) > 0.01;
      if(!moved && !turned) return;
    }
    lastVisX=player.x; lastVisY=player.y; lastVisAngle=player.angle;

    visibleGrid.fill(0);
    const radiusTiles = Math.ceil(VIEW_RADIUS/TILE)+1;
    const pcRow = Math.floor(player.y/TILE), pcCol = Math.floor(player.x/TILE);
    const rowStart = Math.max(0,pcRow-radiusTiles), rowEnd = Math.min(ROWS-1,pcRow+radiusTiles);
    const colStart = Math.max(0,pcCol-radiusTiles), colEnd = Math.min(COLS-1,pcCol+radiusTiles);

    for(let row=rowStart; row<=rowEnd; row++){
      for(let col=colStart; col<=colEnd; col++){
        if(MAP[row][col] === '#' || MAP[row][col] === 'T') continue; // wall/tree tiles handled below
        const tcx = col*TILE+TILE/2, tcy = row*TILE+TILE/2;
        const dist = Math.hypot(tcx-player.x, tcy-player.y);
        if(dist > VIEW_RADIUS) continue;
        if(dist > NEAR_RADIUS){
          const a = Math.atan2(tcy-player.y, tcx-player.x);
          const diff = Math.atan2(Math.sin(a-player.angle), Math.cos(a-player.angle));
          if(Math.abs(diff) > VIEW_ARC_HALF) continue;
        }
        if(!tileLOSClear(pcCol, pcRow, col, row)) continue;
        const idx = row*COLS+col;
        visibleGrid[idx] = 1;
        exploredGrid[idx] = 1;
      }
    }
    // reveal the near face of any wall/tree next to a visible tile, so they
    // don't vanish the instant you stand right in front of them
    for(let row=rowStart; row<=rowEnd; row++){
      for(let col=colStart; col<=colEnd; col++){
        if(MAP[row][col] !== '#' && MAP[row][col] !== 'T') continue;
        const idx = row*COLS+col;
        let lit = false;
        for(let dr=-1; dr<=1 && !lit; dr++){
          for(let dc=-1; dc<=1 && !lit; dc++){
            const nr=row+dr, nc=col+dc;
            if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
            if(visibleGrid[nr*COLS+nc]) lit = true;
          }
        }
        if(lit){ visibleGrid[idx]=1; exploredGrid[idx]=1; }
      }
    }
  }

  function circleRectCollide(cx, cy, cr, rx, ry, rw, rh){
    const nx = Math.max(rx, Math.min(cx, rx+rw));
    const ny = Math.max(ry, Math.min(cy, ry+rh));
    const dx = cx-nx, dy = cy-ny;
    return (dx*dx+dy*dy) < cr*cr;
  }
  function resolveObstacles(entity){
    for(const o of movementSolids){
      if(circleRectCollide(entity.x, entity.y, entity.r, o.x, o.y, o.w, o.h)){
        // push out along shortest axis
        const cx = Math.max(o.x, Math.min(entity.x, o.x+o.w));
        const cy = Math.max(o.y, Math.min(entity.y, o.y+o.h));
        let dx = entity.x-cx, dy = entity.y-cy;
        let d = Math.hypot(dx,dy) || 0.001;
        dx/=d; dy/=d;
        const overlap = entity.r-d;
        if(overlap>0){ entity.x += dx*overlap; entity.y += dy*overlap; }
      }
    }
    for(const o of windowRects){
      if(o.broken) continue; // shattered — no vaulting animation, it's just a walkable gap now
      if(circleRectCollide(entity.x, entity.y, entity.r, o.x, o.y, o.w, o.h)){
        const cx = Math.max(o.x, Math.min(entity.x, o.x+o.w));
        const cy = Math.max(o.y, Math.min(entity.y, o.y+o.h));
        let dx = entity.x-cx, dy = entity.y-cy;
        let d = Math.hypot(dx,dy) || 0.001;
        dx/=d; dy/=d;
        const overlap = entity.r-d;
        if(overlap>0){ entity.x += dx*overlap; entity.y += dy*overlap; }
      }
    }
    for(const o of crates){
      if(!o.alive) continue; // broken crates leave bare floor — nothing left to block movement
      if(circleRectCollide(entity.x, entity.y, entity.r, o.x, o.y, o.w, o.h)){
        const cx = Math.max(o.x, Math.min(entity.x, o.x+o.w));
        const cy = Math.max(o.y, Math.min(entity.y, o.y+o.h));
        let dx = entity.x-cx, dy = entity.y-cy;
        let d = Math.hypot(dx,dy) || 0.001;
        dx/=d; dy/=d;
        const overlap = entity.r-d;
        if(overlap>0){ entity.x += dx*overlap; entity.y += dy*overlap; }
      }
    }
    entity.x = Math.max(entity.r, Math.min(WORLD_W-entity.r, entity.x));
    entity.y = Math.max(entity.r, Math.min(WORLD_H-entity.r, entity.y));
  }

  // A brief burst of particles at the point a bullet actually strikes
  // something solid — separate from the tracer, this is what sells "that
  // shot just hit a wall" rather than the round simply vanishing.
  function spawnImpact(x, y, kind){
    const n = kind==='glass' ? 7 : 5;
    for(let i=0;i<n;i++){
      impacts.push({
        x, y,
        angle: Math.random()*Math.PI*2,
        len: (kind==='glass' ? 10 : 7) + Math.random()*10,
        age: 0,
        life: 0.16 + Math.random()*0.1,
        kind
      });
    }
  }

  function fireBullet(fromX, fromY, angle, friendly, spreadOverride, dmgOverride, spdOverride, lifeOverride){
    const spread = spreadOverride!==undefined ? spreadOverride : weapon.spread;
    const a = angle + (Math.random()-0.5)*spread;
    const spd = spdOverride!==undefined ? spdOverride : weapon.bulletSpeed;
    bullets.push({
      x: fromX, y: fromY,
      vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: lifeOverride!==undefined ? lifeOverride : weapon.life,
      baseDmg: dmgOverride!==undefined ? dmgOverride : weapon.damage, // damage at muzzle velocity — actual damage dealt scales with however much velocity is left when it hits
      muzzleSpeed: spd,
      friendly,
      wasInsideWall: false
    });
  }

  function angleDiff(a, b){
    return Math.atan2(Math.sin(a-b), Math.cos(a-b));
  }

  // A melee swing is a wide arc sweep centered on the player's facing angle —
  // it hits anything inside the arc+range in one motion, unlike a directional stab.
  function performSwing(mw){
    swingEffects.push({
      x: player.x, y: player.y, angle: player.angle,
      arc: mw.arc, range: mw.range,
      timer: mw.swingDuration, maxTimer: mw.swingDuration
    });

    for(const o of windowRects){
      if(o.broken) continue;
      const wx = o.x+o.w/2, wy = o.y+o.h/2;
      const dist = Math.hypot(wx-player.x, wy-player.y);
      if(dist < mw.range + TILE/2){
        const a = Math.atan2(wy-player.y, wx-player.x);
        if(Math.abs(angleDiff(a, player.angle)) <= mw.arc/2){
          o.broken = true;
          emitSound(wx, wy, 'break');
        }
      }
    }

    for(let ei=0; ei<enemies.length; ei++){
      const e = enemies[ei];
      if(!e.alive) continue;
      const dist = Math.hypot(e.x-player.x, e.y-player.y);
      if(dist < mw.range + e.r){
        const a = Math.atan2(e.y-player.y, e.x-player.x);
        if(Math.abs(angleDiff(a, player.angle)) <= mw.arc/2){
          e.hp -= mw.damage;
          // small knockback along the swing direction
          e.x += Math.cos(player.angle)*10;
          e.y += Math.sin(player.angle)*10;
          if(e.hp<=0){
            onEnemyKilled(e, ei);
          }
        }
      }
    }

    // knife/melee can crack a crate open too, same arc-sweep test as
    // enemies — approximated as a circle using the crate's longer side
    // since it's a rectangle, not round
    for(const c of crates){
      if(!c.alive) continue;
      const ccx = c.x+c.w/2, ccy = c.y+c.h/2;
      const cr = Math.max(c.w, c.h)/2;
      const dist = Math.hypot(ccx-player.x, ccy-player.y);
      if(dist < mw.range + cr){
        const a = Math.atan2(ccy-player.y, ccx-player.x);
        if(Math.abs(angleDiff(a, player.angle)) <= mw.arc/2){
          damageCrate(c, mw.damage);
        }
      }
    }
  }

  // ---------------- Main loop ----------------
  let last = performance.now();
  function loop(now){
    const dt = Math.min(0.05, (now-last)/1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function update(dt){
    // ---- screen-scroll transition freeze ----
    // While the camera is mid-pan between sectors, the whole simulation
    // freezes — player input, enemy AI, bullets, everything — and only the
    // pan itself advances, exactly like a Zelda/Mega Man screen transition
    // (NESScroll freezes Game_Player + Game_Event entirely while locked).
    if(screenScroller.locked){
      scrollerUpdateTransition();
      return;
    }

    // ---- movement input ----
    let mx=0, my=0;
    if(keys['w']||keys['z']||keys['arrowup']) my-=1;
    if(keys['s']||keys['arrowdown']) my+=1;
    if(keys['a']||keys['q']||keys['arrowleft']) mx-=1;
    if(keys['d']||keys['arrowright']) mx+=1;
    if(moveTouch.active){
      const mmag = Math.hypot(moveTouch.dx, moveTouch.dy);
      const MOVE_DEADZONE = 0.15;
      if(mmag > MOVE_DEADZONE){
        // Full power regardless of how far past the deadzone you push —
        // only the direction matters, going gentle on the stick shouldn't
        // mean walking slower.
        mx = moveTouch.dx / mmag;
        my = moveTouch.dy / mmag;
      }
    }

    const mlen = Math.hypot(mx,my);
    const moveAngle = mlen>0 ? Math.atan2(my,mx) : null;

    // ---- aim input ----
    // isAiming: gun/character is pointed at aimAngle (drives facing + the
    // movement speed penalty). fireHeld: trigger is actually being pulled.
    // On the right stick, 'shoot' mode ties both together like before;
    // 'look' mode keeps isAiming (free-look + same speed penalty) but never
    // sets fireHeld, so you can move and look around without shooting.
    let fireHeld = false, aimAngle = null, isAiming = false;
    if(aimTouch.active && Math.hypot(aimTouch.dx,aimTouch.dy) > 0.25){
      aimAngle = Math.atan2(aimTouch.dy, aimTouch.dx);
      isAiming = true;
      fireHeld = (aimMode === 'shoot');
    } else if(mouse.active){
      const worldMouseX = mouse.x + camera.x - W/2;
      const worldMouseY = mouse.y + camera.y - H/2;
      aimAngle = Math.atan2(worldMouseY-player.y, worldMouseX-player.x);
      fireHeld = mouse.down;
      isAiming = mouse.down;
    }

    // Facing (gun + line-of-sight cone): follows the direction you're walking
    // by default. Actively aiming (shooting, or free-looking in look mode)
    // overrides that and snaps to your aim instead.
    // Standing still and not aiming just keeps your last facing.
    if(isAiming && aimAngle!==null){
      player.angle = aimAngle;
    } else if(moveAngle!==null){
      player.angle = moveAngle;
    }

    // Movement speed: full speed unless you're aiming (shooting, or
    // free-looking), in which case it depends on how your movement lines up
    // with where you're facing.
    let speedMul = 1;
    if(isAiming && moveAngle!==null){
      const diff = Math.abs(angleDiff(moveAngle, player.angle));
      if(diff <= Math.PI/4)      speedMul = 0.90; // forward
      else if(diff >= Math.PI*3/4) speedMul = 0.50; // backward
      else                        speedMul = 0.75; // strafing sideways
    }
    if(isOnSand(player.x, player.y)) speedMul *= 0.75; // soft sand — 25% slower
    if(!player.equipped) speedMul *= weapon.speedMul; // heavy ranged weapons (minigun) carry their own flat penalty, on top of aim-strafe

    if(mlen>0){
      const nx = mx / (mlen>1?mlen:1);
      const ny = my / (mlen>1?mlen:1);
      lastMoveDirX = nx; lastMoveDirY = ny;
      player.x += nx*player.speed*speedMul*dt*Math.min(mlen,1);
      player.y += ny*player.speed*speedMul*dt*Math.min(mlen,1);

      // footsteps — cadence scales with actual movement speed so sprinting
      // taps out faster steps than a slowed aim-strafe
      player.footstepTimer -= dt;
      if(player.footstepTimer<=0){
        playFootstep(player.x, player.y, 1, 0.5, isIndoors(player.x, player.y));
        player.footstepTimer = 0.32 / Math.max(0.35, speedMul*Math.min(mlen,1));
      }
    } else {
      player.footstepTimer = 0;
    }

    resolveObstacles(player);
    if(fogOfWarEnabled) computeVisibility();

    // ---- weapon: melee swing if a weapon is equipped, else sidearm ----
    if(player.equipped){
      const mw = player.equipped;
      mw.cd -= dt;
      if(fireHeld && mw.cd<=0){
        mw.cd = mw.cooldown;
        performSwing(mw);
      }
    } else {
      weapon.cd -= dt;

      // Spin-up (minigun): barrels spool while the trigger's held and
      // there's ammo to feed, and coast back down the moment you let go —
      // whether or not you're still holding a mag. Runs every frame,
      // independent of the fire/reload branches below.
      if(weapon.spinUp){
        if(fireHeld && weapon.ammo>0){
          weapon.spin = Math.min(1, weapon.spin + dt/weapon.spinUpTime);
        } else {
          weapon.spin = Math.max(0, weapon.spin - dt/weapon.spinDownTime);
        }
      }

      if(weapon.reloading){
        weapon.reloadTimer -= dt;
        if(weapon.reloadTimer<=0){
          weapon.reloading = false;
          weapon.ammo = weapon.magSize;
        }
      } else if(fireHeld && weapon.cd<=0 && weapon.ammo>0){
        // Effective cooldown ramps from spinMinMul*cooldown (cold barrels)
        // down to the base cooldown (fully spun) as spin approaches 1 —
        // for non-spin-up weapons spinMinMul defaults to 1 so this is a no-op.
        const coldCooldown = weapon.cooldown * weapon.spinMinMul;
        weapon.cd = coldCooldown + (weapon.cooldown - coldCooldown) * weapon.spin;
        weapon.ammo -= 1;
        const pelletCount = weapon.pellets || 1;
        for(let p=0; p<pelletCount; p++){
          fireBullet(
            player.x + Math.cos(player.angle)*player.r,
            player.y + Math.sin(player.angle)*player.r,
            player.angle, true
          );
        }
        playGunshot(player.x, player.y, true);
        // magazine empty
        if(weapon.ammo<=0){
          if(weapon.spinUp){
            // Minigun: no reload exists for it — the belt's just done. Drop
            // straight back to bare hands (the knife), same as never having
            // picked anything up.
            player.equipped = knifeItem;
            weapon.id = null;
            weapon.rarity = null;
            weapon.name = 'NONE';
            weapon.color = '#666';
            weapon.magSize = 0;
            weapon.spin = 0;
            weapon.spinUp = false;
            weapon.speedMul = 1;
          } else {
            // Every other gun auto-reloads once empty — can't be triggered early
            weapon.reloading = true;
            weapon.reloadTimer = weapon.reloadTime;
            playReload(weapon.reloadTime);
          }
        }
      }
    }

    // ---- melee swing visual sweeps ----
    for(let i=swingEffects.length-1;i>=0;i--){
      swingEffects[i].timer -= dt;
      if(swingEffects[i].timer<=0) swingEffects.splice(i,1);
    }

    // ---- sound pulses (footsteps only — see emitSound) ----
    for(let i=soundPulses.length-1;i>=0;i--){
      const p = soundPulses[i];
      p.age += dt;
      // worst case: the wavefront takes maxDist/SOUND_SPEED to reach the
      // farthest point it could still be heard from, then lingers visually
      // for p.duration once it arrives — only discard after that's elapsed
      const worstCaseArrival = p.maxDist/SOUND_SPEED;
      if(p.age > worstCaseArrival + p.duration) soundPulses.splice(i,1);
    }

    // ---- bullets ----
    // At a realistic muzzle velocity a bullet can move 100-250+ px in a
    // single frame — more than a wall's 40px thickness or a character's
    // ~15px radius, which would let it tunnel straight through without ever
    // registering a hit if we only checked its position once per frame. So
    // each bullet's frame movement is broken into small sub-steps (fine
    // enough to not skip past anything solid), and every sub-step re-checks
    // walls/windows/characters at that finer resolution — same collision
    // rules as before, just sampled densely enough to actually catch them.
    //
    // Within that: air drag trims velocity a tiny amount continuously, wood
    // walls take a lot more per meter actually punched through (so a wall
    // right behind another costs roughly double), and damage on impact
    // scales with retained kinetic energy (~speed²) — a shot that's drilled
    // through a wall still hits, just softer. Once it's lost too much of
    // that energy it doesn't linger like a slow-motion coast — it's removed
    // outright the instant its speed falls under MIN_LETHAL_SPEED_FRAC, mid
    // sub-step, right where it ran out of steam.
    const BULLET_SUBSTEP_PX = 10;
    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      b.life -= dt;
      let dead = b.life<=0;
      const frameStartX = b.x, frameStartY = b.y; // for a single once-per-frame trail segment below, not per substep

      const frameDist = Math.hypot(b.vx,b.vy)*dt;
      const steps = Math.max(1, Math.ceil(frameDist / BULLET_SUBSTEP_PX));
      const subDt = dt/steps;

      for(let s=0; s<steps && !dead; s++){
        const subDist = Math.hypot(b.vx,b.vy)*subDt;
        b.x += b.vx*subDt; b.y += b.vy*subDt;

        if(b.x<0||b.x>WORLD_W||b.y<0||b.y>WORLD_H){ dead = true; break; }

        let retain = Math.pow(BULLET_AIR_DRAG_RETENTION_PER_M, subDist/TILE);
        let insideWall = bulletBlockedAt(b.x, b.y);
        if(insideWall && !b.wasInsideWall){
          // the instant the round first bites into a solid wall — this is
          // the "shooting a wall" moment, distinct from just flying near one
          spawnImpact(b.x, b.y, 'wall');
          playWallHit(b.x, b.y);
        }
        b.wasInsideWall = insideWall;
        if(insideWall) retain *= Math.pow(WALL_PENETRATION_RETENTION_PER_M, subDist/TILE);
        b.vx *= retain; b.vy *= retain;

        const speedFrac = Math.hypot(b.vx,b.vy) / b.muzzleSpeed; // fraction of muzzle velocity still carried
        if(speedFrac < MIN_LETHAL_SPEED_FRAC){
          if(insideWall) spawnImpact(b.x, b.y, 'wall'); // round ran out of energy and embedded in the wall
          dead = true; break;
        }

        const win = windowAt(b.x, b.y);
        if(win && !win.broken){
          win.broken = true;
          b.vx *= GLASS_RETENTION; b.vy *= GLASS_RETENTION; // glass bleeds off a little energy too, just far less than wood
          emitSound(win.x+win.w/2, win.y+win.h/2, 'break');
          spawnImpact(b.x, b.y, 'glass');
          // glass doesn't stop the bullet — it keeps going, just a bit slower
        }

        const liveDmg = b.baseDmg * speedFrac * speedFrac; // kinetic energy ~ v², so damage falls off with the square of retained speed
        if(b.friendly){
          for(let ei=0; ei<enemies.length; ei++){
            const e = enemies[ei];
            if(!e.alive) continue;
            if(Math.hypot(b.x-e.x, b.y-e.y) < e.r){
              e.hp -= liveDmg;
              dead = true;
              spawnImpact(b.x, b.y, 'flesh');
              if(e.hp<=0){
                onEnemyKilled(e, ei);
              }
              break;
            }
          }
          // player rounds can also crack a crate open — simple AABB point test
          // since crates are rectangular, not round
          if(!dead){
            for(const c of crates){
              if(!c.alive) continue;
              if(b.x>c.x && b.x<c.x+c.w && b.y>c.y && b.y<c.y+c.h){
                damageCrate(c, liveDmg);
                dead = true;
                spawnImpact(b.x, b.y, 'wall');
                break;
              }
            }
          }
        } else {
          if(Math.hypot(b.x-player.x, b.y-player.y) < player.r){
            let dmg = liveDmg;
            if(player.armor > 0){
              const absorbed = Math.min(player.armor, dmg);
              player.armor -= absorbed;
              dmg -= absorbed;
            }
            player.hp = Math.max(0, player.hp - dmg);
            dead = true;
            spawnImpact(b.x, b.y, 'flesh');
            if(player.hp<=0) respawnPlayer();
          }
        }
      }

      // Afterimage for the whole distance this bullet covered THIS FRAME —
      // one segment per bullet per frame (not per substep, and not per
      // pellet beyond the one each pellet already is) — so a shotgun's 8-9
      // simultaneous pellets cost 8-9 segments like any other 8-9 bullets
      // would, instead of 8-9× the substep count on top of that. Fading
      // over a short life is what keeps a shot reading as more than a
      // single-frame flash even at a muzzle velocity this high.
      if(b.x!==frameStartX || b.y!==frameStartY){
        tracerTrails.push({x1:frameStartX, y1:frameStartY, x2:b.x, y2:b.y, age:0, life:0.12, friendly:b.friendly});
      }

      if(dead) bullets.splice(i,1);
    }

    // ---- tracer afterimages & impact sparks ----
    for(let i=tracerTrails.length-1;i>=0;i--){
      tracerTrails[i].age += dt;
      if(tracerTrails[i].age > tracerTrails[i].life) tracerTrails.splice(i,1);
    }
    for(let i=impacts.length-1;i>=0;i--){
      impacts[i].age += dt;
      if(impacts[i].age > impacts[i].life) impacts.splice(i,1);
    }

    // ---- enemy AI ----
    for(const e of enemies){
      if(!e.alive) continue;
      const distToPlayer = Math.hypot(player.x-e.x, player.y-e.y);
      const enemyVisible = playerCanSee(e.x, e.y, VIEW_RADIUS);
      if(e.type === 'zombie'){
        // Unarmed: just closes the distance once it sees you, then swings a
        // knife-arc melee attack in range instead of a flat contact tick —
        // no gun, so line-of-sight is the only gate (no shooting range cap).
        const hasLOS = distToPlayer < ZOMBIE_DETECT_RANGE && canSee(e.x, e.y, player.x, player.y, ZOMBIE_DETECT_RANGE);
        if(hasLOS){
          const a = Math.atan2(player.y-e.y, player.x-e.x);
          const contactDist = e.r + player.r + 4;
          if(distToPlayer > contactDist){
            e.x += Math.cos(a)*e.speed*dt;
            e.y += Math.sin(a)*e.speed*dt;
          }
          e.meleeCd -= dt;
          if(distToPlayer < ZOMBIE_MELEE.range + e.r && e.meleeCd<=0){
            e.meleeCd = ZOMBIE_MELEE.cooldown;
            swingEffects.push({
              x: e.x, y: e.y, angle: a,
              arc: ZOMBIE_MELEE.arc, range: ZOMBIE_MELEE.range,
              timer: ZOMBIE_MELEE.swingDuration, maxTimer: ZOMBIE_MELEE.swingDuration
            });
            let dmg = ZOMBIE_MELEE.damage;
            if(player.armor > 0){
              const absorbed = Math.min(player.armor, dmg);
              player.armor -= absorbed;
              dmg -= absorbed;
            }
            player.hp = Math.max(0, player.hp - dmg);
            if(player.hp<=0) respawnPlayer();
          }
        } else {
          e.wanderTimer -= dt;
          if(e.wanderTimer<=0){
            e.wanderAngle = Math.random()*Math.PI*2;
            e.wanderTimer = 1.5+Math.random()*1.5;
          }
          e.x += Math.cos(e.wanderAngle)*e.speed*0.4*dt;
          e.y += Math.sin(e.wanderAngle)*e.speed*0.4*dt;
        }
      } else {
        // Enemies should only engage if they actually have a clear line of
        // sight to the player — otherwise they'd chase/shoot straight through
        // walls just because the player happens to be within radius.
        const enemyHasLOS = distToPlayer < 320 && canSee(e.x, e.y, player.x, player.y, 320);
        if(enemyHasLOS){
          const a = Math.atan2(player.y-e.y, player.x-e.x);
          e.x += Math.cos(a)*e.speed*dt;
          e.y += Math.sin(a)*e.speed*dt;
          e.shotCd -= dt;
          if(distToPlayer < 300 && e.shotCd<=0){
            const wd = e.weaponDef;
            // Floor the cooldown — an enemy rolling the minigun's raw 3000rpm
            // cooldown would fire dozens of times a second; clamped so "that
            // guy has a minigun" reads as dangerous, not instant death.
            e.shotCd = Math.max(0.15, wd.cooldown);
            const pelletCount = wd.pellets || 1;
            for(let p=0; p<pelletCount; p++){
              fireBullet(e.x, e.y, a, false, wd.spread, wd.damage, wd.bulletSpeed, wd.life);
            }
            emitSound(e.x, e.y, 'shot'); // gunfire is loud — always reveals exact position
          }
        } else {
          e.wanderTimer -= dt;
          if(e.wanderTimer<=0){
            e.wanderAngle = Math.random()*Math.PI*2;
            e.wanderTimer = 1.5+Math.random()*1.5;
          }
          e.x += Math.cos(e.wanderAngle)*e.speed*0.4*dt;
          e.y += Math.sin(e.wanderAngle)*e.speed*0.4*dt;
        }
      }
      // footsteps: only heard (rendered) while the enemy is out of sight —
      // if you can already see them, there's nothing to hint at
      e.soundTimer -= dt;
      if(!enemyVisible && e.soundTimer<=0){
        emitSound(e.x, e.y, 'move');
        e.soundTimer = 0.55 + Math.random()*0.25;
      }
      resolveObstacles(e);
    }

    // ---- weapon pickups: walking over a dropped weapon auto-equips it,
    // replacing whatever's currently in hand (melee or ranged) ----
    for(let i=droppedWeapons.length-1;i>=0;i--){
      const d = droppedWeapons[i];
      if(Math.hypot(player.x-d.x, player.y-d.y) < player.r + WEAPON_PICKUP_R){
        pickUpWeapon(d);
        droppedWeapons.splice(i,1);
      }
    }

    updateWeaponHud();
    updateCamera();
  }

  // ---------------- Render ----------------
  function drawTiles(t){
    // Only draw what's actually on screen. The world is COLS×ROWS tiles
    // (152×88 here — thousands of wall/tree/window/water tiles total), but
    // the viewport only ever shows a W×H-px window of it. Without this,
    // every tile in the ENTIRE map gets drawn every frame regardless of
    // whether the camera is anywhere near it — that's the main remaining
    // cause of lag, independent of textures. margin is a bit of slack past
    // the edges so nothing pops in/out right at the screen border.
    const margin = TILE * 2;
    const viewLeft   = camera.x - W/2 - margin;
    const viewRight  = camera.x + W/2 + margin;
    const viewTop    = camera.y - H/2 - margin;
    const viewBottom = camera.y + H/2 + margin;
    function onScreen(o){
      return o.x + o.w >= viewLeft && o.x <= viewRight && o.y + o.h >= viewTop && o.y <= viewBottom;
    }

    // base ground — grass outdoors, wood flooring indoors (pre-baked, see bgCanvas above)
    // blit only the visible slice of the world-sized canvas, not the whole thing
    {
      const sx = Math.max(0, viewLeft), sy = Math.max(0, viewTop);
      const sw = Math.min(WORLD_W, viewRight) - sx, sh = Math.min(WORLD_H, viewBottom) - sy;
      if(sw > 0 && sh > 0) ctx.drawImage(bgCanvas, sx, sy, sw, sh, sx, sy, sw, sh);
    }

    // water tiles (animated shimmer, blocks movement, not bullets)
    const waterTex = getTex('tiles.water');
    for(const o of waterRects){
      if(!onScreen(o)) continue;
      if(waterTex){
        ctx.drawImage(waterTex, o.x, o.y, o.w, o.h);
      } else {
        ctx.fillStyle = '#2c5164';
        ctx.fillRect(o.x,o.y,o.w,o.h);
      }
      // shimmer + border stay on top regardless, so animated water still reads as water on a custom texture
      ctx.strokeStyle = 'rgba(140,200,220,0.25)';
      ctx.lineWidth = 1;
      const off = (t*0.001)%1;
      ctx.beginPath();
      ctx.moveTo(o.x, o.y+o.h*(0.35+0.15*Math.sin(off*Math.PI*2 + o.x)));
      ctx.lineTo(o.x+o.w, o.y+o.h*(0.35+0.15*Math.sin(off*Math.PI*2 + o.x)));
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(o.x, o.y+o.h*(0.7+0.12*Math.cos(off*Math.PI*2 + o.y)));
      ctx.lineTo(o.x+o.w, o.y+o.h*(0.7+0.12*Math.cos(off*Math.PI*2 + o.y)));
      ctx.stroke();
    }

    // wall tiles (blocks movement AND bullets)
    const wallTex = getTileImg('tiles.wall', TILE, TILE);
    for(const o of wallRects){
      if(!onScreen(o)) continue;
      if(wallTex){
        ctx.drawImage(wallTex, o.x, o.y, o.w, o.h);
      } else {
        ctx.fillStyle = '#4a4536';
        ctx.fillRect(o.x,o.y,o.w,o.h);
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(o.x,o.y,o.w,4);
      }
    }

    // tree tiles (blocks movement, bullets AND sight) — just the trunk, one
    // full square tile, same shape language as a wall tile so it reads
    // consistently on a square grid; wood-toned with grain lines instead of
    // walls' flat masonry so it's still readable as "tree" at a glance
    const treeTex = getTileImg('tiles.tree', TILE, TILE);
    for(const o of treeRects){
      if(!onScreen(o)) continue;
      if(treeTex){
        ctx.drawImage(treeTex, o.x, o.y, o.w, o.h);
      } else {
        ctx.fillStyle = '#5c4326';
        ctx.fillRect(o.x,o.y,o.w,o.h);
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fillRect(o.x,o.y,o.w,4);
        ctx.strokeStyle = 'rgba(0,0,0,0.28)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(o.x+o.w*0.32, o.y+4); ctx.lineTo(o.x+o.w*0.32, o.y+o.h-4);
        ctx.moveTo(o.x+o.w*0.68, o.y+4); ctx.lineTo(o.x+o.w*0.68, o.y+o.h-4);
        ctx.stroke();
      }
    }

    // window tiles — see-through and bullet-through always; solid to movement
    // only while intact. Broken ones are always the empty frame, texture or not.
    const windowTex = getTileImg('tiles.window', TILE-6, TILE-6);
    for(const o of windowRects){
      if(!onScreen(o)) continue;
      if(!o.broken){
        if(windowTex){
          ctx.drawImage(windowTex, o.x+3, o.y+3, o.w-6, o.h-6);
        } else {
          ctx.fillStyle = 'rgba(140,200,220,0.22)';
          ctx.fillRect(o.x+3,o.y+3,o.w-6,o.h-6);
          ctx.strokeStyle = 'rgba(220,240,250,0.5)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(o.x+o.w/2,o.y+2); ctx.lineTo(o.x+o.w/2,o.y+o.h-2);
          ctx.moveTo(o.x+2,o.y+o.h/2); ctx.lineTo(o.x+o.w-2,o.y+o.h/2);
          ctx.stroke();
        }
      }
    }
  }

  function drawCrates(){
    const crateTex = getTileImg('crate', TILE, TILE);
    for(const c of crates){
      if(!c.alive) continue;
      // darkens slightly as it takes damage — a rough "about to break" cue
      const dmgFrac = 1 - Math.max(0, c.hp/c.maxHp);
      if(crateTex){
        ctx.drawImage(crateTex, c.x, c.y, c.w, c.h);
        if(dmgFrac > 0){
          ctx.fillStyle = `rgba(0,0,0,${(dmgFrac*0.45).toFixed(2)})`;
          ctx.fillRect(c.x, c.y, c.w, c.h);
        }
        if(dmgFrac > 0.3){
          ctx.strokeStyle = 'rgba(20,14,6,0.6)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(c.x+c.w*0.3, c.y);
          ctx.lineTo(c.x+c.w*0.45, c.y+c.h);
          ctx.stroke();
        }
      } else {
        const shade = Math.round(20 * dmgFrac);
        ctx.fillStyle = `rgb(${138-shade*3},${109-shade*2},${59-shade})`;
        ctx.fillRect(c.x, c.y, c.w, c.h);
        ctx.strokeStyle = '#4a3a1f';
        ctx.lineWidth = 2;
        ctx.strokeRect(c.x, c.y, c.w, c.h);
        ctx.beginPath();
        ctx.moveTo(c.x, c.y+c.h/2);
        ctx.lineTo(c.x+c.w, c.y+c.h/2);
        ctx.stroke();
        if(dmgFrac > 0.3){
          // a crack or two once it's taken a beating
          ctx.strokeStyle = 'rgba(20,14,6,0.6)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(c.x+c.w*0.3, c.y);
          ctx.lineTo(c.x+c.w*0.45, c.y+c.h);
          ctx.stroke();
        }
      }
    }
  }

  function drawWeaponDrops(){
    for(const d of droppedWeapons){
      const rar = RARITY_DEFS[d.def.rarity];
      ctx.save();
      ctx.strokeStyle = 'rgba(201,162,39,0.3)';
      ctx.setLineDash([3,4]);
      ctx.beginPath();
      ctx.arc(d.x, d.y, WEAPON_PICKUP_R, 0, Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);

      const weaponTex = getTex('weapon.'+d.def.id);
      if(weaponTex){
        // preserves the image's own aspect ratio instead of squashing it
        // into the old 28x10 rectangle — fit within a 32px box
        const iw = weaponTex.naturalWidth||1, ih = weaponTex.naturalHeight||1;
        const scale = Math.min(32/iw, 32/ih);
        const dw = iw*scale, dh = ih*scale;
        ctx.drawImage(weaponTex, d.x-dw/2, d.y-dh/2, dw, dh);
      } else {
        ctx.fillStyle = d.def.color;
        ctx.fillRect(d.x-14, d.y-5, 28, 10);
        ctx.strokeStyle = '#0e0f0c';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(d.x-14, d.y-5, 28, 10);
      }

      // Name + weapon-type + rarity label, on a dark backing plate so it
      // stays readable over grass/wood/water instead of just floating text.
      // The plate border and rarity line are tinted by RARITY_DEFS color so
      // you can eyeball a crate's drop value from a glance across the map.
      ctx.textAlign = 'center';
      const nameFont = 'bold 12px "Courier New", monospace';
      const catFont = '9px "Courier New", monospace';
      ctx.font = nameFont;
      const nameW = ctx.measureText(d.def.name).width;
      ctx.font = catFont;
      const catW = ctx.measureText(d.def.category).width;
      const rarW = ctx.measureText(rar.label).width;
      const plateW = Math.max(nameW, catW, rarW) + 12;

      ctx.fillStyle = 'rgba(8,9,6,0.78)';
      ctx.fillRect(d.x-plateW/2, d.y-44, plateW, 36);
      ctx.strokeStyle = rar.color;
      ctx.lineWidth = 1.3;
      ctx.strokeRect(d.x-plateW/2, d.y-44, plateW, 36);

      ctx.font = nameFont;
      ctx.fillStyle = '#e9e4d4';
      ctx.fillText(d.def.name, d.x, d.y-32);

      ctx.font = catFont;
      ctx.fillStyle = '#c9a227';
      ctx.fillText(d.def.category, d.x, d.y-21);

      ctx.font = 'bold 9px "Courier New", monospace';
      ctx.fillStyle = rar.color;
      ctx.fillText(rar.label, d.x, d.y-10);
      ctx.restore();
    }
  }

  function drawCharacter(x,y,r,angle,fill,outline,tex){
    // aim line
    if(angle!==undefined){
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(angle)*r, y + Math.sin(angle)*r);
      ctx.lineTo(x + Math.cos(angle)*(r+22), y + Math.sin(angle)*(r+22));
      ctx.stroke();
    }
    if(tex){
      // sprite mode: draw the texture centered on the hitbox, rotated to
      // face aim direction if this character has an angle (player does,
      // zombies currently don't pass one — see call sites below). Source
      // art should face angle 0 (right) so the rotation lines up.
      ctx.save();
      ctx.translate(x,y);
      if(angle!==undefined) ctx.rotate(angle);
      ctx.drawImage(tex, -r, -r, r*2, r*2);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = outline;
      ctx.stroke();
    }
  }

  function drawBullets(){
    // Fading afterimage of the distance each bullet covered this frame —
    // one plain line per bullet, per frame. The freshest segment (age≈0) is
    // already at full opacity and ends exactly at the bullet's current
    // position, so this alone is enough — no separate "live round" draw on
    // top of it.
    for(const t of tracerTrails){
      const mx = (t.x1+t.x2)/2, my = (t.y1+t.y2)/2;
      if(!playerCanSee(mx, my, VIEW_RADIUS)) continue;
      const frac = 1 - t.age/t.life; // 1 = just fired, fading to 0
      ctx.strokeStyle = t.friendly ? `rgba(255,224,102,${frac})` : `rgba(255,138,101,${frac})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(t.x1, t.y1); ctx.lineTo(t.x2, t.y2);
      ctx.stroke();
    }

    // Impact sparks/shards where a round actually struck something — this
    // is the visual payoff for "shooting a wall" rather than the bullet
    // just quietly disappearing.
    for(const p of impacts){
      if(!playerCanSee(p.x, p.y, VIEW_RADIUS)) continue;
      const frac = 1 - p.age/p.life;
      const grow = p.age/p.life;
      let color;
      if(p.kind==='glass') color = `rgba(220,240,255,${0.85*frac})`;
      else if(p.kind==='flesh') color = `rgba(200,50,40,${0.8*frac})`;
      else color = `rgba(255,190,110,${0.85*frac})`;
      ctx.strokeStyle = color;
      ctx.lineWidth = p.kind==='glass' ? 1.4 : 2;
      ctx.beginPath();
      const len = p.len * (0.4+grow*0.9);
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + Math.cos(p.angle)*len, p.y + Math.sin(p.angle)*len);
      ctx.stroke();
    }
  }

  function drawSwingEffects(){
    for(const s of swingEffects){
      const progress = 1 - (s.timer/s.maxTimer); // 0 -> 1 across the swing
      const fade = s.timer/s.maxTimer;
      const startA = s.angle - s.arc/2;
      const endA = s.angle + s.arc/2;
      // sweep the wedge from start to current progress point across the arc
      const sweepEnd = startA + s.arc*Math.max(progress, 0.12);

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.arc(s.x, s.y, s.range, startA, sweepEnd);
      ctx.closePath();
      ctx.fillStyle = `rgba(233,228,212,${0.22*fade})`;
      ctx.fill();

      ctx.strokeStyle = `rgba(255,255,255,${0.55*fade})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.range, startA, sweepEnd);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawFog(){
    if(!fogOfWarEnabled) return;
    // Only sweep the tiles actually on screen — same idea as drawTiles()'s
    // viewport culling. Without this, drawFog walked the ENTIRE map grid
    // (ROWS*COLS tiles) every frame regardless of where the camera was,
    // which is wasted work once the map is more than one screen wide/tall.
    const margin = TILE;
    const colStart = Math.max(0, Math.floor((camera.x - W/2 - margin)/TILE));
    const colEnd   = Math.min(COLS-1, Math.ceil((camera.x + W/2 + margin)/TILE));
    const rowStart = Math.max(0, Math.floor((camera.y - H/2 - margin)/TILE));
    const rowEnd   = Math.min(ROWS-1, Math.ceil((camera.y + H/2 + margin)/TILE));
    for(let row=rowStart; row<=rowEnd; row++){
      for(let col=colStart; col<=colEnd; col++){
        const idx = row*COLS+col;
        if(visibleGrid[idx]) continue; // fully lit — no fog drawn
        const px = col*TILE, py = row*TILE;
        ctx.fillStyle = exploredGrid[idx]
          ? 'rgba(6,7,5,0.40)'   // remembered but not currently visible — readable, just dimmed
          : 'rgba(6,7,5,0.97)';  // never seen — near-black
        ctx.fillRect(px, py, TILE, TILE);
      }
    }
  }

  // Expanding soft ring hinting at footsteps happening somewhere in the fog.
  function drawSoundPulses(){
    for(const p of soundPulses){
      const dist = Math.hypot(p.x-player.x, p.y-player.y);
      if(dist > p.maxDist) continue; // beyond realistic earshot — a sound happened, but you could never have heard it, so nothing renders, ever

      const travelTime = dist / SOUND_SPEED; // real physical delay before the wavefront reaches the player
      const sinceArrival = p.age - travelTime;
      if(sinceArrival < 0) continue; // still travelling toward the player — silence, for now
      if(sinceArrival > p.duration) continue; // already faded from hearing

      const t = sinceArrival / p.duration;
      const r = p.startR + (p.maxR-p.startR)*t;
      const fade = 1-t;

      ctx.strokeStyle = `rgba(190,255,215,${0.35*fade})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI*2);
      ctx.stroke();
    }
  }

  // Does a world-space circle (entity center + radius) overlap a
  // full-width horizontal band, given in screen-space y coordinates
  // (0 = top of the screen, H = bottom)? Used to check whether the player
  // or an on-screen enemy is currently standing under the HUD panel.
  function bandOverlap(entX, entY, entR, screenTop, screenBottom){
    const sy = entY - (camera.y - H/2);
    return sy + entR > screenTop && sy - entR < screenBottom;
  }

  // Is anyone (the player, or any enemy actually being rendered this frame)
  // standing inside the given screen-space band?
  function anyoneInBand(screenTop, screenBottom){
    if(bandOverlap(player.x, player.y, player.r, screenTop, screenBottom)) return true;
    for(const e of enemies){
      if(!e.alive) continue;
      if(!isOnScreen(e.x, e.y, e.r)) continue;
      if(!playerCanSee(e.x, e.y, VIEW_RADIUS)) continue;
      if(bandOverlap(e.x, e.y, e.r, screenTop, screenBottom)) return true;
    }
    return false;
  }

  // Picks where the HUD panel should sit this frame: top of the screen by
  // default, dropping to the bottom if the player or a visible enemy is
  // standing under it up there, or hidden entirely if both bands are
  // occupied. Returns the panel's screen-space y, or null to hide it.
  function pickHudY(){
    if(!anyoneInBand(0, HUD_PANEL_H)) return 0;
    const bottomY = H - HUD_PANEL_H;
    if(!anyoneInBand(bottomY, H)) return bottomY;
    return null;
  }

  // ---------------- Top HUD (2x2: HP/AM bars left, weapon/status right) ----------------
  // Same NES-Core look as NESHUD.js's party-HP bar: a full-width, bordered
  // 9-slice panel pinned to the top (or, if something's standing under it,
  // the bottom) of the screen (drawn AFTER the camera transform is
  // restored, so it stays put regardless of where the player is in the
  // world). This used to be split between a floating stack above the
  // player's head (HP/armor/ammo/melee bars) and this panel — classic NES
  // games keep that all in one fixed HUD instead of floating it over the
  // sprite, so it's all consolidated here now, packed into a 2x2 grid so it
  // still fits the original 4-tile-tall strip: HP bar top-left, AM (ammo or
  // melee-readiness) bar bottom-left, weapon name top-right, status
  // (ammo count/reload/ready) bottom-right.
  function drawHudBar(x,y,w,h,frac,color){
    ctx.fillStyle = '#0e0f0c';
    ctx.fillRect(x-1, y-1, w+2, h+2);
    ctx.fillStyle = '#1a1c16';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w*Math.max(0,frac), h);
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
  }
  function drawTopHud(){
    if(!hudInfo) return;
    if(screenScroller.locked) return; // hidden during a screen-transition pan, same as NESHUD
    const panelY = pickHudY();
    if(panelY === null) return; // no clear spot for it this frame — hide rather than obscure the action
    ctx.drawImage(hudPanelCanvas, 0, panelY);

    const row1 = panelY+8, row2 = panelY+16;
    const barX = 32, barW = 64, barH = 6;

    // left column: HP bar (top), AM bar (bottom)
    drawTileText('HP', 8, row1, NES.white);
    drawHudBar(barX, row1+1, barW, barH, hudInfo.hpFrac, hudInfo.hpColor);
    drawTileText('AM', 8, row2, NES.white);
    drawHudBar(barX, row2+1, barW, barH, hudInfo.amFrac, hudInfo.amColor);

    // right column: weapon name (top), status (bottom)
    drawTileText(hudInfo.nameTxt, 136, row1, hudInfo.nameColor);
    drawTileText(hudInfo.statusTxt, 136, row2, hudInfo.statusColor);
  }

  function render(){
    // The flip-screen camera can park a sector partly past the world's
    // edge (WORLD_W/WORLD_H aren't exact multiples of the screen size), so
    // unlike the old clamped smooth-follow camera, drawTiles/drawFog won't
    // always paint every screen pixel. Clear to black first so any strip
    // beyond the map reads as solid black (same as unexplored fog) instead
    // of showing last frame's leftover pixels.
    ctx.fillStyle = NES.black;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.translate(Math.round(W/2 - camera.x), Math.round(H/2 - camera.y));

    drawTiles(last);
    drawCrates();
    drawWeaponDrops();
    drawBullets();
    drawSwingEffects();
    for(const e of enemies){
      if(e.alive && isOnScreen(e.x, e.y, e.r) && playerCanSee(e.x, e.y, VIEW_RADIUS)){
        if(e.type === 'zombie'){
          drawCharacter(e.x, e.y, e.r, undefined, '#6b8f47', '#26331a', getTex('zombie'));
        } else {
          drawCharacter(e.x, e.y, e.r, undefined, '#e2533c', '#3a1a14', getTex('zombie'));
        }
      }
    }
    drawFog();
    drawSoundPulses();

    drawCharacter(player.x, player.y, player.r, player.angle, '#4fd1c5', '#123330', getTex('player'));

    ctx.restore();

    drawEdgeBlockGlow(last);
    drawTopHud();
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
